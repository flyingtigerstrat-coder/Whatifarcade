<!doctype html>
<!-- Koi — a pond to keep · koi v3.1.1 (living pond, B.1: QA time controls + chrome/lantern fixes) · Noodle Studios / What If Arcade -->
<!--
  ARCHITECTURE: the pond is the platform; a "skin" is content.
  Single shared POND state (koi, plants, food, ripples, economy, time).
  RENDER CONTRACT v2 — every skin implements:
     water(ctx, t)              full-bleed water/background + light
     koi(ctx, k, sp, dim)       one koi, given its precomputed spine `sp`
     plant(ctx, p)              one plant (pad / lotus)         [optional -> falls back to Natural]
     fx(ctx)                    ripples + food                 [optional -> falls back to generic]
     overlay(ctx, t)           foreground (vignette/fog/petals)
     roles                      palette-role tokens (foliage/foliageRim/stone/moss/wood/bloom/glow).
                                An entity drawn ONCE against ROLES() reads correctly in every skin;
                                a bespoke per-skin handler still wins when present. Standing rule:
                                no entity ships unless it reads correctly in all four skins.
  PLANES (living pond): every entity declares BELOW / ON / ABOVE; planes render
  in order (below -> on -> above) to give the pond literal depth.
  PERSISTENCE: save key koipond_v3 (lossless v2 upgrader; the old v2 key is left
  in place for rollback safety — never eat a pond). Derived life (school,
  dragonfly, fireflies) is never saved; it re-derives from ecology on load.
  The engine computes koi geometry once and calls the active skin. Skins are
  drop-in: register in SKINS and it appears. Natural is the canonical core;
  art skins are faithful performances of it.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Koi — a pond to keep</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  html,body{height:100%;background:#0c1512;overflow:hidden;cursor:crosshair}
  #c{display:block;width:100vw;height:100vh;touch-action:none}
  .chrome{font-family:ui-sans-serif,-apple-system,"Segoe UI",Inter,sans-serif;
    transition:opacity .7s ease, transform .7s ease;z-index:10;user-select:none}
  .chrome.hide{opacity:0;pointer-events:none;transform:translateY(10px)}
  #pond{position:fixed;left:20px;top:18px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;z-index:10}
  #ser{display:inline-flex;align-items:center;gap:8px;color:rgba(240,238,230,.92);font-size:13px;letter-spacing:.06em;
    padding:8px 15px;border-radius:999px;background:rgba(10,16,14,.4);
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08)}
  #ser .glyph{color:#f0b9cf;font-size:12px}
  #ser b{font-weight:600;font-variant-numeric:tabular-nums}
  #ser .lbl{opacity:.5;text-transform:lowercase;letter-spacing:.12em;font-size:11px}
  #tend{display:flex;gap:8px}
  .buy{appearance:none;border:0;cursor:pointer;border-radius:999px;padding:8px 14px;font-size:12px;
    letter-spacing:.04em;color:rgba(238,240,234,.92);background:rgba(10,16,14,.4);white-space:nowrap;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.08);
    display:inline-flex;align-items:center;gap:7px;transition:background .3s,opacity .3s,border-color .3s}
  .buy:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.16)}
  .buy:disabled{opacity:.32;cursor:default}
  .buy .cost{display:inline-flex;align-items:center;gap:3px;opacity:.72;font-variant-numeric:tabular-nums}
  .buy .cost::before{content:'❀';color:#f0b9cf;opacity:.9}
  #tray{display:flex;flex-wrap:wrap;gap:6px;max-width:min(520px,92vw)}
  #tray.hide{display:none}
  .chip{appearance:none;border:0;cursor:pointer;border-radius:999px;padding:6px 12px;font-size:11.5px;
    letter-spacing:.03em;color:rgba(238,240,234,.88);background:rgba(10,16,14,.42);white-space:nowrap;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid rgba(255,255,255,.08);
    display:inline-flex;align-items:center;gap:6px;transition:background .25s,opacity .25s}
  .chip:hover{background:rgba(255,255,255,.12)}
  .chip:disabled{opacity:.32;cursor:default}
  .chip.arm{background:rgba(240,207,134,.22);border-color:rgba(240,207,134,.4)}
  .chip .c{opacity:.7;font-variant-numeric:tabular-nums}.chip .c::before{content:'❀ ';color:#f0b9cf}
  #koicard{position:fixed;left:20px;bottom:24px;z-index:20;width:230px;padding:13px 15px;border-radius:14px;
    color:rgba(240,238,230,.92);background:rgba(10,16,14,.55);border:1px solid rgba(255,255,255,.1);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-size:12.5px;line-height:1.5}
  #koicard.hide{display:none}
  #koicard b{font-size:13.5px}#koicard .jp{color:#9bc4b4;font-size:11px;margin-left:6px}
  #koicard .ln{opacity:.7;font-size:11px}
  #koicard .row{display:flex;gap:8px;margin-top:9px}
  #kcSwim{flex:1;appearance:none;cursor:pointer;border-radius:9px;padding:7px 10px;font-size:11.5px;
    color:#e8ecdf;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);transition:background .25s}
  #kcSwim:hover{background:rgba(255,255,255,.14)}
  #kcSwim.confirm{color:#1a120a;background:#f0cf86;border-color:#f0cf86;font-weight:600}
  #kcX{appearance:none;cursor:pointer;border-radius:9px;padding:7px 10px;font-size:11.5px;color:rgba(238,240,234,.6);
    background:transparent;border:1px solid rgba(255,255,255,.1)}
  #devtray{position:fixed;right:16px;bottom:24px;z-index:30;display:flex;gap:5px;flex-wrap:wrap;max-width:300px;justify-content:flex-end}
  #skins{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;gap:4px;align-items:center;
    padding:5px;border-radius:999px;background:rgba(10,16,14,.42);box-shadow:0 8px 40px rgba(0,0,0,.4);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.10);z-index:10}
  #skins.hide{transform:translateX(-50%) translateY(12px)}
  .pill{appearance:none;border:0;cursor:pointer;color:rgba(238,240,234,.6);background:transparent;
    border-radius:999px;padding:8px 16px;font-size:12px;letter-spacing:.12em;text-transform:lowercase;
    white-space:nowrap;transition:color .35s,background .35s}
  .pill:hover{color:rgba(238,240,234,.95)}
  .pill.on{color:#0c1512;background:rgba(238,240,234,.94);font-weight:500}
  @media (max-width:580px){ .pill{padding:7px 10px;letter-spacing:.04em} #tend{flex-wrap:wrap} }
  #hint{position:fixed;left:50%;bottom:66px;transform:translateX(-50%);font-size:11px;letter-spacing:.16em;
    text-transform:lowercase;color:rgba(238,240,234,.4);transition:opacity 1s;z-index:10;pointer-events:none}
  #veil{position:fixed;inset:0;background:#0c1512;opacity:0;pointer-events:none;transition:opacity .42s;z-index:5}
  #nav{position:fixed;top:18px;right:16px;z-index:30;display:flex;gap:8px}
  #nav button{font:600 12px Inter,system-ui,sans-serif;color:#dfeee6;background:rgba(20,40,33,.55);border:1px solid rgba(255,255,255,.12);
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);border-radius:10px;padding:8px 12px;cursor:pointer;transition:background .2s}
  #nav button:hover{background:rgba(30,55,46,.72)}
  #codex{position:fixed;top:0;right:0;height:100%;width:min(384px,93vw);z-index:40;
    background:linear-gradient(180deg,rgba(14,33,27,.97),rgba(9,22,17,.985));-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border-left:1px solid rgba(255,255,255,.1);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;color:#f6e7c4;box-shadow:-18px 0 50px rgba(0,0,0,.4)}
  #codex.open{transform:translateX(0)}
  #codex header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  #codex header h2{font:600 14px Inter,system-ui,sans-serif;letter-spacing:.5px}
  #codex .x{background:none;border:none;color:#bcd4ca;cursor:pointer;font-size:22px;line-height:1;padding:0 4px}
  #cxList{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px}
  .cx{background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.08);border-radius:12px;padding:10px 12px;display:flex;gap:12px;align-items:center}
  .cx canvas{width:104px;height:60px;flex:0 0 auto;border-radius:8px}
  .cx .info{flex:1;min-width:0}
  .cx .nm{font:600 13.5px Inter,system-ui,sans-serif}
  .cx .jp{font-size:10.5px;color:#9bc4b4;opacity:.8;font-weight:400}
  .cx .ds{font-size:11px;color:#cfe3d8;opacity:.82;line-height:1.42;margin-top:3px}
  .cx .act{margin-top:7px}
  .cx .own{font-size:10.5px;color:#9bc4b4}
  .cx .ul{font:600 10.5px Inter,system-ui,sans-serif;color:#1a120a;background:#f0cf86;border:none;border-radius:99px;padding:5px 11px;cursor:pointer}
  .cx .ul:disabled{background:rgba(240,207,134,.22);color:#b39a64;cursor:default}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="veil"></div>
<div id="pond">
  <div id="ser"><span class="glyph">❀</span><b id="serN">0</b><span class="lbl">serenity</span></div>
  <div id="tend" class="chrome">
    <button class="buy" id="buyKoi">release koi <span class="cost"><span id="cKoi">5</span></span></button>
    <button class="buy" id="openPlant">plant &#9662;</button>
    <button class="buy" id="openPlace">place &#9662;</button>
  </div>
  <div id="tray" class="chrome hide"></div>
</div>
<div id="hint" class="chrome">drag to stir &nbsp;·&nbsp; click to feed &nbsp;·&nbsp; tend &amp; grow</div>
<div id="koicard" class="hide"><b id="kcName"></b><span class="jp" id="kcJp"></span>
  <div id="kcStage"></div><div class="ln" id="kcLin"></div>
  <div class="row"><button id="kcSwim">let it swim on</button><button id="kcX">&times;</button></div></div>
<div id="devtray" class="chrome" style="display:none"></div>
<div id="skins" class="chrome">
  <button class="pill on" data-skin="natural">natural</button>
  <button class="pill" data-skin="metal">liquid metal</button>
  <button class="pill" data-skin="ink">sumi ink</button>
  <button class="pill" data-skin="rain">rain on glass</button>
</div>
<div id="nav"><button id="codexBtn">&#10047; koi codex</button></div>
<div id="codex"><header><h2>Koi Codex</h2><button class="x" id="codexX">&times;</button></header><div id="cxList"></div></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d',{alpha:false});
const veil=document.getElementById('veil');
const REDUCE=matchMedia('(prefers-reduced-motion: reduce)').matches;
let W=0,H=0,DPR=1;
const TAU=Math.PI*2, clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, rand=(a,b)=>a+Math.random()*(b-a);
function hexA(hex,a){const n=hex.replace('#','');return `rgba(${parseInt(n.substr(0,2),16)},${parseInt(n.substr(2,2),16)},${parseInt(n.substr(4,2),16)},${a})`;}
function shade(hex,m){const n=hex.replace('#','');return `rgb(${parseInt(n.substr(0,2),16)*m|0},${parseInt(n.substr(2,2),16)*m|0},${parseInt(n.substr(4,2),16)*m|0})`;}
function hsl(h,s,l,a){return `hsla(${h},${s}%,${l}%,${a==null?1:a})`;}
// blend two #rrggbb toward t (0..1) -> #rrggbb (used for brass->verdigris patina)
function mixHex(a,b,t){const A=a.replace('#',''),B=b.replace('#',''),h=n=>('0'+(clamp(n|0,0,255)).toString(16)).slice(-2);
  return '#'+h(lerp(parseInt(A.substr(0,2),16),parseInt(B.substr(0,2),16),t))
           +h(lerp(parseInt(A.substr(2,2),16),parseInt(B.substr(2,2),16),t))
           +h(lerp(parseInt(A.substr(4,2),16),parseInt(B.substr(4,2),16),t));}

// ---------- persistence (pond you keep) ----------
// v3 save. The old koipond_v2 key is deliberately LEFT IN PLACE after migration
// (rollback safety — a bad deploy must never eat a pond). Migration is lossless:
// koi/plants/econ/unlocked map verbatim; new fields get safe defaults; lastSeen
// stamps NOW so the first migrated load grants no retroactive idle windfall.
const SAVE_KEY='koipond_v3', LEGACY_KEY='koipond_v2';
function migrateV2(s){return {v:3,
  econ:{serenity:s.econ?.serenity||6},
  unlocked:(s.unlocked&&s.unlocked.length)?s.unlocked:['kohaku','asagi','ogon'],
  koi:(s.koi||[]).map(k=>({variety:k.variety,age:k.age,x:k.x,y:k.y,seed:k.seed,parents:null})),
  plants:(s.plants||[]).map(p=>({type:p.type,x:p.x,y:p.y,size:p.size,grow:p.grow,bloom:p.bloom,vr:'classic'})),
  rocks:[], frog:null, departed:[], eco:{lastSeen:Date.now()}};}
const Store={save(o){try{localStorage.setItem(SAVE_KEY,JSON.stringify(o));}catch(e){}},
             load(){try{
               const v3=JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); if(v3) return v3;
               const v2=JSON.parse(localStorage.getItem(LEGACY_KEY)||'null'); if(v2) return migrateV2(v2);
               return null;
             }catch(e){return null;}}};

// ---------- koi varieties (show-accurate Nishikigoi) ----------
// patches ride the body: a..b = fraction head->tail; top/bot = [inner,outer] reach across each flank
//   (fraction of half-width). soft=1 -> leading edge feathers (sashi); trailing stays crisp (kiwa).
//   c: 'hi' (=accent/red), 'sumi' (black), 'shiro' (white) or a literal hex.
const V={
  kohaku:{base:'#f6efe1',accent:'#d8381b',metal:0,extraHi:1,patches:[          // white + stepped red (Sandan)
    {c:'hi',a:.04,b:.27,top:[0,.92],bot:[0,.50],soft:1},
    {c:'hi',a:.40,b:.60,top:[0,.85],bot:[0,.62],soft:1},
    {c:'hi',a:.71,b:.88,top:[0,.72],bot:[0,.30],soft:1}]},
  sanke:{base:'#f6efe1',accent:'#d8381b',sumi:'#1b1510',metal:0,extraHi:1,patches:[  // Kohaku hi + sumi above lateral line, clean head
    {c:'hi',a:.10,b:.30,top:[0,.90],bot:[0,.55],soft:1},
    {c:'hi',a:.47,b:.65,top:[0,.82],bot:[0,.55],soft:1},
    {c:'sumi',a:.31,b:.43,top:[0,.62],soft:0},
    {c:'sumi',a:.60,b:.72,bot:[0,.60],soft:0}]},
  showa:{base:'#171210',accent:'#cf3219',shiro:'#efe7d6',metal:0,menware:1,motoguro:1,head:{type:'blotch'},patches:[ // black base wraps; white+red over
    {c:'shiro',a:.05,b:.30,top:[0,.95],bot:[0,.95],soft:0},
    {c:'hi',a:.12,b:.42,top:[0,.85],bot:[0,.35],soft:1},
    {c:'shiro',a:.52,b:.78,top:[0,.95],bot:[0,.95],soft:0},
    {c:'hi',a:.64,b:.90,top:[0,.70],bot:[0,.30],soft:1}]},
  ogon:{base:'#e3a73f',accent:'#f6cf86',metal:1,solid:1,patches:[]},      // solid metallic gold (scale shimmer)
  platinum:{base:'#e9eef0',accent:'#cfe0e6',metal:1,solid:1,patches:[]},  // solid metallic white
  benigoi:{base:'#c5401d',accent:'#e0563a',metal:0,solid:1,patches:[]},   // solid red-orange (NOT flat -> shimmer)
  asagi:{base:'#7f96a8',accent:'#cf6a33',metal:0,net:1,cheeks:'#cf6a33',patches:[ // blue net back, red up the flanks only
    {c:'hi',a:.34,b:.97,bot:[.42,.95],soft:1},
    {c:'hi',a:.34,b:.97,top:[.42,.95],soft:1}]},
  tancho:{base:'#f4efe4',accent:'#d4291a',metal:0,head:{type:'dot'},patches:[]}, // white + single head sun
};
const STARTERS=['kohaku','showa','asagi','ogon','sanke','benigoi','platinum','tancho'];

// ---------- POND state (single source of truth) ----------
const Pond={koi:[],plants:[],food:[],ripples:[],petals:[],sparkles:[],sun:{x:0,y:0},econ:{serenity:0},unlocked:['kohaku','asagi','ogon'],
  rocks:[],frog:null,departed:[],eco:{lastSeen:0},_t:0};

// capacity ledger (BRIEF v1.1 Phase A, human-ratified 2026-07-02): generous, bounded
// by worst-case frame budget + on-screen legibility. Departure (Phase B) is the release valve.
const CAPS={koi:18,plants:36,rocks:12,school:20,fireflies:10};

// blended growth (returning v0.1 work): koi grow slowly with TIME, faster when FED.
// Size stops at adult (age 1); age keeps accruing quietly beyond it, so ELDER is
// earned duration — derived from the one saved field, no new state. Never death.
const AGE_MAX=1.6, GROW_DAY=.01, GROW_FED=.02, PASSIVE_SEC=GROW_DAY/86400;
function stage(k){return k.age<.25?'fry':k.age<.6?'young':k.age<1.25?'adult':'elder';}
function eldF(k){return clamp((k.age-1.25)/.2,0,1);}   // 0..1 ramp into eldership (fins flow in gradually)

function makeKoi(variety,x,y,age,seed,parents){
  const v=V[variety]||V.kohaku, len=rand(96,150), sd=seed??(Math.random()*1e4|0);
  const k={variety, V:v, x:x??rand(W*.25,W*.75), y:y??rand(W?H*.25:200,H*.75||400), ang:rand(0,TAU),
    spd:rand(15,26)*(REDUCE?.5:1), len, wd:len*rand(.105,.125), depth:rand(0,1),
    phase:rand(0,TAU), finph:rand(0,TAU), wig:rand(.85,1.2), turn:0, trail:[],
    age:age??rand(.35,1), hunger:rand(.2,.6), wellfed:0, wake:[], seed:sd, parents:parents??null};
  k.pattern=buildPattern(v,sd);                 // per-individual markings (no two koi alike)
  return k;
}
function makePad(x,y,size,vr){return {type:'pad',vr:vr||'classic',x,y,size:size??rand(.2,.5),rot:rand(0,TAU),grow:size?1:rand(.2,.6),bloom:0,hue:rand(-8,8),bp:rand(0,TAU),amp:rand(2,3.6),dx:0,dy:0,vx:0,vy:0,rv:rand(-.04,.04)};}
function makeLotus(x,y){return {type:'lotus',vr:'classic',x,y,grow:0,bloom:0,rot:rand(0,TAU),bp:rand(0,TAU),amp:rand(1.6,2.8),dx:0,dy:0,vx:0,vy:0,rv:rand(-.03,.03)};}
// dream-pond flora (BRIEF v1.1 Phase B). Cosmetic detail (blade counts, phases) is
// re-rolled on load like pad hue; identity (type/vr/position/grow/bloom) persists.
function makeReed(x,y){return {type:'reed',vr:'classic',x,y,grow:0,bloom:0,n:5+(Math.random()*4|0),heads:1+(Math.random()*2|0),bp:rand(0,TAU),rot:0,amp:1,dx:0,dy:0,vx:0,vy:0,rv:0};}
function makeIris(x,y){return {type:'iris',vr:'classic',x,y,grow:0,bloom:0,n:3,bp:rand(0,TAU),rot:0,amp:1,dx:0,dy:0,vx:0,vy:0,rv:0};}
function makeDuckweed(x,y){return {type:'duckweed',vr:'classic',x,y,grow:.6,bloom:0,n:5+(Math.random()*4|0),bp:rand(0,TAU),rot:rand(0,TAU),amp:rand(3,4.5),dx:0,dy:0,vx:0,vy:0,rv:rand(-.06,.06)};}
function makeGrass(x,y){return {type:'grass',vr:'classic',x,y,grow:0,bloom:0,n:6+(Math.random()*5|0),bp:rand(0,TAU),rot:0,amp:1,dx:0,dy:0,vx:0,vy:0,rv:0};}
const PLANT_MAKE={pad:makePad,lotus:makeLotus,reed:makeReed,iris:makeIris,duckweed:makeDuckweed,grass:makeGrass};
const BELOW_TYPES={grass:1};                       // BELOW-plane flora renders under the koi
// hardscape: heavy, mossing, persistent (decor AND habitat — Principle 3)
function makeRock(form,x,y){return {form,x,y,size:rand(.75,1.25),rot:rand(0,TAU),grow:0};}
function rockR(r){return (r.form==='boulder'?34:r.form==='slate'?30:r.form==='driftwood'?40:r.form==='lantern'?22:24)*r.size;}

// dev lifecycle harness (?dev=1): drives the WHOLE player journey on demand.
// Warps call the REAL idleReturn() path with the cap lifted — testing exercises
// production code, not a parallel fake. Invisible without the URL flag.
const DEV=typeof location!=='undefined'&&/[?&]dev=1/.test(location.search||'');

function seedDefault(){
  Pond.koi=[]; Pond.plants=[]; Pond.econ.serenity=6;
  STARTERS.slice(0,4).forEach(v=>Pond.koi.push(makeKoi(v)));
  Pond.plants.push(makePad(W*.22,H*.7), makePad(W*.78,H*.32), makePad(W*.6,H*.78));
}
function restore(s){
  Pond.econ.serenity=s.econ?.serenity||6;
  Pond.unlocked=s.unlocked&&s.unlocked.length?s.unlocked:['kohaku','asagi','ogon'];
  Pond.koi=(s.koi||[]).map(k=>makeKoi(k.variety,k.x*W,k.y*H,k.age,k.seed,k.parents||null));
  Pond.plants=(s.plants||[]).map(p=>{const mk=PLANT_MAKE[p.type]||makePad;
    const pl=p.type==='pad'?makePad(p.x*W,p.y*H,p.size,p.vr):mk(p.x*W,p.y*H);
    return Object.assign(pl,{grow:p.grow??pl.grow,bloom:p.bloom||0,vr:p.vr||'classic'});});
  Pond.rocks=(s.rocks||[]).map(r=>({form:r.form,x:r.x*W,y:r.y*H,size:r.size||1,rot:r.rot||0,grow:r.grow||0}));
  Pond.frog=s.frog||null; Pond.departed=s.departed||[];
  Pond.eco=s.eco||{lastSeen:Date.now()};
  if(!Pond.koi.length) seedDefault();
}
function persist(){
  Store.save({v:3, econ:Pond.econ, unlocked:Pond.unlocked,
    koi:Pond.koi.map(k=>({variety:k.variety,age:k.age,x:k.x/W,y:k.y/H,seed:k.seed,parents:k.parents||null})),
    plants:Pond.plants.map(p=>({type:p.type,x:p.x/W,y:p.y/H,size:p.size,grow:p.grow,bloom:p.bloom,vr:p.vr||'classic'})),
    rocks:Pond.rocks.map(r=>({form:r.form,x:r.x/W,y:r.y/H,size:r.size,rot:r.rot,grow:r.grow})),
    frog:Pond.frog, departed:Pond.departed,
    eco:{lastSeen:Date.now()}});
}

// ---------- ecology (hidden — legible through life, never meters) ----------
// Pure derivations from what exists. Phase C registers visitors against these;
// the scores + the roll hook ship now so fauna plugs into a working system.
const Eco={
  shelter(){let s=0;for(const r of Pond.rocks)s+=1;
    for(const p of Pond.plants)if((p.grow??0)>.75)s+=(p.type==='pad'?.5:.75);return s;},
  bloom(){let b=0;for(const p of Pond.plants)if((p.bloom||0)>.5)b+=1;return b;},
  life(){return thriving();},
  calm(){return clamp((Pond._t-(Pond.lastStir||0))/120,0,1);},
  visitors:[]                    // Phase C: [{key, when(eco)->bool, arrive()}]
};
function rollVisitors(){for(const v of Eco.visitors){try{if(v.when(Eco))v.arrive();}catch(e){}}}

// ---------- idle return (away-progress is a gift, never an obligation) ----------
function idleReturn(uncap){
  const now=Date.now(), last=Pond.eco.lastSeen||now;
  const hrs=clamp((now-last)/3.6e6,0,uncap?1e6:72);       // gift capped at 3 days' worth (dev warps lift the cap)
  if(hrs<.05){Pond.eco.lastSeen=now;return;}
  const dAge=(hrs/24)*GROW_DAY;                           // capped passive growth while away
  for(const k of Pond.koi)k.age=Math.min(AGE_MAX,k.age+dAge*rand(.8,1.2));
  for(const p of Pond.plants){p.grow=Math.min(1,(p.grow??0)+hrs*.01);
    if((p.type==='lotus'||p.type==='iris')&&p.grow>.9)p.bloom=Math.min(1,(p.bloom||0)+hrs*.02);
    if(p.type==='pad'&&p.vr!=='cluster'&&p.grow>.85)p.bloom=Math.min(1,(p.bloom||0)+hrs*.012);}  // water-lily on old pads
  for(const r of Pond.rocks)r.grow=Math.min(1,r.grow+hrs*.008);                                  // moss creeps while away
  Pond.econ.serenity+=Math.min(hrs*2,uncap?1e9:60);       // gentle trickle, capped (dev warps honest to elapsed)
  Pond.eco.lastSeen=now; rollVisitors();                  // returning can mean finding a visitor already here
}

// ---------- geometry (shared by all skins) ----------
function elen(k){return k.len*lerp(.52,1,Math.min(1,k.age));}   // size stops at adult; age keeps counting toward elder
function ewd(k){return k.wd*lerp(.6,.95,Math.min(1,k.age));}
function spine(k,count){
  const L=elen(k), step=L/(count-1), tr=k.trail, pts=[];
  if(tr.length<2){for(let i=0;i<count;i++)pts.push({x:k.x-Math.cos(k.ang)*step*i,y:k.y-Math.sin(k.ang)*step*i});}
  else{let idx=0,acc=0;pts.push({x:tr[0].x,y:tr[0].y});
    for(let n=1;n<count;n++){let need=step;
      while(need>0&&idx<tr.length-1){const a=tr[idx],b=tr[idx+1],seg=Math.hypot(b.x-a.x,b.y-a.y)||1e-4;
        if(seg-acc>=need){acc+=need;const t=acc/seg;pts.push({x:lerp(a.x,b.x,t),y:lerp(a.y,b.y,t)});need=0;}
        else{need-=(seg-acc);idx++;acc=0;}}
      if(pts.length<=n)pts.push({x:tr[tr.length-1].x,y:tr[tr.length-1].y});}}
  for(let i=0;i<count;i++){const a=pts[Math.max(0,i-1)],b=pts[Math.min(count-1,i+1)];
    let tx=b.x-a.x,ty=b.y-a.y;const l=Math.hypot(tx,ty)||1;tx/=l;ty/=l;
    const nx=-ty,ny=tx,tt=i/(count-1),wig=Math.sin(k.phase-i*.55)*(tt*tt)*L*.05;
    pts[i].x+=nx*wig;pts[i].y+=ny*wig;pts[i].nx=nx;pts[i].ny=ny;pts[i].t=tt;}
  return pts;
}
function widthAt(t){
  const nose=.34+.66*Math.sin(Math.min(1,t/.16)*Math.PI/2);     // rounded head, full by ~16%
  const taper=Math.pow(Math.max(0,1-(t-.30)/.74),1.5);          // broad shoulder ~30% then smooth taper
  const w = t<.30 ? nose : .10+.90*taper;                       // continuous at the shoulder; thin caudal peduncle
  return Math.max(.05,w);
}
function bodyPath(c,k,sp){const wd=ewd(k),C=sp.length;c.beginPath();
  for(let i=0;i<C;i++){const w=wd*widthAt(sp[i].t),x=sp[i].x+sp[i].nx*w,y=sp[i].y+sp[i].ny*w;i?c.lineTo(x,y):c.moveTo(x,y);}
  for(let i=C-1;i>=0;i--){const w=wd*widthAt(sp[i].t);c.lineTo(sp[i].x-sp[i].nx*w,sp[i].y-sp[i].ny*w);}c.closePath();}
function tailFin(c,k,sp){const e=sp[sp.length-1],p=sp[sp.length-2];let tx=e.x-p.x,ty=e.y-p.y;const l=Math.hypot(tx,ty)||1;tx/=l;ty/=l;
  const nx=-ty,ny=tx,fl=elen(k)*.32*(1+.7*eldF(k)),fw=ewd(k)*1.45*(1+.18*eldF(k)),sw=Math.sin(k.phase+.5)*fw*.65;   // elder: long flowing trailing fins (prestige, not decline)c.beginPath();c.moveTo(e.x,e.y);
  c.quadraticCurveTo(e.x+tx*fl*.6+nx*(fw+sw),e.y+ty*fl*.6+ny*(fw+sw),e.x+tx*fl+nx*sw,e.y+ty*fl+ny*sw);
  c.quadraticCurveTo(e.x+tx*fl*.7,e.y+ty*fl*.7,e.x+tx*fl-nx*sw,e.y+ty*fl-ny*sw);
  c.quadraticCurveTo(e.x+tx*fl*.6-nx*(fw-sw),e.y+ty*fl*.6-ny*(fw-sw),e.x,e.y);c.closePath();}
function pecFins(c,k,sp){const i=Math.round(sp.length*.26),p=sp[i],fw=elen(k)*.15,sw=Math.sin(k.finph)*.5,dx=Math.cos(k.ang),dy=Math.sin(k.ang),wd=ewd(k);
  for(const s of[1,-1]){const bx=p.x+p.nx*wd*widthAt(p.t)*s,by=p.y+p.ny*wd*widthAt(p.t)*s,ax=p.nx*s,ay=p.ny*s;
    c.beginPath();c.moveTo(bx,by);
    c.quadraticCurveTo(bx+ax*fw-dx*fw*.3,by+ay*fw-dy*fw*.3,bx+ax*fw*(.5+sw*.4)-dx*fw,by+ay*fw*(.5+sw*.4)-dy*fw);
    c.quadraticCurveTo(bx-dx*fw*.5,by-dy*fw*.5,bx,by);c.closePath();c.fill();}}

// ---------- koi markings (show-accurate: sashi/kiwa edges, per-variety placement) ----------
function sampleSpineN(sp,t){t=clamp(t,0,1);for(let i=0;i<sp.length-1;i++){if(t<=sp[i+1].t){const f=(t-sp[i].t)/((sp[i+1].t-sp[i].t)||1);
  return {x:lerp(sp[i].x,sp[i+1].x,f),y:lerp(sp[i].y,sp[i+1].y,f),nx:lerp(sp[i].nx,sp[i+1].nx,f),ny:lerp(sp[i].ny,sp[i+1].ny,f)};}}
  const e=sp[sp.length-1];return {x:e.x,y:e.y,nx:e.nx,ny:e.ny};}
function pcolor(v,key){return key==='hi'?v.accent:key==='sumi'?(v.sumi||'#1b1510'):key==='shiro'?(v.shiro||'#efe7d6'):key;}
// nudge a hi colour's brightness (l) and warmth (warm: 0 crimson -> 1 orange) for per-patch variation
function toneHex(hex,l,warm){const n=hex.replace('#','');let r=parseInt(n.substr(0,2),16),g=parseInt(n.substr(2,2),16),b=parseInt(n.substr(4,2),16);
  const wf=warm-.5;g+=wf*30;b-=wf*16;r*=l;g*=l;b*=l;
  return `rgb(${clamp(r|0,0,255)},${clamp(g|0,0,255)},${clamp(b|0,0,255)})`;}
// per-koi pattern: jitter the template + scatter extra hi patches so real koi wear MANY varied patches
function srand(seed){let s=(seed|0)*9301+49297;return()=>{s=(s*9301+49297)%233280;return s/233280;};}
function buildPattern(v,seed){const rnd=srand(seed),out=[];const hiTone=()=>({l:.86+rnd()*.26,w:rnd()});
  for(const p of (v.patches||[])){
    const ja=clamp(p.a+(rnd()-.5)*.05,0,.96),jb=clamp(p.b+(rnd()-.5)*.05,ja+.05,1);
    const top=p.top?[p.top[0],clamp(p.top[1]+(rnd()-.5)*.18,.2,1.06)]:null;
    const bot=p.bot?[p.bot[0],clamp(p.bot[1]+(rnd()-.5)*.18,.2,1.06)]:null;
    out.push({c:p.c,a:ja,b:jb,top,bot,soft:p.soft,tone:p.c==='hi'?hiTone():null});
    if(p.c==='hi'&&v.extraHi&&rnd()<.6){               // split a patch -> a second smaller one trailing it
      const ca=clamp(jb+rnd()*.05,0,.92),cb=clamp(ca+.05+rnd()*.07,0,1);
      out.push({c:'hi',a:ca,b:cb,top:[0,.34+rnd()*.46],bot:rnd()<.5?[0,.28+rnd()*.36]:null,soft:1,tone:hiTone()});}
  }
  if(v.extraHi){const n=1+(rnd()*2|0);                 // 1-2 scattered secondary hi flecks
    for(let i=0;i<n;i++){const a=.16+rnd()*.62,ln=.05+rnd()*.07;
      let top=rnd()<.55?[0,.3+rnd()*.4]:null,bot=rnd()<.55?[0,.3+rnd()*.4]:null;if(!top&&!bot)top=[0,.42];
      out.push({c:'hi',a,b:a+ln,top,bot,soft:1,tone:hiTone()});}}
  return out;
}
// a patch strip on one flank, with an organic wobbling edge (returns a Path2D)
function stripPath(k,sp,a,b,side,inner,outer,seed){const steps=Math.max(4,Math.round((b-a)/.045)+2),P=new Path2D();
  for(let j=0;j<=steps;j++){const tt=a+(b-a)*j/steps,s=sampleSpineN(sp,tt),wob=1+.11*Math.sin(tt*26+seed)+.05*Math.sin(tt*59+seed*1.7);
    const w=ewd(k)*widthAt(tt)*outer*wob,x=s.x+s.nx*w*side,y=s.y+s.ny*w*side;j?P.lineTo(x,y):P.moveTo(x,y);}
  for(let j=steps;j>=0;j--){const tt=a+(b-a)*j/steps,s=sampleSpineN(sp,tt),wob=1+.11*Math.sin(tt*26+seed+3)+.05*Math.sin(tt*59+seed*1.3);
    const w=ewd(k)*widthAt(tt)*inner*wob,x=s.x+s.nx*w*side,y=s.y+s.ny*w*side;P.lineTo(x,y);}
  P.closePath();return P;}
function drawPatch(c,k,sp,dim,v,p){const col=(p.c==='hi'&&p.tone)?toneHex(v.accent,p.tone.l*dim,p.tone.w):shade(pcolor(v,p.c),dim),seed=p.a*53+p.b*17+p.c.length*7;
  for(const sd of[['top',1],['bot',-1]]){const band=p[sd[0]];if(!band)continue;
    const path=stripPath(k,sp,p.a,p.b,sd[1],band[0],band[1],seed+sd[1]*4);
    c.fillStyle=col;c.fill(path);
    if(p.soft){c.save();c.clip(path);                                  // sashi: feather the leading edge into the base
      const A=sampleSpineN(sp,p.a),B=sampleSpineN(sp,Math.min(p.b,p.a+.12));
      const g=c.createLinearGradient(A.x,A.y,B.x,B.y);g.addColorStop(0,shade(v.base,dim));g.addColorStop(1,hexA(v.base,0));
      c.fillStyle=g;c.fill(path);c.restore();}}}
// reticulated scale net (Asagi/Shusui) — fukurin scallops over the back
function netBack(c,k,sp,dim){c.strokeStyle='rgba(24,36,54,.32)';c.lineWidth=.7;
  for(let i=2;i<sp.length-1;i++){const s=sp[i],sw=ewd(k)*widthAt(s.t);
    for(let u=-.85;u<=.85;u+=.34){const cx=s.x+s.nx*sw*u,cy=s.y+s.ny*sw*u,r=Math.max(1.3,sw*.2);
      c.beginPath();c.arc(cx,cy,r,k.ang+Math.PI*.25,k.ang+Math.PI*.78);c.stroke();}}}
// scale shimmer for solid/metallic koi — so an orange or gold body reads as scaled, not flat paint
function bodyScales(c,k,sp,dim,strong){const a=strong?.11:.06;
  for(let i=2;i<sp.length-1;i++){const s=sp[i],sw=ewd(k)*widthAt(s.t);
    for(let u=-.8;u<=.8;u+=.3){const cx=s.x+s.nx*sw*u,cy=s.y+s.ny*sw*u,r=Math.max(1.4,sw*.22);
      c.strokeStyle=`rgba(255,255,255,${a})`;c.lineWidth=.7;c.beginPath();c.arc(cx,cy,r,k.ang+Math.PI*.18,k.ang+Math.PI*.82);c.stroke();
      c.strokeStyle=`rgba(0,0,0,${a*.5})`;c.beginPath();c.arc(cx,cy,r,k.ang+Math.PI*1.0,k.ang+Math.PI*1.4);c.stroke();}}}
function headMark(c,k,sp,dim,v){const h=sampleSpineN(sp,.07),w=ewd(k)*widthAt(.07);
  if(v.head.type==='dot'){c.fillStyle=shade(v.accent,dim);c.beginPath();c.ellipse(h.x,h.y,w*1.05,w*1.18,k.ang,0,TAU);c.fill();}
  else if(v.head.type==='blotch'){c.fillStyle=shade(v.accent,dim);c.beginPath();c.ellipse(h.x,h.y,w*.95,w*1.12,k.ang,0,TAU);c.fill();
    if(v.menware){c.strokeStyle=shade(v.base,dim);c.lineWidth=Math.max(1.6,w*.42);c.lineCap='round';
      c.beginPath();c.moveTo(h.x-Math.cos(k.ang)*w*.6,h.y-Math.sin(k.ang)*w*.6);c.lineTo(h.x+Math.cos(k.ang)*w*.85,h.y+Math.sin(k.ang)*w*.85);c.stroke();c.lineCap='butt';}}}
// straight-ish pose for the codex (head to the right) — feeds the live koi renderer
function staticSpine(cx,cy,len,count,curve){const pts=[];
  for(let i=0;i<count;i++){const t=i/(count-1);pts.push({x:cx+len*(.5-t),y:cy+Math.sin(t*Math.PI*1.1)*curve,t});}
  for(let i=0;i<count;i++){const a=pts[Math.max(0,i-1)],b=pts[Math.min(count-1,i+1)];let tx=b.x-a.x,ty=b.y-a.y;const l=Math.hypot(tx,ty)||1;tx/=l;ty/=l;pts[i].nx=-ty;pts[i].ny=tx;}
  return pts;}

// ---------- caustic light blobs (shared, cheap) ----------
const blobs=[];for(let i=0;i<7;i++)blobs.push({x:Math.random(),y:Math.random(),r:rand(.18,.4),sp:rand(.01,.03),ph:rand(0,TAU)});
// soft round sprite reused for wakes/light (cheap: drawImage instead of per-dot gradients)
const softSprite=(function(){const s=document.createElement('canvas');s.width=s.height=64;const g=s.getContext('2d');
  const rg=g.createRadialGradient(32,32,0,32,32,32);rg.addColorStop(0,'rgba(255,255,255,1)');rg.addColorStop(.5,'rgba(255,255,255,.38)');rg.addColorStop(1,'rgba(255,255,255,0)');
  g.fillStyle=rg;g.fillRect(0,0,64,64);return s;})();
function drawWakes(c){c.save();c.globalCompositeOperation='screen';
  for(const k of Pond.koi){const dimk=lerp(.5,1,1-k.depth);
    for(const w of k.wake){const p=w.age/1.5;if(p>=1)continue;
      const r=4+w.age*9, a=(1-p)*(1-p)*.13*dimk;          // disturbance spreads out and fades
      c.globalAlpha=a;c.drawImage(softSprite,w.x-r,w.y-r*.72,r*2,r*1.44);}}
  c.globalAlpha=1;c.restore();}
function drawSparkles(c){if(!Pond.sparkles.length)return;c.save();c.globalCompositeOperation='screen';
  for(const s of Pond.sparkles){const tw=Math.sin(s.age/s.life*Math.PI), a=tw*tw*s.mag; if(a<=0)continue;
    const r=2+tw*3*s.mag;
    c.globalAlpha=a*.7;c.drawImage(softSprite,s.x-r,s.y-r,r*2,r*2);
    if(s.mag>.72){c.globalAlpha=a;c.strokeStyle='rgba(255,255,255,1)';c.lineWidth=.8;const L=r*2.4;
      c.beginPath();c.moveTo(s.x-L,s.y);c.lineTo(s.x+L,s.y);c.moveTo(s.x,s.y-L);c.lineTo(s.x,s.y+L);c.stroke();}}
  c.globalAlpha=1;c.restore();}
function caustics(c,w,h,t,color,blend){c.globalCompositeOperation=blend;
  for(const b of blobs){const x=(b.x+Math.sin(t*b.sp+b.ph)*.12)*w,y=(b.y+Math.cos(t*b.sp*.8+b.ph)*.1)*h,R=b.r*Math.min(w,h);
    const g=c.createRadialGradient(x,y,0,x,y,R);g.addColorStop(0,color);g.addColorStop(1,'transparent');
    c.fillStyle=g;c.beginPath();c.arc(x,y,R,0,TAU);c.fill();}c.globalCompositeOperation='source-over';}

// ---------- plants (shared natural draw) ----------
function drawPad(c,p,tint,opts){let R=18+(p.size??.4)*46*(p.grow??1);if(!isFinite(R)||R<2)R=18;const ry=R*.72;const metal=opts&&opts.metal;
  c.save();c.translate(p.rx??p.x,p.ry??p.y);c.rotate(p.rrot??p.rot);
  // floor shadow
  c.fillStyle='rgba(6,20,16,.22)';c.beginPath();c.ellipse(3,5,R,ry,0,0,TAU);c.fill();
  // pad body
  const g=c.createRadialGradient(-R*.2,-ry*.2,2,0,0,R);
  g.addColorStop(0, tint? tint[0] : '#3f6e3a');g.addColorStop(.7, tint? tint[1] : '#2d5630');g.addColorStop(1, tint? tint[2] : '#1f3f25');
  c.fillStyle=g;c.beginPath();c.ellipse(0,0,R,ry,0,0,TAU);c.fill();
  // notch (painted cleft, not an erase — safe on opaque canvas)
  c.fillStyle='rgba(12,28,20,.5)';
  c.beginPath();c.moveTo(0,0);c.lineTo(R*1.04,-ry*.15);c.lineTo(R*1.04,ry*.15);c.closePath();c.fill();
  if(metal){const rim=opts.rim||'#fff0c4';
    // metal finish: bright mirror rim + dark underside, a blown specular hotspot, NO machined pinwheel veins
    c.strokeStyle=hexA(rim,.4);c.lineWidth=1.5;c.beginPath();c.ellipse(0,0,R-1,ry-1,0,0,TAU);c.stroke();
    c.strokeStyle='rgba(0,0,0,.4)';c.lineWidth=1.3;c.beginPath();c.ellipse(.8,1,R-1,ry-1,0,0,TAU);c.stroke();
    c.globalCompositeOperation='screen';
    const hg=c.createRadialGradient(-R*.32,-ry*.36,1,-R*.28,-ry*.3,R*.8);
    hg.addColorStop(0,hexA(rim,.42));hg.addColorStop(.5,hexA(rim,.08));hg.addColorStop(1,'transparent');
    c.fillStyle=hg;c.beginPath();c.ellipse(0,0,R,ry,0,0,TAU);c.fill();
    c.globalCompositeOperation='source-over';
  }else{
    // rim sheen + veins (organic pad)
    c.strokeStyle='rgba(150,200,140,.18)';c.lineWidth=1.4;c.beginPath();c.ellipse(0,0,R-1,ry-1,0,0,TAU);c.stroke();
    c.strokeStyle='rgba(20,45,30,.3)';c.lineWidth=1;for(let i=0;i<7;i++){const a=i/7*TAU;c.beginPath();c.moveTo(0,0);c.lineTo(Math.cos(a)*R*.9,Math.sin(a)*ry*.9);c.stroke();}
  }
  c.restore();}
function drawLotus(c,p,pal,opts){const s=p.grow,px=p.rx??p.x,py=p.ry??p.y,pr=p.rrot??p.rot;
  const padTint=pal?pal.pad:null, pTop=pal?pal.petalTop:'#f6dfe8', pBot=pal?pal.petalBot:'#e98fb0', ctr=pal?pal.center:'#f3d27a';
  drawPad(c,{x:px-16,y:py+6,size:.4,grow:s,rot:pr},padTint,opts);drawPad(c,{x:px+18,y:py-4,size:.34,grow:s,rot:pr+1},padTint,opts);
  if(p.bloom>0){const b=p.bloom,cx=px,cy=py- 6*b, R=10+18*b;c.save();c.translate(cx,cy);
    for(let ring=2;ring>=0;ring--){const rr=R*(.5+ring*.28),pet=6+ring*2;
      for(let i=0;i<pet;i++){const a=i/pet*TAU+ring*.4;c.save();c.rotate(a);
        const g=c.createLinearGradient(0,0,0,-rr);g.addColorStop(0,pTop);g.addColorStop(1,hexA(pBot,.95));
        c.fillStyle=g;c.beginPath();c.moveTo(0,0);c.quadraticCurveTo(rr*.34,-rr*.6,0,-rr);c.quadraticCurveTo(-rr*.34,-rr*.6,0,0);c.fill();c.restore();}}
    c.fillStyle=ctr;c.beginPath();c.arc(0,0,R*.34*b+2,0,TAU);c.fill();c.restore();}}

// buoyant floating: idle bob (spring), slow rotation, rides passing waves
function floatPlant(p,dt){const t=Pond._t;
  const tx=Math.sin(t*.55+p.bp)*p.amp, ty=Math.cos(t*.42+p.bp*1.3)*p.amp*.7;   // gentle bob rest target
  for(const r of Pond.ripples){ if(r.s<=1) continue;                            // strong ripples lift/push
    const ddx=p.x-r.x, ddy=p.y-r.y, d=Math.hypot(ddx,ddy)||1;
    if(Math.abs(r.r-d)<14 && r.r<r.max*.92){ const f=(1-r.age/r.life)*18*dt/d; p.vx+=ddx*f; p.vy+=ddy*f; p.rv+=(Math.random()-.5)*.5*dt; } }
  const k=11, dmp=Math.pow(.1,dt);                                              // buoyant spring toward bob target
  p.vx+=(tx-p.dx)*k*dt; p.vy+=(ty-p.dy)*k*dt; p.vx*=dmp; p.vy*=dmp;
  p.dx+=p.vx*dt; p.dy+=p.vy*dt;
  p.rv=clamp(p.rv+Math.sin(t*.2+p.bp)*.03*dt,-.09,.09); p.rv*=Math.pow(.55,dt); p.rot+=p.rv*dt;
  p.rx=p.x+p.dx; p.ry=p.y+p.dy; p.rrot=p.rot;
}
// ---------- dream-pond drawing (Phase B) — one draw per entity, colored via ROLES() ----------
// water-lily cup on a mature pad (distinct from lotus: flat, small, sits at the pad edge)
function drawLily(c,p,R,ry){const b=p.bloom||0;if(b<=0)return;const RL=ROLES();
  c.save();c.translate((p.rx??p.x)+R*.55,(p.ry??p.y)-ry*.4);
  const r=(4+7*b);
  for(let i=0;i<7;i++){const a=i/7*TAU+(p.bp||0);c.save();c.rotate(a);
    const g=c.createLinearGradient(0,0,0,-r);g.addColorStop(0,RL.bloom.top);g.addColorStop(1,hexA(RL.bloom.bot,.9));
    c.fillStyle=g;c.beginPath();c.moveTo(0,0);c.quadraticCurveTo(r*.4,-r*.55,0,-r);c.quadraticCurveTo(-r*.4,-r*.55,0,0);c.fill();c.restore();}
  c.fillStyle=RL.bloom.center;c.beginPath();c.arc(0,0,r*.3,0,TAU);c.fill();c.restore();}
// pad with variety: classic / copper-edged / small clustering species (+ lily when mature)
function drawPadV(c,p,tint,opts){
  if(p.vr==='cluster'){const s=(p.size??.35)*.55;
    for(const o of [[-14,4,0],[12,-6,1.9],[2,12,3.7]])
      drawPad(c,{x:(p.rx??p.x)+o[0],y:(p.ry??p.y)+o[1],size:s,grow:p.grow,rot:(p.rrot??p.rot)+o[2]},tint,opts);
    return;}
  drawPad(c,p,tint,opts);
  if(p.vr==='copper'&&!(opts&&opts.metal)){                       // warm rim on the copper-edged variety
    let R=18+(p.size??.4)*46*(p.grow??1);if(!isFinite(R)||R<2)R=18;
    c.save();c.translate(p.rx??p.x,p.ry??p.y);c.rotate(p.rrot??p.rot);
    c.strokeStyle='rgba(196,102,54,.55)';c.lineWidth=2.2;c.beginPath();c.ellipse(0,0,R-1.5,R*.72-1.5,0,0,TAU);c.stroke();c.restore();}
  if(p.bloom>0){let R=18+(p.size??.4)*46*(p.grow??1);if(!isFinite(R))R=18;drawLily(c,p,R,R*.72);}}
// reeds/cattails — the pond's first vertical element; gentle sway; perch-to-be
function drawReed(c,p){const RL=ROLES(),g=p.grow??0,h=(26+52*g),sw=REDUCE?.3:1,t=Pond._t;
  c.save();c.translate(p.rx??p.x,p.ry??p.y);
  c.fillStyle='rgba(6,20,16,.2)';c.beginPath();c.ellipse(2,3,14,5,0,0,TAU);c.fill();   // waterline
  for(let i=0;i<p.n;i++){const bx=(i-(p.n-1)/2)*4.5,ph=p.bp+i*1.3,lean=Math.sin(t*.5+ph)*4*sw+Math.sin(ph)*5;
    const hh=h*(.7+.3*Math.sin(ph*2.1)),grad=c.createLinearGradient(0,0,0,-hh);
    grad.addColorStop(0,RL.foliage[2]);grad.addColorStop(1,RL.foliage[0]);
    c.strokeStyle=grad;c.lineWidth=2.1;c.beginPath();c.moveTo(bx,2);c.quadraticCurveTo(bx+lean*.4,-hh*.55,bx+lean,-hh);c.stroke();
    if(g>.55&&i<p.heads){c.fillStyle=RL.wood[0];c.beginPath();c.ellipse(bx+lean,-hh+5,2.6,7,lean*.02,0,TAU);c.fill();}}
  c.restore();}
// water iris — emergent accent bloom (feeds the bloom score)
function drawIris(c,p){const RL=ROLES(),g=p.grow??0,h=20+34*g,sw=REDUCE?.3:1,t=Pond._t;
  c.save();c.translate(p.rx??p.x,p.ry??p.y);
  c.fillStyle='rgba(6,20,16,.2)';c.beginPath();c.ellipse(1,2,10,4,0,0,TAU);c.fill();
  for(let i=0;i<p.n;i++){const bx=(i-1)*4,lean=Math.sin(t*.45+p.bp+i)*3*sw;
    const grad=c.createLinearGradient(0,0,0,-h);grad.addColorStop(0,RL.foliage[2]);grad.addColorStop(1,RL.foliage[1]);
    c.strokeStyle=grad;c.lineWidth=2.4;c.beginPath();c.moveTo(bx,1);c.quadraticCurveTo(bx+lean,-h*.6,bx+lean*1.4,-h);c.stroke();}
  if(p.bloom>0){const b=p.bloom,r=3+6*b,lean=Math.sin(t*.45+p.bp)*3*sw;c.translate(lean*1.4,-h);
    for(let i=0;i<3;i++){const a=i/3*TAU+.5;c.save();c.rotate(a);
      const pg=c.createLinearGradient(0,0,0,-r*1.4);pg.addColorStop(0,RL.bloom.center);pg.addColorStop(1,RL.bloom.bot);
      c.fillStyle=pg;c.beginPath();c.moveTo(0,0);c.quadraticCurveTo(r*.55,-r*.8,0,-r*1.4);c.quadraticCurveTo(-r*.55,-r*.8,0,0);c.fill();c.restore();}
    c.fillStyle=RL.bloom.top;c.beginPath();c.arc(0,0,r*.24,0,TAU);c.fill();}
  c.restore();}
// duckweed — drifting micro-pad clusters; koi nibble them (the pond feeds itself a little)
function drawDuckweed(c,p){const RL=ROLES(),g=p.grow??.6;
  c.save();c.translate(p.rx??p.x,p.ry??p.y);c.rotate(p.rrot??p.rot);
  for(let i=0;i<p.n;i++){const a=i/p.n*TAU+p.bp,d=5+8*((i*2.3)%1),r=(1.6+2.6*g)*(.7+.5*((i*1.7)%1));
    c.fillStyle=hexA(RL.foliage[0],.9);c.beginPath();c.ellipse(Math.cos(a)*d,Math.sin(a)*d*.8,r,r*.8,a,0,TAU);c.fill();}
  c.restore();}
// submerged grass — BELOW plane: darker, softer, parallax sway under the koi
function drawGrass(c,p){const RL=ROLES(),g=p.grow??0,h=18+40*g,sw=REDUCE?.3:1,t=Pond._t;
  c.save();c.globalAlpha=.55;c.translate(p.rx??p.x,p.ry??p.y);
  for(let i=0;i<p.n;i++){const bx=(i-(p.n-1)/2)*5,ph=p.bp+i*.9,lean=Math.sin(t*.35+ph)*7*sw;
    const hh=h*(.6+.4*Math.sin(ph*1.7)),grad=c.createLinearGradient(0,0,0,-hh);
    grad.addColorStop(0,shade(RL.foliage[2],.6));grad.addColorStop(1,shade(RL.foliage[1],.75));
    c.strokeStyle=grad;c.lineWidth=2.6;c.beginPath();c.moveTo(bx,3);c.quadraticCurveTo(bx+lean*.5,-hh*.5,bx+lean,-hh);c.stroke();}
  c.globalAlpha=1;c.restore();}
function drawPlant(c,p,pal,opts){switch(p.type){
  case 'lotus':drawLotus(c,p,pal,opts);break;
  case 'pad':drawPadV(c,p,pal,opts);break;
  case 'reed':drawReed(c,p);break;
  case 'iris':drawIris(c,p);break;
  case 'duckweed':drawDuckweed(c,p);break;
  case 'grass':drawGrass(c,p);break;}}
// hardscape — heavy forms that moss over grow (metal: oxidizing ore, via roles)
function drawRock(c,r){const RL=ROLES(),R=rockR(r);
  c.save();c.translate(r.x,r.y);
  c.fillStyle='rgba(4,14,11,.3)';c.beginPath();c.ellipse(2,4,R*1.05,R*.5,0,0,TAU);c.fill();  // waterline shadow
  if(r.form==='lantern'){const s=r.size*1.25;                                                // stone toro — squat, grounded; kasa OVERHANGS the light box
    c.fillStyle=RL.stone[1];c.beginPath();c.ellipse(0,2*s,11*s,4.5*s,0,0,TAU);c.fill();      // base stone
    c.fillStyle=RL.stone[2];c.fillRect(-4.5*s,-9*s,9*s,11*s);                                // short, thick post
    c.fillStyle=RL.stone[1];c.fillRect(-8*s,-12*s,16*s,3.4*s);                               // chudai (platform)
    c.fillStyle=RL.stone[0];c.fillRect(-7*s,-22*s,14*s,10*s);                                // hibukuro (light box)
    c.fillStyle='rgba(8,10,8,.72)';c.fillRect(-3.6*s,-20.4*s,7.2*s,7*s);                     // window (glows at dusk)
    c.fillStyle=RL.stone[1];c.beginPath();c.moveTo(-13*s,-22*s);                             // kasa — broad swept cap, wider than the box
    c.quadraticCurveTo(0,-31*s,13*s,-22*s);c.quadraticCurveTo(0,-25.5*s,-13*s,-22*s);c.closePath();c.fill();
    c.fillStyle=RL.stone[0];c.beginPath();c.arc(0,-27.5*s,2.1*s,0,TAU);c.fill();             // hoju (finial)
  }else if(r.form==='driftwood'){c.rotate(r.rot);
    const g=c.createLinearGradient(-R,0,R,0);g.addColorStop(0,RL.wood[2]);g.addColorStop(.5,RL.wood[0]);g.addColorStop(1,RL.wood[1]);
    c.fillStyle=g;c.beginPath();c.ellipse(0,0,R,R*.22,0,0,TAU);c.fill();
    c.fillStyle=RL.wood[1];c.beginPath();c.ellipse(-R*.65,-R*.1,R*.22,R*.1,.5,0,TAU);c.fill();
    c.strokeStyle=hexA(RL.wood[2],.6);c.lineWidth=1;for(let i=-1;i<2;i++){c.beginPath();c.moveTo(-R*.8,i*2.5);c.quadraticCurveTo(0,i*2.5+2,R*.8,i*2.5);c.stroke();}
  }else{c.rotate(r.rot);const fl=r.form==='slate'?.45:r.form==='boulder'?.8:.7;              // organic blob from seeded radii
    const g=c.createRadialGradient(-R*.3,-R*.3,2,0,0,R);g.addColorStop(0,RL.stone[0]);g.addColorStop(.65,RL.stone[1]);g.addColorStop(1,RL.stone[2]);
    c.fillStyle=g;c.beginPath();
    for(let i=0;i<=10;i++){const a=i/10*TAU,rr=R*(.82+.18*Math.sin(a*3+r.rot*7));i?c.lineTo(Math.cos(a)*rr,Math.sin(a)*rr*fl):c.moveTo(Math.cos(a)*rr,Math.sin(a)*rr*fl);}
    c.closePath();c.fill();
    c.strokeStyle='rgba(255,255,255,.1)';c.lineWidth=1.2;c.stroke();}
  if(r.grow>0.05){c.globalAlpha=.5*r.grow;c.fillStyle=RL.moss;                               // moss creeps with age
    for(let i=0;i<4;i++){const a=r.rot*3+i*1.7,d=R*.55;
      c.beginPath();c.ellipse(Math.cos(a)*d,Math.sin(a)*d*.5-R*.15,R*.3*r.grow+2,R*.18*r.grow+1.4,a,0,TAU);c.fill();}
    c.globalAlpha=1;}
  c.restore();}

// SKIN REGISTRY
// =================================================================
const SKINS={};
// entity/skin contract v2: an entity drawn once against ROLES() reads correctly in
// every skin (bespoke handlers still win). rain renders the Natural pond into its
// buffer, so its entities inherit Natural's roles by construction.
function ROLES(){const S=SKINS[skin];return (S&&S.roles)||SKINS.natural.roles;}

// ---- NATURAL (the canonical, reference-accurate core) ----
SKINS.natural={
  // canonical palette roles — the reference every skin re-voices
  roles:{foliage:['#4a7a44','#2d5630','#1f3f25'],foliageRim:'#96c88c',
         stone:['#8d867a','#645e52','#3c382f'],moss:'#4a6b3f',
         wood:['#6e4c30','#4a3220','#2e2114'],
         bloom:{top:'#f6dfe8',bot:'#e98fb0',center:'#f3d27a'},glow:'#f0cf86'},
  water(c,t){const g=c.createRadialGradient(W*.5,H*.42,Math.min(W,H)*.1,W*.5,H*.5,Math.max(W,H)*.8);
    g.addColorStop(0,'#3c7d68');g.addColorStop(.55,'#235448');g.addColorStop(1,'#0f2a23');
    c.fillStyle=g;c.fillRect(0,0,W,H);
    // layered sun-dapple caustics drifting at different rates/tints -> depth & motion
    caustics(c,W,H,t,'rgba(150,210,150,.10)','screen');
    caustics(c,W,H,t*1.3,'rgba(220,200,120,.06)','screen');
    caustics(c,W,H,t*.7+11,'rgba(120,180,210,.05)','screen');
    c.globalCompositeOperation='screen';
    // direct sunbeam pooling on the surface, slowly wandering
    const sbR=Math.max(W,H)*.34, sbA=.05+.035*Math.sin(t*.6);
    const bm=c.createRadialGradient(Pond.sun.x,Pond.sun.y,0,Pond.sun.x,Pond.sun.y,sbR);
    bm.addColorStop(0,`rgba(228,240,205,${sbA})`);bm.addColorStop(.6,`rgba(200,225,180,${sbA*.4})`);bm.addColorStop(1,'transparent');
    c.fillStyle=bm;c.beginPath();c.arc(Pond.sun.x,Pond.sun.y,sbR,0,TAU);c.fill();
    // whole-surface shimmer breathing slowly
    c.globalAlpha=.04+.03*Math.sin(t*.4);
    const sg=c.createRadialGradient(W*.4,H*.35,0,W*.5,H*.5,Math.max(W,H)*.7);
    sg.addColorStop(0,'rgba(200,230,210,1)');sg.addColorStop(1,'rgba(200,230,210,0)');
    c.fillStyle=sg;c.fillRect(0,0,W,H);c.globalAlpha=1;
    // soft surface ripple lines
    c.strokeStyle='rgba(180,220,200,.05)';c.lineWidth=1;
    for(let i=0;i<5;i++){const yy=((t*8+i*70)%(H+80))-40;c.beginPath();for(let x=0;x<=W;x+=24)c.lineTo(x,yy+Math.sin(x*.02+t+i)*5);c.stroke();}
    c.globalCompositeOperation='source-over';
    drawWakes(c);},
  koi(c,k,sp,dim){const v=k.V;
    // floor shadow (depth realism)
    c.save();c.globalAlpha=.16+.16*k.depth;c.filter='blur(3px)';c.fillStyle='#08160f';
    c.translate(5+k.depth*8,7+k.depth*9);bodyPath(c,k,sp);c.fill();c.restore();
    // fins under body
    c.fillStyle=hexA(v.metal? v.accent:'#e9e2d2',.22*dim);tailFin(c,k,sp);c.fill();pecFins(c,k,sp);
    // body base
    bodyPath(c,k,sp);
    if(v.metal){const g=c.createLinearGradient(k.x-ewd(k)*2,k.y-ewd(k)*2,k.x+ewd(k)*2,k.y+ewd(k)*2);
      g.addColorStop(0,shade(v.base,Math.min(1,dim*1.25)));g.addColorStop(.5,shade(v.base,dim));g.addColorStop(1,shade(v.base,dim*.7));c.fillStyle=g;}
    else c.fillStyle=shade(v.base,dim);
    c.fill();
    // markings (clipped to body)
    c.save();bodyPath(c,k,sp);c.clip();
    if(v.net) netBack(c,k,sp,dim);
    const pats=k.pattern||v.patches||[]; for(const p of pats) drawPatch(c,k,sp,dim,v,p);
    if(v.cheeks){const h=sp[2],w=ewd(k)*widthAt(h.t);for(const s of[1,-1]){c.fillStyle=hexA(v.cheeks,.7);c.beginPath();c.arc(h.x+h.nx*w*.7*s,h.y+h.ny*w*.7*s,w*.42,0,TAU);c.fill();}}
    if(v.head) headMark(c,k,sp,dim,v);
    if(v.motoguro){const pp=sampleSpineN(sp,.26),w=ewd(k)*widthAt(.26);for(const s of[1,-1]){c.fillStyle=hexA('#15110d',.78*dim);c.beginPath();c.ellipse(pp.x+pp.nx*w*s,pp.y+pp.ny*w*s,w*.5,w*.32,k.ang,0,TAU);c.fill();}}
    if(v.solid||v.metal) bodyScales(c,k,sp,dim,v.metal);
    // dorsal sheen
    const hd=sp[1],tl=sp[sp.length-2];const sg=c.createLinearGradient(hd.x,hd.y,tl.x,tl.y);
    sg.addColorStop(0,'rgba(255,255,255,.16)');sg.addColorStop(.4,'rgba(255,255,255,.05)');sg.addColorStop(1,'rgba(0,0,0,.08)');
    c.fillStyle=sg;bodyPath(c,k,sp);c.fill();
    c.restore();
    // crisp rim light — sharpens the silhouette against the water
    c.lineWidth=1;c.strokeStyle=`rgba(248,253,246,${.12*dim})`;bodyPath(c,k,sp);c.stroke();
    // eyes + barbels
    const hd2=sp[1],w2=ewd(k)*widthAt(hd2.t);c.fillStyle='rgba(20,16,12,.85)';
    for(const s of[1,-1]){c.beginPath();c.arc(hd2.x+hd2.nx*w2*.55*s,hd2.y+hd2.ny*w2*.55*s,1.6+ewd(k)*.06,0,TAU);c.fill();}},
  plant(c,p){drawPlant(c,p,null);},
  overlay(c,t){
    // --- Pass 3: glassy reflection & depth ---
    c.globalCompositeOperation='screen';
    // broad sky-sheen reflected on the surface, drifting slowly (counter to the sunbeam)
    const shx=W*(.5-.3*Math.sin(Pond._t*.04)), shy=H*(.32+.2*Math.cos(Pond._t*.03));
    const sh=c.createRadialGradient(shx,shy,0,shx,shy,Math.max(W,H)*.6);
    sh.addColorStop(0,`rgba(150,186,196,${.05+.02*Math.sin(t*.3)})`);sh.addColorStop(1,'transparent');
    c.fillStyle=sh;c.fillRect(0,0,W,H);
    // fresnel rim — water reflects more light at its grazing edges (glassy ring)
    const fr=c.createRadialGradient(W/2,H/2,Math.min(W,H)*.5,W/2,H/2,Math.max(W,H)*.82);
    fr.addColorStop(0,'transparent');fr.addColorStop(.5,'rgba(155,185,182,.06)');fr.addColorStop(1,'transparent');
    c.fillStyle=fr;c.fillRect(0,0,W,H);
    c.globalCompositeOperation='source-over';
    // drifting petals (life)
    c.fillStyle='rgba(245,210,224,.5)';for(const pt of Pond.petals){c.save();c.translate(pt.x,pt.y);c.rotate(pt.r);c.beginPath();c.ellipse(0,0,3.2,1.6,0,0,TAU);c.fill();c.restore();}
    // depth — cooler, deeper darkening framing the pond
    const g=c.createRadialGradient(W/2,H*.46,Math.min(W,H)*.3,W/2,H*.54,Math.max(W,H)*.74);
    g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(2,14,14,.55)');c.fillStyle=g;c.fillRect(0,0,W,H);}
};

// ---- LIQUID METAL ----
// Principle: metal is a FINISH, not a palette. Each element keeps its real koi-pond hue
// but is cast in its ORGANIC metal — read from specular behaviour (blown highlights on a
// dark mirror), full-frame: substrate, light, ripples, pads, koi.
// map a koi's variety to its organic metal {base,accent,sumi,shiro,rim, cool?}
function koiMetal(v){
  if(v===V.platinum) return {cool:1,base:'#dfe7ec',accent:'#aebcc6',sumi:'#5b6770',shiro:'#f2f6f8',rim:'#ffffff'}; // cool silver — the focal accent
  if(v===V.ogon)     return {base:'#e7b85a',accent:'#f6d98a',sumi:'#7a5320',shiro:'#f6e6b0',rim:'#fff0c4'};        // molten brass / gold
  if(v===V.benigoi)  return {base:'#c66a3a',accent:'#e89a5e',sumi:'#6e2e16',shiro:'#f0b07a',rim:'#ffd8a8'};        // copper-red
  const n=v.base.replace('#',''),lum=(parseInt(n.substr(0,2),16)+parseInt(n.substr(2,2),16)+parseInt(n.substr(4,2),16))/3;
  if(lum<90)         return {base:'#33271a',accent:'#c87a44',sumi:'#1a130c',shiro:'#caa86a',rim:'#ffe0a8'};        // dark-based (Showa) -> dark bronze
  return {base:'#e9ddc6',accent:'#c87a44',sumi:'#5a4632',shiro:'#f3ead6',rim:'#ffe9c4'};                           // copper-and-silver (Kohaku/Sanke/Tancho/Asagi)
}
// the temperature split (v0.5): warm bronze MIDS, but the speculars (a reflected dusk sky) are COOL
// silver-blue — cool-on-warm is the single biggest "real metal" cue. Bodies warm, highlights cool.
const METAL_COOL='#dce8ff';
// a flowing chrome reflection ribbon (v0.6): a bright COOL band whose edges undulate and travel,
// like liquid mercury catching a moving environment. Cheap: one wavy filled path, screen-blended.
function chromeRibbon(c,yc,thick,t,seed,a){const step=Math.max(16,W/90|0);
  c.beginPath();
  for(let x=-24;x<=W+24;x+=step){const y=yc-thick/2+Math.sin(x*.011+t*.8+seed)*16+Math.sin(x*.005-t*.5+seed*1.7)*9;x<=-24?c.moveTo(x,y):c.lineTo(x,y);}
  for(let x=W+24;x>=-24;x-=step){const y=yc+thick/2+Math.sin(x*.011+t*.8+seed+.6)*16+Math.sin(x*.005-t*.5+seed*1.7+.6)*9;c.lineTo(x,y);}
  c.closePath();
  const g=c.createLinearGradient(0,yc-thick,0,yc+thick);
  g.addColorStop(0,'transparent');g.addColorStop(.5,`rgba(210,226,255,${a})`);g.addColorStop(1,'transparent');
  c.fillStyle=g;c.fill();}
SKINS.metal={
  // roles: everything is a metal — foliage patinas, stone oxidizes as ore, wood is old bronze
  roles:{foliage:['#c9b06a','#7d8a6a','#3f4a3a'],foliageRim:'#ffe6a6',
         stone:['#9a8a68','#5f5442','#2e2a20'],moss:'#5d7261',
         wood:['#8a6a3c','#5c4628','#342818'],
         bloom:{top:'#ffe9b0',bot:'#d8a24a',center:'#ffd86a'},glow:'#ffd88a'},
  rip:{crest:[214,232,255,.36],trough:[5,4,3,.15],cw:1.9},    // mercury beading: bright COOL specular crest, deep dark trough
  // --- mercury substrate: warm bronze mids, genuinely deep darks, COOL blown speculars (high dynamic range) ---
  water(c,t){const g=c.createLinearGradient(0,0,0,H);g.addColorStop(0,'#241a10');g.addColorStop(.5,'#0e0905');g.addColorStop(1,'#050302');
    c.fillStyle=g;c.fillRect(0,0,W,H);
    // warm caustics keep the bronze mids molten (the WARM half of the split)
    caustics(c,W,H,t*.5,'rgba(216,150,82,.12)','screen');
    caustics(c,W,H,t*.7+11,'rgba(150,84,38,.08)','screen');
    c.globalCompositeOperation='screen';
    // COOL specular pool where the mirror catches the dusk sky — the hottest light is cool and blows out
    const sbR=Math.max(W,H)*.46,bm=c.createRadialGradient(Pond.sun.x,Pond.sun.y,0,Pond.sun.x,Pond.sun.y,sbR);
    bm.addColorStop(0,'rgba(234,241,255,.40)');bm.addColorStop(.2,'rgba(176,198,236,.16)');
    bm.addColorStop(.55,'rgba(150,116,84,.06)');bm.addColorStop(1,'transparent');
    c.fillStyle=bm;c.beginPath();c.arc(Pond.sun.x,Pond.sun.y,sbR,0,TAU);c.fill();
    // FLOWING CHROME (v0.6): a reflected horizon glow + ribbons that undulate and travel like liquid mercury
    chromeRibbon(c,H*(.46+.03*Math.sin(t*.25)),H*.34,t*.6,0,.10);            // broad slow reflected horizon
    const fs=REDUCE?.4:1;
    for(let i=0;i<3;i++){const yc=(((t*22*(i+1)*fs+i*230)%(H+260))-130);chromeRibbon(c,yc,46+i*14,t*(1+i*.3),i*2.1,.13-i*.025);}
    c.globalCompositeOperation='source-over';drawWakes(c);},
  // --- warm wet-metal koi (the real pattern, cast in metal), one cool silver focal ---
  koi(c,k,sp,dim){const m=koiMetal(k.V),vm={...k.V,base:m.base,accent:m.accent,sumi:m.sumi,shiro:m.shiro};
    // fins under the body
    c.fillStyle=hexA(m.base,.24*dim);tailFin(c,k,sp);c.fill();pecFins(c,k,sp);
    // body: warm metal flanks, a COOL specular band, genuinely dark edges (cool-on-warm, high contrast)
    bodyPath(c,k,sp);const mid=sp[sp.length>>1],wd=ewd(k)*2.1;
    const cool=m.cool?'#ffffff':METAL_COOL;                            // platinum gets the whitest/brightest highlight
    const tb=clamp(.5+.24*Math.sin(Pond._t*.9+k.phase*1.3),.2,.8);     // the cool reflection SLIDES across the flank (chrome flow)
    const bg=c.createLinearGradient(mid.x-mid.nx*wd,mid.y-mid.ny*wd,mid.x+mid.nx*wd,mid.y+mid.ny*wd);
    bg.addColorStop(0,shade(m.sumi,dim*.7));

    bg.addColorStop(tb,cool);
    bg.addColorStop(clamp(tb+.18,.26,.96),shade(m.base,dim));
    bg.addColorStop(1,shade(m.sumi,dim*.7));

    if(k.V.cheeks){const h=sp[2],w=ewd(k)*widthAt(h.t);for(const s of[1,-1]){c.fillStyle=hexA(m.accent,.7);c.beginPath();c.arc(h.x+h.nx*w*.7*s,h.y+h.ny*w*.7*s,w*.42,0,TAU);c.fill();}}
    if(k.V.head) headMark(c,k,sp,dim,vm);
    if(k.V.motoguro){const pp=sampleSpineN(sp,.26),w=ewd(k)*widthAt(.26);for(const s of[1,-1]){c.fillStyle=hexA(m.sumi,.8*dim);c.beginPath();c.ellipse(pp.x+pp.nx*w*s,pp.y+pp.ny*w*s,w*.5,w*.32,k.ang,0,TAU);c.fill();}}
    bodyScales(c,k,sp,dim,1);                                          // strong scale shimmer — metal reads scaled
    // a bright COOL specular hotspot sliding along the back (cool-on-warm reads as wet metal)
    const hs=sampleSpineN(sp,clamp(.5+.2*Math.sin(Pond._t*.6+k.phase),.12,.9)),hr=ewd(k)*1.8;
    c.globalCompositeOperation='screen';const hg=c.createRadialGradient(hs.x,hs.y,0,hs.x,hs.y,hr);
    hg.addColorStop(0,hexA(cool,(m.cool?.9:.62)*dim));hg.addColorStop(1,'transparent');
    c.fillStyle=hg;c.beginPath();c.arc(hs.x,hs.y,hr,0,TAU);c.fill();c.globalCompositeOperation='source-over';
    c.restore();
    // sharp COOL leading-edge rim — separates the koi as a polished object sitting ON the warm mirror
    c.lineWidth=1.7;c.strokeStyle=hexA(cool,(m.cool?.9:.66)*dim);bodyPath(c,k,sp);c.stroke();
    // eyes
    const e=sp[1],ew=ewd(k)*widthAt(e.t);c.fillStyle='rgba(12,10,8,.9)';
    for(const s of[1,-1]){c.beginPath();c.arc(e.x+e.nx*ew*.55*s,e.y+e.ny*ew*.55*s,1.6+ewd(k)*.06,0,TAU);c.fill();}},
  // --- pads: polished brass when young -> MUTED verdigris patina as they mature (oxidized bronze-green, NOT jade) ---
  plant(c,p){const g=clamp(p.grow??0,0,1);
    // desaturated, grey-leaning patina so foliage no longer out-shouts the speculars (focal hierarchy)
    const tint=[mixHex('#f3d886','#9aa99a',g),mixHex('#c79a44','#5d7261',g),mixHex('#7a5a20','#2f3d35',g)];
    const rim=mixHex('#ffe6a6','#9fb4ad',g);   // brass sheen young -> cool muted patina mature
    if(p.type==='lotus') drawLotus(c,p,{pad:tint,petalTop:'#ffe9b0',petalBot:'#d8a24a',center:'#ffd86a'},{metal:1,rim});
    else if(p.type==='pad') drawPadV(c,p,tint,{metal:1,rim});

  overlay(c,t){c.globalCompositeOperation='screen';                    // a cool dusk sky reflected on the mirror (cool highlights)
    const shx=W*(.5-.3*Math.sin(Pond._t*.04)),shy=H*.3,sh=c.createRadialGradient(shx,shy,0,shx,shy,Math.max(W,H)*.6);
    sh.addColorStop(0,`rgba(198,214,255,${.07+.025*Math.sin(t*.3)})`);sh.addColorStop(1,'transparent');
    c.fillStyle=sh;c.fillRect(0,0,W,H);c.globalCompositeOperation='source-over';
    const g=c.createRadialGradient(W/2,H/2,Math.min(W,H)*.28,W/2,H/2,Math.max(W,H)*.74);
    g.addColorStop(0,'transparent');g.addColorStop(1,'rgba(0,0,0,.62)');c.fillStyle=g;c.fillRect(0,0,W,H);}    // deeper vignette boosts mirror contrast
};
