// ---- RAIN ON GLASS (renders the NATURAL pond into a blurred buffer, then fogs + droplets) ----
let pond=null,pondCtx=null,fog=null,fogCtx=null,drops=[],PS=.5;
function buildBuffers(){if(!W)return;pond=document.createElement('canvas');pond.width=Math.max(2,W*PS|0);pond.height=Math.max(2,H*PS|0);pondCtx=pond.getContext('2d');
  fog=document.createElement('canvas');fog.width=W;fog.height=H;fogCtx=fog.getContext('2d');drops=[];for(let i=0;i<70;i++)drops.push({x:rand(0,W),y:rand(-H,H),r:rand(2.5,8),vy:0,trail:rand(.4,1)});}
SKINS.rain={
  full:true, // draws everything itself
  render(c,t){const w=pond.width,h=pond.height;pondCtx.save();pondCtx.clearRect(0,0,w,h);
    pondCtx.scale(PS,PS);SKINS.natural.water(pondCtx,t);
    for(const p of Pond.plants)if(BELOW_TYPES[p.type])SKINS.natural.plant(pondCtx,p);
    for(const r of Pond.rocks)drawRock(pondCtx,r);
    for(const k of Pond.koi){const sp=spine(k,18);SKINS.natural.koi(pondCtx,k,sp,lerp(.62,1,1-k.depth));}
    for(const p of Pond.plants)if(!BELOW_TYPES[p.type])SKINS.natural.plant(pondCtx,p);
    for(const f of Pond.food){if(f.r<=0)continue;pondCtx.fillStyle='#c39a5e';pondCtx.beginPath();pondCtx.ellipse(f.x,f.y,f.r,f.r*.84,0,0,TAU);pondCtx.fill();}
    pondCtx.restore();
    c.imageSmoothingEnabled=true;c.filter='blur(2px)';c.drawImage(pond,0,0,W,H);c.filter='none';
    c.fillStyle='rgba(40,30,20,.12)';c.fillRect(0,0,W,H);
    fogCtx.clearRect(0,0,W,H);fogCtx.fillStyle='rgba(205,212,210,.5)';fogCtx.fillRect(0,0,W,H);fogCtx.globalCompositeOperation='destination-out';
    for(const d of drops){fogCtx.beginPath();fogCtx.ellipse(d.x,d.y,d.r*.7,d.r,0,0,TAU);fogCtx.fill();if(d.vy>4)fogCtx.fillRect(d.x-d.r*.4*d.trail,d.y-d.vy*.5,d.r*.8*d.trail,d.vy*.5);}
    fogCtx.globalCompositeOperation='source-over';c.drawImage(fog,0,0);
    for(const d of drops){const hg=c.createRadialGradient(d.x-d.r*.3,d.y-d.r*.3,0,d.x,d.y,d.r);hg.addColorStop(0,'rgba(255,255,255,.5)');hg.addColorStop(.6,'rgba(255,255,255,.06)');hg.addColorStop(1,'rgba(0,0,0,.1)');
      c.fillStyle=hg;c.beginPath();c.ellipse(d.x,d.y,d.r*.78,d.r,0,0,TAU);c.fill();}
    for(const d of drops){d.r+=(Math.random()<.02?rand(0,1.2):0);if(d.r>6||Math.random()<.01)d.vy+=.5;d.vy*=.96;d.y+=d.vy;if(d.vy>1)d.r*=.992;
      if(d.y>H+10||d.r<1.6)Object.assign(d,{x:rand(0,W),y:rand(-40,-5),r:rand(2.5,8),vy:0,trail:rand(.4,1)});}
    for(const r of Pond.ripples)if(r.age<.05&&r.s>1)for(let i=0;i<3;i++)drops.push({x:r.x+rand(-12,12),y:r.y+rand(-12,12),r:rand(3,7),vy:0,trail:rand(.4,1)});}
};

// ---------- generic fx (ripples + food) for non-rain skins ----------
function drawFX(c){
  // per-skin ripple styling — metal beads into bright specular mercury; others stay watery
  const RIP=(SKINS[skin]&&SKINS[skin].rip)||{crest:[218,238,228,.17],trough:[6,26,20,.08],cw:1.6};
  for(const r of Pond.ripples){const p=r.age/r.life;if(p>=1)continue;const fade=1-p;
    const rings=r.s>1?3:2;                                  // a little wave train, not one ring
    for(let n=0;n<rings;n++){const rr=r.r-n*7;if(rr<2)continue;const rf=fade*(1-n*.3);
      c.globalCompositeOperation='screen';c.lineWidth=RIP.cw;c.strokeStyle=`rgba(${RIP.crest[0]},${RIP.crest[1]},${RIP.crest[2]},${RIP.crest[3]*rf*Math.min(1.4,r.s)})`;
      c.beginPath();c.arc(r.x,r.y,rr,0,TAU);c.stroke();                         // crest catches light
      c.globalCompositeOperation='source-over';c.lineWidth=1.4;c.strokeStyle=`rgba(${RIP.trough[0]},${RIP.trough[1]},${RIP.trough[2]},${RIP.trough[3]*rf})`;
      c.beginPath();c.arc(r.x,r.y,rr+2.4,0,TAU);c.stroke();}}                   // trough = bent light just outside
  c.globalCompositeOperation='source-over';
  for(const f of Pond.food){if(f.r<=0)continue;
    c.fillStyle='rgba(18,12,6,.28)';c.beginPath();c.ellipse(f.x+.8,f.y+1.1,f.r,f.r*.84,0,0,TAU);c.fill();
    c.fillStyle=`hsl(${33+(f.hue||0)},44%,57%)`;c.beginPath();c.ellipse(f.x,f.y,f.r,f.r*.84,0,0,TAU);c.fill();
    c.fillStyle='rgba(255,244,222,.55)';c.beginPath();c.arc(f.x-f.r*.3,f.y-f.r*.32,f.r*.34,0,TAU);c.fill();}
  // ripple rings break into foam at rock rims (cheap arc highlight, not wave physics)
  for(const r of Pond.ripples){const p2=r.age/r.life;if(p2>=1)continue;
    for(const rk of Pond.rocks){const d=Math.hypot(rk.x-r.x,rk.y-r.y),rr=rockR(rk);
      if(Math.abs(r.r-d)<7&&d>rr*.5){const a=Math.atan2(r.y-rk.y,r.x-rk.x);
        c.globalCompositeOperation='screen';c.strokeStyle=`rgba(235,245,240,${.3*(1-p2)})`;c.lineWidth=2;
        c.beginPath();c.arc(rk.x,rk.y,rr*.9,a-.55,a+.55);c.stroke();c.globalCompositeOperation='source-over';}}}
  if(sel&&!sel.departing){const pu=.35+.15*Math.sin(Pond._t*2.4);                   // quiet ring under the selected koi
    c.strokeStyle=`rgba(240,207,134,${pu})`;c.lineWidth=1.4;
    c.beginPath();c.ellipse(sel.x,sel.y,elen(sel)*.62,elen(sel)*.4,sel.ang,0,TAU);c.stroke();}
  if(drag){const p=drag.plant||drag.rock,R=drag.rock?rockR(p)+6:(p.type==='lotus'?48:24+(p.size??.3)*46*(p.grow??1));
    c.strokeStyle='rgba(244,238,224,.4)';c.lineWidth=1.5;c.beginPath();c.arc(p.rx??p.x,p.ry??p.y,R,0,TAU);c.stroke();}
}

// =================================================================
// SIMULATION (skin-agnostic)
// =================================================================
function updateKoi(k,dt){
  if(k.departing){                                                   // "let it swim on": gather way toward the edge and go
    const a=Math.atan2(k.exit.y-k.y,k.exit.x-k.x);let da=((a-k.ang+Math.PI*3)%TAU)-Math.PI;
    k.ang+=clamp(da,-2,2)*dt*1.4;k.x+=Math.cos(k.ang)*k.spd*1.7*dt;k.y+=Math.sin(k.ang)*k.spd*1.7*dt;
    k.trail.unshift({x:k.x,y:k.y});const mx=Math.ceil(elen(k)*1.25/4)+4;if(k.trail.length>mx)k.trail.length=mx;
    const tlx=k.x-Math.cos(k.ang)*elen(k)*.82, tly=k.y-Math.sin(k.ang)*elen(k)*.82, lw=k.wake[0];
    if(!lw||((tlx-lw.x)**2+(tly-lw.y)**2)>30)k.wake.unshift({x:tlx,y:tly,age:0});
    for(const w of k.wake)w.age+=dt;while(k.wake.length&&k.wake[k.wake.length-1].age>1.5)k.wake.pop();
    k.phase+=dt*7*k.wig;k.finph+=dt*6;return;}
  k.turn+=(Math.sin(Pond._t*.4+k.phase)*.6+rand(-.4,.4))*dt;k.turn=clamp(k.turn,-1.2,1.2);let desired=k.turn;
  let bf=null,bd=1e9;for(const f of Pond.food){const d=(f.x-k.x)**2+(f.y-k.y)**2;if(d<bd){bd=d;bf=f;}}
  if(bf&&bd<280*280){const a=Math.atan2(bf.y-k.y,bf.x-k.x);let da=((a-k.ang+Math.PI*3)%TAU)-Math.PI;desired+=clamp(da,-2,2)*1.6;}
  for(const r of Pond.ripples)if(r.s>1&&r.age<.5){const dx=k.x-r.x,dy=k.y-r.y,d=Math.hypot(dx,dy);if(d<150){const a=Math.atan2(dy,dx);let da=((a-k.ang+Math.PI*3)%TAU)-Math.PI;desired+=da*(1-d/150)*1.3;}}
  for(const r of Pond.rocks){const dx=k.x-r.x,dy=k.y-r.y,d=Math.hypot(dx,dy),rr=rockR(r)+34;   // koi steer around stone
    if(d<rr){const a=Math.atan2(dy,dx);let da=((a-k.ang+Math.PI*3)%TAU)-Math.PI;desired+=da*(1-d/rr)*1.6;}}
  for(const p of Pond.plants){
    if(p.type==='reed'||p.type==='iris'){const dx=k.x-p.x,dy=k.y-p.y,d=Math.hypot(dx,dy);     // ...and emergent stems
      if(d<46){const a=Math.atan2(dy,dx);let da=((a-k.ang+Math.PI*3)%TAU)-Math.PI;desired+=da*(1-d/46)*1.2;}}
    else if(p.type==='duckweed'){const d2=(p.x-k.x)**2+(p.y-k.y)**2;                          // ambient nibble: the pond feeds itself a little
      if(d2<28*28){k.wellfed=Math.max(k.wellfed,1.5);k.age=Math.min(AGE_MAX,k.age+dt*.002);p.grow=Math.max(.35,p.grow-dt*.05);}}}
  const m=90,toC=Math.atan2(H/2-k.y,W/2-k.x);
  if(k.x<m||k.x>W-m||k.y<m||k.y>H-m){let da=((toC-k.ang+Math.PI*3)%TAU)-Math.PI;desired+=da*1.2;}
  k.ang+=clamp(desired,-2.4,2.4)*dt*.9;
  const eat=bf&&bd<160*160?1.5:1, eld=1-.28*eldF(k);              // elders drift slower, statelier
  k.x+=Math.cos(k.ang)*k.spd*eat*eld*dt;k.y+=Math.sin(k.ang)*k.spd*eat*eld*dt;
  if(bf&&bd<13*13){bf.r-=dt*7;k.hunger=Math.max(0,k.hunger-dt*.5);k.wellfed=4;k.age=Math.min(AGE_MAX,k.age+dt*GROW_FED);}
  k.age=Math.min(AGE_MAX,k.age+dt*PASSIVE_SEC);                    // blended growth: time counts too (idle sim covers away time)
  k.hunger=Math.min(1,k.hunger+dt*.012);k.wellfed=Math.max(0,k.wellfed-dt);
  k.trail.unshift({x:k.x,y:k.y});const mx=Math.ceil(elen(k)*1.25/4)+4;if(k.trail.length>mx)k.trail.length=mx;
  // wake: drop a disturbance point behind the tail when it has moved enough
  const tlx=k.x-Math.cos(k.ang)*elen(k)*.82, tly=k.y-Math.sin(k.ang)*elen(k)*.82;
  const lw=k.wake[0];
  if(!lw||((tlx-lw.x)**2+(tly-lw.y)**2)>30) k.wake.unshift({x:tlx,y:tly,age:0,nx:-Math.sin(k.ang),ny:Math.cos(k.ang)});
  for(const w of k.wake) w.age+=dt;
  while(k.wake.length && k.wake[k.wake.length-1].age>1.5) k.wake.pop();
  k.phase+=dt*6*k.wig;k.finph+=dt*5;
}
function thriving(){let f=0;for(const k of Pond.koi)f+=k.wellfed>0?1:.3;f/=Math.max(1,Pond.koi.length);
  let pg=0;for(const p of Pond.plants)pg+=p.grow;pg/=Math.max(1,Pond.plants.length);return clamp(f*.7+pg*.3,0,1);}
function feed(x,y){const n=6+(Math.random()*4|0);
  for(let i=0;i<n;i++){const a=Math.random()*TAU,d=Math.random()*24;
    Pond.food.push({x:x+Math.cos(a)*d,y:y+Math.sin(a)*d,r:rand(2.2,3.2),life:rand(12,16),hue:rand(-12,12)});}
  Pond.ripples.push({x,y,r:3,max:120,age:0,life:2,s:1.4});Pond.lastStir=Pond._t;}

function step(dt){Pond._t+=dt;
  if(drag){const p=drag.plant||drag.rock,heavy=!!drag.rock,r=Math.min(1,dt*(heavy?.9:3.5)),ox=p.x,oy=p.y;   // stone drags HEAVY; flora glides
    p.x+=(drag.tx-p.x)*r;p.y+=(drag.ty-p.y)*r;
    if(Math.hypot(p.x-ox,p.y-oy)>(heavy?.8:1.3)&&Math.random()<dt*10)Pond.ripples.push({x:ox,y:oy,r:3,max:heavy?74:52,age:0,life:1.1,s:heavy?1.15:1});}
  for(const k of Pond.koi)updateKoi(k,dt);
  for(let i=Pond.koi.length-1;i>=0;i--){const k=Pond.koi[i];                        // a departing koi reaches open water
    if(k.departing&&(k.x<-70||k.x>W+70||k.y<-70||k.y>H+70)){
      Pond.departed.push({variety:k.variety,seed:k.seed,age:k.age,departed:Date.now()});
      Pond.ripples.push({x:clamp(k.x,20,W-20),y:clamp(k.y,20,H-20),r:3,max:110,age:0,life:2.2,s:1.3});  // one farewell ripple
      Pond.koi.splice(i,1);persist();}}
  for(const r of Pond.ripples){r.age+=dt;r.r=lerp(r.r,r.max,1-Math.pow(.001,dt));}
  for(let i=Pond.ripples.length-1;i>=0;i--)if(Pond.ripples[i].age>Pond.ripples[i].life)Pond.ripples.splice(i,1);
  if(Pond.ripples.length>40) Pond.ripples.splice(0,Pond.ripples.length-40);
  for(const f of Pond.food)f.life-=dt;for(let i=Pond.food.length-1;i>=0;i--)if(Pond.food[i].life<=0||Pond.food[i].r<=0)Pond.food.splice(i,1);
  const th=thriving();
  for(const p of Pond.plants){p.grow=Math.min(1,p.grow+dt*.02*(.4+th));
    if((p.type==='lotus'||p.type==='iris')&&p.grow>.9)p.bloom=Math.min(1,p.bloom+dt*.05*(.4+th));
    if(p.type==='pad'&&p.vr!=='cluster'&&p.grow>.85)p.bloom=Math.min(1,(p.bloom||0)+dt*.012*(.4+th));   // old pads open a water-lily
    floatPlant(p,dt);}
  for(const r of Pond.rocks)r.grow=Math.min(1,r.grow+dt*.0015*(.4+th));             // moss creeps — things that persist wear their time
  // petals drift from blooming lotuses
  if(Math.random()<dt*.5){const lo=Pond.plants.find(p=>p.type==='lotus'&&p.bloom>.5);if(lo&&Pond.petals.length<40)Pond.petals.push({x:lo.x,y:lo.y,vx:rand(-6,6),vy:rand(4,12),r:rand(0,TAU),vr:rand(-1,1),life:rand(6,12)});}
  for(const pt of Pond.petals){pt.x+=pt.vx*dt;pt.y+=pt.vy*dt;pt.r+=pt.vr*dt;pt.life-=dt;}
  for(let i=Pond.petals.length-1;i>=0;i--)if(Pond.petals[i].life<=0||Pond.petals[i].y>H+10)Pond.petals.splice(i,1);
  // economy: serenity accrues with thriving
  Pond.econ.serenity+=dt*(.12+.7*th);
  // wandering sunbeam + surface sparkle glints
  Pond.sun.x=W*(.5+.34*Math.sin(Pond._t*.05)); Pond.sun.y=H*(.42+.26*Math.sin(Pond._t*.037+1));
  const sw=REDUCE?.4:1;
  if(Math.random()<dt*9*sw){ let sx,sy; if(Math.random()<.62){sx=Pond.sun.x+rand(-130,130);sy=Pond.sun.y+rand(-95,95);} else {sx=rand(0,W);sy=rand(0,H);}
    Pond.sparkles.push({x:sx,y:sy,age:0,life:rand(.4,.9),mag:rand(.5,1)}); }
  for(const r of Pond.ripples) if(r.s>1&&r.age<.4&&Math.random()<dt*4){const a=Math.random()*TAU;Pond.sparkles.push({x:r.x+Math.cos(a)*r.r,y:r.y+Math.sin(a)*r.r,age:0,life:rand(.3,.6),mag:rand(.6,1)});}
  for(const s of Pond.sparkles) s.age+=dt;
  for(let i=Pond.sparkles.length-1;i>=0;i--) if(Pond.sparkles[i].age>Pond.sparkles[i].life) Pond.sparkles.splice(i,1);
  if(Pond.sparkles.length>80) Pond.sparkles.splice(0,Pond.sparkles.length-80);
}

// =================================================================
// RENDER
// =================================================================
let skin='natural';
// ---- day cycle (QA PREVIEW of Phase C — codex-forced, session-only, never persisted) ----
// 'auto' = plain day until Phase C wires the real local-clock drift. Ink keeps its
// eternal dusk (per-skin ruling). Cheap: two full-frame fills, no ctx.filter.
const DayQA={force:null};   // null(auto->day) | 'dawn' | 'day' | 'dusk' | 'night'
function dayTint(c){const ph=DayQA.force||'day';if(ph==='day'||skin==='ink')return;
  if(ph==='dusk'){c.globalCompositeOperation='multiply';c.fillStyle='rgba(255,178,102,.5)';c.fillRect(0,0,W,H);
    c.globalCompositeOperation='screen';const g=c.createRadialGradient(W*.3,H*.25,0,W*.3,H*.25,Math.max(W,H)*.7);
    g.addColorStop(0,'rgba(255,160,80,.13)');g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(0,0,W,H);}
  else if(ph==='night'){c.globalCompositeOperation='multiply';c.fillStyle='rgba(104,120,164,.66)';c.fillRect(0,0,W,H);}
  else if(ph==='dawn'){c.globalCompositeOperation='multiply';c.fillStyle='rgba(224,212,224,.5)';c.fillRect(0,0,W,H);
    c.globalCompositeOperation='screen';c.fillStyle='rgba(255,214,214,.07)';c.fillRect(0,0,W,H);}
  if(ph==='dusk'||ph==='night'){c.globalCompositeOperation='screen';       // the lantern earns its place at dusk
    for(const r of Pond.rocks)if(r.form==='lantern'){const s=r.size*1.25,gx=r.x,gy=r.y-17*s;
      const gl=c.createRadialGradient(gx,gy,0,gx,gy,26*s);gl.addColorStop(0,'rgba(255,206,120,.5)');gl.addColorStop(1,'transparent');
      c.fillStyle=gl;c.beginPath();c.arc(gx,gy,26*s,0,TAU);c.fill();}}
  c.globalCompositeOperation='source-over';}
function render(t){
  // hard-reset canvas state each frame so no blend/blur/alpha can leak between skins or frames
  ctx.filter='none';ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.shadowColor='transparent';
  const S=SKINS[skin];ctx.save();
  try{
    if(S.full){S.render(ctx,t);dayTint(ctx);}
    else{S.water(ctx,t);
      const PL=S.plant||SKINS.natural.plant;
      for(const p of Pond.plants)if(BELOW_TYPES[p.type])PL(ctx,p);   // BELOW plane (submerged grass)
      for(const r of Pond.rocks)drawRock(ctx,r);                     // hardscape sits in the water, under the fish
      const ks=Pond.koi.slice().sort((a,b)=>b.depth-a.depth);
      for(const k of ks){const sp=spine(k,18);S.koi(ctx,k,sp,lerp(.6,1,1-k.depth));}
      for(const p of Pond.plants)if(!BELOW_TYPES[p.type])PL(ctx,p);  // ON plane (floating + emergent flora)
      drawFX(ctx);(S.overlay||(()=>{}))(ctx,t);drawSparkles(ctx);dayTint(ctx);}
  }catch(e){if(!render._warned){console.warn('skin render error:',e);render._warned=1;}}
  ctx.restore();
  // belt & suspenders: leave state clean for the next frame no matter what a skin did
  ctx.filter='none';ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.shadowBlur=0;
}

// =================================================================
// INPUT + CHROME
// =================================================================
const P={x:-999,y:-999,px:0,py:0};let lastMove=0, drag=null, sel=null, placing=null;
function plantAt(x,y){for(let i=Pond.plants.length-1;i>=0;i--){const p=Pond.plants[i];
  const R=(p.type==='lotus'?46:p.type==='pad'?18+p.size*46*p.grow:p.type==='duckweed'?18:p.type==='grass'?26:30)+10;
  if((x-p.x)**2+(y-p.y)**2<R*R)return p;}return null;}
function rockAt(x,y){for(let i=Pond.rocks.length-1;i>=0;i--){const r=Pond.rocks[i];
  const R=rockR(r)+8;if((x-r.x)**2+(y-r.y)**2<R*R)return r;}return null;}
function koiAt(x,y){let best=null,bd=1e9;for(const k of Pond.koi){if(k.departing)continue;
  const d=(x-k.x)**2+(y-k.y)**2,r=Math.max(20,elen(k)*.45);if(d<r*r&&d<bd){bd=d;best=k;}}return best;}
function move(x,y){P.px=P.x;P.py=P.y;P.x=x;P.y=y;
  if(drag){drag.tx=clamp(x,40,W-40);drag.ty=clamp(y,40,H-40);cv.style.cursor='grabbing';showUI();return;}
  const now=performance.now();
  if(now-lastMove>34){const dx=x-P.px,dy=y-P.py;if(dx*dx+dy*dy>9)Pond.ripples.push({x,y,r:2,max:90,age:0,life:1.5,s:1});lastMove=now;}
  cv.style.cursor=placing?'copy':(plantAt(x,y)||rockAt(x,y))?'grab':'crosshair';showUI();}
cv.addEventListener('pointermove',e=>move(e.clientX,e.clientY));
cv.addEventListener('pointerdown',e=>{const x=e.clientX,y=e.clientY;
  if(placing){placeAt(x,y);return;}                                          // composition belongs to the player
  const kh=koiAt(x,y);
  if(kh){showCard(kh);showUI();return;}                                      // click a koi -> its card; click water -> feed
  const rh=rockAt(x,y);
  if(rh){drag={rock:rh,tx:clamp(x,40,W-40),ty:clamp(y,40,H-40)};cv.style.cursor='grabbing';showUI();return;}
  const hit=plantAt(x,y);
  if(hit){const i=Pond.plants.indexOf(hit);if(i>=0){Pond.plants.splice(i,1);Pond.plants.push(hit);}  // lift to top
    drag={plant:hit,tx:clamp(x,40,W-40),ty:clamp(y,40,H-40)};cv.style.cursor='grabbing';showUI();}
  else{hideCard();feed(x,y);}});
addEventListener('pointerup',()=>{if(drag){persist();drag=null;cv.style.cursor='crosshair';}});
cv.addEventListener('pointerleave',()=>{P.x=-999;P.y=-999;});
const ser=document.getElementById('serN');
const skinsBar=document.getElementById('skins'),tendBar=document.getElementById('tend'),hint=document.getElementById('hint');
let uiTimer=null;
function tryHideUI(){ // never fade the chrome mid-task — open tray, armed chip, live drag, or koi card keep it up
  if(trayMode||placing||drag||(typeof kcard!=='undefined'&&!kcard.classList.contains('hide'))){uiTimer=setTimeout(tryHideUI,1500);return;}
  [skinsBar,tendBar].forEach(e=>e.classList.add('hide'));hint.style.opacity='0';}
function showUI(){[skinsBar,tendBar].forEach(e=>e.classList.remove('hide'));hint.style.opacity='1';clearTimeout(uiTimer);
  uiTimer=setTimeout(tryHideUI,3000);}
showUI();setTimeout(()=>hint.style.opacity='0',5500);
document.querySelectorAll('.pill').forEach(p=>p.addEventListener('click',()=>{const s=p.dataset.skin;if(s===skin)return;
  veil.style.opacity='1';setTimeout(()=>{skin=s;document.querySelectorAll('.pill').forEach(q=>q.classList.toggle('on',q.dataset.skin===s));veil.style.opacity='0';},220);}));
// ---- tend tray (release / plant / place) — the player's palette; everything is decor AND habitat ----
const cKoi=document.getElementById('cKoi'),bKoi=document.getElementById('buyKoi');
const openPlant=document.getElementById('openPlant'),openPlace=document.getElementById('openPlace'),trayEl=document.getElementById('tray');
function koiCost(){return 5+Pond.koi.length*4;}
const CATALOG={                                            // placeholder prices, gentle curve — real numbers in Phase D rebalance
 plant:[{t:'pad',vr:'classic',label:'pad',cost:6},{t:'pad',vr:'copper',label:'copper pad',cost:9},{t:'pad',vr:'cluster',label:'pad cluster',cost:10},
        {t:'lotus',label:'lotus',cost:8},{t:'reed',label:'reeds',cost:10},{t:'iris',label:'iris',cost:12},
        {t:'duckweed',label:'duckweed',cost:5},{t:'grass',label:'water grass',cost:8}],
 place:[{t:'stone',label:'river stone',cost:15},{t:'boulder',label:'boulder',cost:22},{t:'slate',label:'slate',cost:15},
        {t:'driftwood',label:'driftwood',cost:20},{t:'lantern',label:'stone lantern',cost:30}]};
let trayMode=null;
function buildTray(){trayEl.innerHTML='';if(!trayMode)return;
  CATALOG[trayMode].forEach((it,i)=>{const b=document.createElement('button');b.className='chip';
    b.innerHTML=`${it.label} <span class="c">${it.cost}</span>`;b.dataset.i=i;
    b.addEventListener('click',()=>armChip(it,b));trayEl.appendChild(b);});refreshTray();}
function refreshTray(){const s=Pond.econ.serenity;
  trayEl.querySelectorAll('.chip').forEach(b=>{const it=CATALOG[trayMode][+b.dataset.i];
    const capped=trayMode==='plant'?Pond.plants.length>=CAPS.plants:Pond.rocks.length>=CAPS.rocks;
    b.disabled=s<it.cost||capped;});}
function armChip(it,b){if(placing&&placing.it===it){placing=null;trayEl.querySelectorAll('.chip').forEach(q=>q.classList.remove('arm'));return;}
  placing={kind:trayMode,it};trayEl.querySelectorAll('.chip').forEach(q=>q.classList.remove('arm'));b.classList.add('arm');
  hint.textContent='tap the water to place it';hint.style.opacity='1';}
function placeAt(x,y){const it=placing.it,kind=placing.kind;placing=null;
  trayEl.querySelectorAll('.chip').forEach(q=>q.classList.remove('arm'));hint.textContent='drag to stir · click to feed · tend & grow';
  const capped=kind==='plant'?Pond.plants.length>=CAPS.plants:Pond.rocks.length>=CAPS.rocks;
  if(Pond.econ.serenity<it.cost||capped)return;
  Pond.econ.serenity-=it.cost;x=clamp(x,50,W-50);y=clamp(y,50,H-50);
  if(kind==='plant')Pond.plants.push(it.t==='pad'?makePad(x,y,undefined,it.vr):PLANT_MAKE[it.t](x,y));
  else Pond.rocks.push(makeRock(it.t,x,y));
  Pond.ripples.push({x,y,r:3,max:kind==='place'?100:60,age:0,life:1.8,s:kind==='place'?1.5:1});persist();showUI();}
function toggleTray(mode){if(trayMode===mode){trayMode=null;placing=null;trayEl.classList.add('hide');}
  else{trayMode=mode;placing=null;trayEl.classList.remove('hide');buildTray();}
  openPlant.style.opacity=trayMode==='plant'?1:'';openPlace.style.opacity=trayMode==='place'?1:'';showUI();}
openPlant.addEventListener('click',()=>toggleTray('plant'));
openPlace.addEventListener('click',()=>toggleTray('place'));
function syncShop(){const s=Math.floor(Pond.econ.serenity);ser.textContent=s;cKoi.textContent=koiCost();
  bKoi.disabled=s<koiCost()||Pond.koi.length>=CAPS.koi;            // ledger: quiet cap, no error state
  if(trayMode&&!trayEl.classList.contains('hide'))refreshTray();codexTick();}
bKoi.addEventListener('click',()=>{if(Pond.econ.serenity<koiCost()||Pond.koi.length>=CAPS.koi)return;Pond.econ.serenity-=koiCost();
  const pool=(Pond.unlocked&&Pond.unlocked.length)?Pond.unlocked:STARTERS;const v=pool[(Math.random()*pool.length)|0];const k=makeKoi(v,rand(W*.3,W*.7),rand(H*.3,H*.7),.3);Pond.koi.push(k);
  Pond.ripples.push({x:k.x,y:k.y,r:3,max:140,age:0,life:2.4,s:1.6});persist();showUI();});

// ---- koi card + graceful departure ("let it swim on" — curation, not commerce; no refund) ----
const kcard=document.getElementById('koicard'),kcName=document.getElementById('kcName'),kcJp=document.getElementById('kcJp'),
      kcStage=document.getElementById('kcStage'),kcLin=document.getElementById('kcLin'),
      kcSwim=document.getElementById('kcSwim'),kcX=document.getElementById('kcX');
function showCard(k){sel=k;kcSwim.classList.remove('confirm');kcSwim.textContent='let it swim on';
  const e=KOIDEX.find(d=>d.id===k.variety)||{name:k.variety,jp:''};
  kcName.textContent=e.name;kcJp.textContent=e.jp;
  kcStage.textContent=stage(k)+(stage(k)==='elder'?' · long-finned':'');
  kcLin.textContent=k.parents?'pond-born · carries two lineages':'released by hand';
  kcard.classList.remove('hide');}
function hideCard(){sel=null;kcard.classList.add('hide');}
kcX.addEventListener('click',hideCard);
kcSwim.addEventListener('click',()=>{if(!sel)return;
  if(!kcSwim.classList.contains('confirm')){kcSwim.classList.add('confirm');kcSwim.textContent="it won't return — let it swim on?";return;}
  const k=sel;hideCard();
  const ex=[[-90,k.y],[W+90,k.y],[k.x,-90],[k.x,H+90]]
    .sort((a,b)=>((a[0]-k.x)**2+(a[1]-k.y)**2)-((b[0]-k.x)**2+(b[1]-k.y)**2))[0];
  k.departing=1;k.exit={x:ex[0],y:ex[1]};});                       // the Almanac will remember it (step() records on exit)

// ---- dev lifecycle harness (?dev=1) — warps run the REAL idleReturn path, cap lifted ----
function devWarp(days){Pond.eco.lastSeen=Date.now()-days*864e5;idleReturn(true);persist();}
if(DEV){const dtr=document.getElementById('devtray');dtr.style.display='flex';
  const acts=[['+1d',()=>devWarp(1)],['+7d',()=>devWarp(7)],['+30d',()=>devWarp(30)],
    ['+200❀',()=>{Pond.econ.serenity+=200;}],
    ['mature flora',()=>{for(const p of Pond.plants){p.grow=1;if(p.type==='lotus'||p.type==='iris'||p.type==='pad')p.bloom=1;}for(const r of Pond.rocks)r.grow=1;persist();}],
    ['age koi +.3',()=>{for(const k of Pond.koi)k.age=Math.min(AGE_MAX,k.age+.3);persist();}]];
  for(const [l,fn] of acts){const b=document.createElement('button');b.className='chip';b.textContent=l;
    b.addEventListener('click',()=>{fn();showUI();});dtr.appendChild(b);}}

// ---- Koi Codex (first node of the pond-management nav; doubles as a QA view) ----
const KOIDEX=[
 {id:'kohaku',name:'Kohaku',jp:'紅白',cost:0,desc:'White body, stepped red (hi). The original koi.'},
 {id:'asagi',name:'Asagi',jp:'浅黄',cost:0,desc:'Blue-grey net back, red rising up the flanks.'},
 {id:'ogon',name:'Ogon',jp:'黄金',cost:0,desc:'Solid metallic gold with scale shimmer.'},
 {id:'platinum',name:'Platinum Ogon',jp:'白金',cost:40,desc:'Solid metallic white — luminous and clean.'},
 {id:'sanke',name:'Taisho Sanke',jp:'大正三色',cost:55,desc:'Red plus black above the lateral line; a clean white face.'},
 {id:'benigoi',name:'Benigoi',jp:'緋鯉',cost:60,desc:'Solid red-orange with scale shimmer, never flat.'},
 {id:'showa',name:'Showa Sanshoku',jp:'昭和三色',cost:75,desc:'Black-based; red and white over it, sumi wrapping the body.'},
 {id:'tancho',name:'Tancho',jp:'丹頂',cost:120,desc:'Pure white with a single red crown. Rare.'},
];
const codexEl=document.getElementById('codex'),cxList=document.getElementById('cxList'),codexBtn=document.getElementById('codexBtn');
function cxOwned(e){return e.cost===0||(Pond.unlocked||[]).includes(e.id);}
function buildCodex(){cxList.innerHTML='';
  { // Pond QA — time (temporary QA surface, human-requested; remove/gate before any wider push)
    const qa=document.createElement('div');qa.className='cx';
    qa.innerHTML=`<div class="info"><div class="nm">Pond QA <span class="jp">time</span></div>
      <div class="ds">day-cycle preview (Phase C grade, session-only) · time warps run the real return path.</div>
      <div class="act" id="qaTime"></div><div class="act" id="qaWarp"></div></div>`;
    cxList.appendChild(qa);
    const tRow=qa.querySelector('#qaTime');
    for(const ph of ['auto','dawn','day','dusk','night']){const b=document.createElement('button');b.className='ul';
      b.style.marginRight='5px';b.textContent=ph;
      if((DayQA.force||'auto')===ph)b.style.outline='2px solid rgba(240,207,134,.8)';
      b.addEventListener('click',()=>{DayQA.force=ph==='auto'?null:ph;buildCodex();});tRow.appendChild(b);}
    const wRow=qa.querySelector('#qaWarp');
    for(const [l,d] of [['+1 day',1],['+7 days',7],['+30 days',30]]){const b=document.createElement('button');b.className='ul';
      b.style.marginRight='5px';b.textContent=l;b.addEventListener('click',()=>{devWarp(d);});wRow.appendChild(b);}
  }
  for(const e of KOIDEX){const owned=cxOwned(e);
    const row=document.createElement('div');row.className='cx';
    row.innerHTML=`<canvas></canvas><div class="info"><div class="nm">${e.name} <span class="jp">${e.jp}</span></div>`+
      `<div class="ds">${e.desc}</div><div class="act">${owned?'<span class="own">✓ in your pond</span>':`<button class="ul" data-id="${e.id}" data-cost="${e.cost}">unlock · ${e.cost} ❀</button>`}</div></div>`;
    cxList.appendChild(row);
    const cv2=row.querySelector('canvas'),dpr=Math.min(2,devicePixelRatio||1),cw=104,ch=60;
    cv2.width=cw*dpr;cv2.height=ch*dpr;cv2.style.background='radial-gradient(80% 120% at 50% 40%,#1d4035,#10271f)';
    const cc=cv2.getContext('2d');cc.scale(dpr,dpr);if(!owned)cc.globalAlpha=.5;
    try{const k=makeKoi(e.id,cw*.5,ch*.5,1,e.id.length*37+11);k.ang=0;k.phase=.4;k.finph=.4;k.depth=0;k.trail=[];
      const sp=staticSpine(cw*.5,ch*.5,84,18,5);SKINS.natural.koi(cc,k,sp,1);}catch(err){console.warn('codex',e.id,err);}
  }
  cxList.querySelectorAll('.ul').forEach(b=>b.addEventListener('click',()=>{const id=b.dataset.id,cost=+b.dataset.cost;
    if(Pond.econ.serenity<cost)return;Pond.econ.serenity-=cost;(Pond.unlocked||(Pond.unlocked=[])).push(id);persist();syncShop();buildCodex();}));
  refreshCodexButtons();}
function refreshCodexButtons(){cxList.querySelectorAll('.ul').forEach(b=>{b.disabled=Pond.econ.serenity< +b.dataset.cost;});}
function codexTick(){if(codexEl.classList.contains('open'))refreshCodexButtons();}
codexBtn.addEventListener('click',()=>{const open=codexEl.classList.toggle('open');if(open)buildCodex();});
document.getElementById('codexX').addEventListener('click',()=>codexEl.classList.remove('open'));

// =================================================================
// LOOP + BOOT
// =================================================================
let last=performance.now(),frame=1000/40,saveT=0;
function resize(){DPR=Math.min(devicePixelRatio||1,2);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);buildBuffers();}
addEventListener('resize',resize);
function tick(now){requestAnimationFrame(tick);if(document.hidden){last=now;return;}if(now-last<frame)return;
  let dt=(now-last)/1000;last=now;if(dt>.1)dt=.1;
  step(dt);render(now/1000);syncShop();
  saveT+=dt;if(saveT>5){saveT=0;persist();}}
addEventListener('beforeunload',persist);

resize();const saved=Store.load();
if(saved&&saved.koi&&saved.koi.length){restore(saved);idleReturn();}   // away-progress applied on return (capped gift)
else{seedDefault();Pond.eco.lastSeen=Date.now();}
requestAnimationFrame(tick);
