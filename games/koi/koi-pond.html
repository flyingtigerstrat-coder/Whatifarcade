<!doctype html>
<!-- Koi — a pond to keep · koi v3.6 (living pond, C.7: composer update — clearer tend UI, caps 64/28, horsetail · hyacinth · bamboo spout · stepping stones, one-size lantern) · Noodle Studios / What If Arcade -->
<!--
  ARCHITECTURE: the pond is the platform; a "skin" is content.
  Single shared POND state (koi, plants, food, ripples, economy, time).
  RENDER CONTRACT v2 — every skin implements:
     water(ctx, t)              full-bleed water/background + light
     koi(ctx, k, sp, dim)       one koi, given its precomputed spine `sp`
     plant(ctx, p)              one plant (pad / lotus)         [optional -> falls back to Natural]
     fx(ctx)                    ripples + food                 [optional -> falls back to generic]
     overlay(ctx, t)           foreground (vignette/fog/petals)
     roles                      palette-role tokens (foliage/foliageRim/stone/moss/wood/bloom/glow).
                                An entity drawn ONCE against ROLES() reads correctly in every skin;
                                a bespoke per-skin handler still wins when present. Standing rule:
                                no entity ships unless it reads correctly in all four skins.
  PLANES (living pond): every entity declares BELOW / ON / ABOVE; planes render
  in order (below -> on -> above) to give the pond literal depth.
  PERSISTENCE: save key koipond_v3 (lossless v2 upgrader; the old v2 key is left
  in place for rollback safety — never eat a pond). Derived life (school,
  dragonfly, fireflies) is never saved; it re-derives from ecology on load.
  The engine computes koi geometry once and calls the active skin. Skins are
  drop-in: register in SKINS and it appears. Natural is the canonical core;
  art skins are faithful performances of it.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<title>Koi — a pond to keep</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  /* skin-reactive chrome (v3.5): the UI answers the pond it floats over. One dataset
     attribute on <body> swaps these tokens; every control reads them, so a skin can
     never restyle another skin's chrome. */
  body{--ui-bg:rgba(10,16,14,.42);--ui-bg2:rgba(10,16,14,.55);--ui-line:rgba(255,255,255,.08);
    --ui-accent:#f0cf86;--ui-on-accent:#1a120a;--ui-accent-soft:rgba(240,207,134,.22);
    --ui-accent-line:rgba(240,207,134,.4);--ui-glyph:#f0b9cf}
  body[data-skin="metal"]{--ui-bg:rgba(19,13,6,.5);--ui-bg2:rgba(19,13,6,.62);--ui-line:rgba(243,216,134,.17);
    --ui-accent:#f3d886;--ui-on-accent:#221505;--ui-accent-soft:rgba(243,216,134,.18);
    --ui-accent-line:rgba(243,216,134,.42);--ui-glyph:#dce8ff}
  body[data-skin="ink"]{--ui-bg:rgba(11,11,13,.55);--ui-bg2:rgba(11,11,13,.68);--ui-line:rgba(238,234,224,.15);
    --ui-accent:#c73e2e;--ui-on-accent:#f5f1e6;--ui-accent-soft:rgba(199,62,46,.2);
    --ui-accent-line:rgba(199,62,46,.5);--ui-glyph:#c73e2e}
  body[data-skin="rain"]{--ui-bg:rgba(21,30,35,.52);--ui-bg2:rgba(21,30,35,.64);--ui-line:rgba(180,205,215,.15);
    --ui-accent:#a9c9d6;--ui-on-accent:#101c22;--ui-accent-soft:rgba(169,201,214,.18);
    --ui-accent-line:rgba(169,201,214,.42);--ui-glyph:#a9c9d6}
  html,body{height:100%;background:#0c1512;overflow:hidden;cursor:crosshair}
  .buy:focus-visible,.chip:focus-visible,.pill:focus-visible,#kcSwim:focus-visible,#kcX:focus-visible,
  #nav button:focus-visible,.cx .ul:focus-visible,#codex .x:focus-visible{outline:2px solid var(--ui-accent);outline-offset:2px}
  #c{display:block;width:100vw;height:100vh;touch-action:none}
  .chrome{font-family:ui-sans-serif,-apple-system,"Segoe UI",Inter,sans-serif;
    transition:opacity .7s ease, transform .7s ease;z-index:10;user-select:none}
  .chrome.hide{opacity:0;pointer-events:none;transform:translateY(10px)}
  #pond{position:fixed;left:20px;top:18px;display:flex;flex-direction:column;align-items:flex-start;gap:10px;z-index:10}
  #ser{display:inline-flex;align-items:center;gap:8px;color:rgba(240,238,230,.92);font-size:13px;letter-spacing:.06em;
    padding:8px 15px;border-radius:999px;background:var(--ui-bg);transition:background .5s,border-color .5s;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--ui-line)}
  #ser .glyph{color:var(--ui-glyph);font-size:12px;transition:color .5s}
  #ser b{font-weight:600;font-variant-numeric:tabular-nums}
  #ser .lbl{opacity:.5;text-transform:lowercase;letter-spacing:.12em;font-size:11px}
  #tend{display:flex;gap:8px}
  .buy{appearance:none;border:0;cursor:pointer;border-radius:999px;padding:8px 14px;font-size:12px;
    letter-spacing:.04em;color:rgba(238,240,234,.92);background:var(--ui-bg);white-space:nowrap;
    backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--ui-line);
    display:inline-flex;align-items:center;gap:7px;transition:background .5s,opacity .3s,border-color .5s}
  .buy:hover{background:rgba(255,255,255,.12);border-color:rgba(255,255,255,.16)}
  .buy:disabled{opacity:.32;cursor:default}
  .buy .cost{display:inline-flex;align-items:center;gap:3px;opacity:.72;font-variant-numeric:tabular-nums}
  .buy .cost::before{content:'❀';color:var(--ui-glyph);opacity:.9;transition:color .5s}
  #tray{display:flex;flex-wrap:wrap;gap:6px;max-width:min(520px,92vw)}
  #tray.hide{display:none}
  .chip{appearance:none;border:0;cursor:pointer;border-radius:999px;padding:6px 12px;font-size:11.5px;
    letter-spacing:.03em;color:rgba(238,240,234,.88);background:var(--ui-bg);white-space:nowrap;
    backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);border:1px solid var(--ui-line);
    display:inline-flex;align-items:center;gap:6px;transition:background .5s,opacity .25s,border-color .5s}
  .chip:hover{background:rgba(255,255,255,.12)}
  .chip:disabled{opacity:.32;cursor:default}
  .chip.arm{background:var(--ui-accent-soft);border-color:var(--ui-accent-line)}
  .chip .c{opacity:.7;font-variant-numeric:tabular-nums}
  .buy.open{background:var(--ui-accent-soft);border-color:var(--ui-accent-line)}
  .traycap{display:inline-flex;align-items:center;padding:6px 11px;font-size:10.5px;letter-spacing:.1em;
    color:rgba(238,240,234,.45);border:1px dashed var(--ui-line);border-radius:999px;font-variant-numeric:tabular-nums}.chip .c::before{content:'❀ ';color:var(--ui-glyph);transition:color .5s}
  #koicard{position:fixed;left:20px;bottom:24px;z-index:20;width:230px;padding:13px 15px;border-radius:14px;
    color:rgba(240,238,230,.92);background:var(--ui-bg2);border:1px solid var(--ui-line);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);font-size:12.5px;line-height:1.5}
  #koicard.hide{display:none}
  #koicard b{font-size:13.5px}#koicard .jp{color:#9bc4b4;font-size:11px;margin-left:6px}
  #koicard .ln{opacity:.7;font-size:11px}
  #koicard .row{display:flex;gap:8px;margin-top:9px}
  #kcSwim{flex:1;appearance:none;cursor:pointer;border-radius:9px;padding:7px 10px;font-size:11.5px;
    color:#e8ecdf;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);transition:background .25s}
  #kcSwim:hover{background:rgba(255,255,255,.14)}
  #kcSwim.confirm{color:var(--ui-on-accent);background:var(--ui-accent);border-color:var(--ui-accent);font-weight:600}
  #kcX{appearance:none;cursor:pointer;border-radius:9px;padding:7px 10px;font-size:11.5px;color:rgba(238,240,234,.6);
    background:transparent;border:1px solid rgba(255,255,255,.1)}
  #devtray{position:fixed;right:16px;bottom:24px;z-index:30;display:flex;gap:5px;flex-wrap:wrap;max-width:300px;justify-content:flex-end}
  #skins{position:fixed;left:50%;bottom:24px;transform:translateX(-50%);display:flex;gap:4px;align-items:center;
    padding:5px;border-radius:999px;background:var(--ui-bg);box-shadow:0 8px 40px rgba(0,0,0,.4);
    backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid var(--ui-line);z-index:10;transition:background .5s,border-color .5s}
  #skins.hide{transform:translateX(-50%) translateY(12px)}
  .pill{appearance:none;border:0;cursor:pointer;color:rgba(238,240,234,.6);background:transparent;
    border-radius:999px;padding:8px 16px;font-size:12px;letter-spacing:.12em;text-transform:lowercase;
    white-space:nowrap;transition:color .35s,background .35s}
  .pill:hover{color:rgba(238,240,234,.95)}
  .pill.on{color:#0c1512;background:rgba(238,240,234,.94);font-weight:500}
  @media (max-width:580px){ .pill{padding:7px 10px;letter-spacing:.04em} #tend{flex-wrap:wrap} }
  #hint{position:fixed;left:50%;bottom:66px;transform:translateX(-50%);font-size:11px;letter-spacing:.16em;
    text-transform:lowercase;color:rgba(238,240,234,.4);transition:opacity 1s;z-index:10;pointer-events:none}
  #veil{position:fixed;inset:0;background:#0c1512;opacity:0;pointer-events:none;transition:opacity .42s;z-index:5}
  #nav{position:fixed;top:18px;right:16px;z-index:30;display:flex;gap:8px}
  #nav button{font:600 12px Inter,system-ui,sans-serif;color:#dfeee6;background:var(--ui-bg2);border:1px solid var(--ui-line);transition:background .5s,border-color .5s;
    -webkit-backdrop-filter:blur(6px);backdrop-filter:blur(6px);border-radius:10px;padding:8px 12px;cursor:pointer;transition:background .2s}
  #nav button:hover{background:rgba(30,55,46,.72)}
  #codex{position:fixed;top:0;right:0;height:100%;width:min(384px,93vw);z-index:40;
    background:linear-gradient(180deg,rgba(14,33,27,.97),rgba(9,22,17,.985));-webkit-backdrop-filter:blur(8px);backdrop-filter:blur(8px);
    border-left:1px solid rgba(255,255,255,.1);transform:translateX(100%);transition:transform .32s cubic-bezier(.4,0,.2,1);
    display:flex;flex-direction:column;color:#f6e7c4;box-shadow:-18px 0 50px rgba(0,0,0,.4)}
  #codex.open{transform:translateX(0)}
  #codex header{display:flex;align-items:center;justify-content:space-between;padding:16px 18px;border-bottom:1px solid rgba(255,255,255,.08)}
  #codex header h2{font:600 14px Inter,system-ui,sans-serif;letter-spacing:.5px}
  #codex .x{background:none;border:none;color:#bcd4ca;cursor:pointer;font-size:22px;line-height:1;padding:0 4px}
  #cxList{overflow-y:auto;padding:14px;display:flex;flex-direction:column;gap:11px}

  .cx canvas{width:104px;height:60px;flex:0 0 auto;border-radius:8px}
  .cx .info{flex:1;min-width:0}
  .cx .nm{font:600 13.5px Inter,system-ui,sans-serif}
  .cx .jp{font-size:10.5px;color:#9bc4b4;opacity:.8;font-weight:400}
  .cx .ds{font-size:11px;color:#cfe3d8;opacity:.82;line-height:1.42;margin-top:3px}
  .cx .act{margin-top:7px}

  .cx .ul:disabled{background:rgba(240,207,134,.22);color:#b39a64;cursor:default}

<body>
<canvas id="c"></canvas>
<div id="veil"></div>
<div id="pond">
  <div id="ser"><span class="glyph">❀</span><b id="serN">0</b><span class="lbl">serenity</span></div>
  <div id="tend" class="chrome">
    <button class="buy" id="buyKoi">release koi <span class="cost"><span id="cKoi">5</span></span></button>
    <button class="buy" id="openPlant">plants &#9662;</button>
    <button class="buy" id="openPlace">stones &#9662;</button>
  </div>
  <div id="tray" class="chrome hide"></div>
</div>
<div id="hint" class="chrome">drag to stir &nbsp;·&nbsp; click to feed &nbsp;·&nbsp; tend &amp; grow</div>
<div id="koicard" class="hide"><b id="kcName"></b><span class="jp" id="kcJp"></span>
  <div id="kcStage"></div><div class="ln" id="kcLin"></div>
  <div class="row"><button id="kcSwim">let it swim on</button><button id="kcX">&times;</button></div></div>
<div id="devtray" class="chrome" style="display:none"></div>
<div id="skins" class="chrome">
  <button class="pill on" data-skin="natural">natural</button>
  <button class="pill" data-skin="metal">liquid metal</button>
  <button class="pill" data-skin="ink">sumi ink</button>
  <button class="pill" data-skin="rain">rain on glass</button>
</div>
<div id="nav"><button id="codexBtn">&#10047; koi codex</button></div>
<div id="codex"><header><h2>Koi Codex</h2><button class="x" id="codexX">&times;</button></header><div id="cxList"></div></div>
<script>
const cv=document.getElementById('c'), ctx=cv.getContext('2d',{alpha:false});
const veil=document.getElementById('veil');
const REDUCE=matchMedia('(prefers-reduced-motion: reduce)').matches;
let W=0,H=0,DPR=1;
const TAU=Math.PI*2, clamp=(v,a,b)=>v<a?a:v>b?b:v, lerp=(a,b,t)=>a+(b-a)*t, rand=(a,b)=>a+Math.random()*(b-a);
function hexA(hex,a){const n=hex.replace('#','');return `rgba(${parseInt(n.substr(0,2),16)},${parseInt(n.substr(2,2),16)},${parseInt(n.substr(4,2),16)},${a})`;}
function shade(hex,m){const n=hex.replace('#','');return `rgb(${parseInt(n.substr(0,2),16)*m|0},${parseInt(n.substr(2,2),16)*m|0},${parseInt(n.substr(4,2),16)*m|0})`;}
function hsl(h,s,l,a){return `hsla(${h},${s}%,${l}%,${a==null?1:a})`;}
// blend two #rrggbb toward t (0..1) -> #rrggbb (used for brass->verdigris patina)
function mixHex(a,b,t){const A=a.replace('#',''),B=b.replace('#',''),h=n=>('0'+(clamp(n|0,0,255)).toString(16)).slice(-2);
  return '#'+h(lerp(parseInt(A.substr(0,2),16),parseInt(B.substr(0,2),16),t))
           +h(lerp(parseInt(A.substr(2,2),16),parseInt(B.substr(2,2),16),t))
           +h(lerp(parseInt(A.substr(4,2),16),parseInt(B.substr(4,2),16),t));}

// ---------- persistence (pond you keep) ----------
// v3 save. The old koipond_v2 key is deliberately LEFT IN PLACE after migration
// (rollback safety — a bad deploy must never eat a pond). Migration is lossless:
// koi/plants/econ/unlocked map verbatim; new fields get safe defaults; lastSeen
// stamps NOW so the first migrated load grants no retroactive idle windfall.
const SAVE_KEY='koipond_v3', LEGACY_KEY='koipond_v2';
function migrateV2(s){return {v:3,
  econ:{serenity:s.econ?.serenity||6},
  unlocked:(s.unlocked&&s.unlocked.length)?s.unlocked:['kohaku','asagi','ogon'],
  koi:(s.koi||[]).map(k=>({variety:k.variety,age:k.age,x:k.x,y:k.y,seed:k.seed,parents:null})),
  plants:(s.plants||[]).map(p=>({type:p.type,x:p.x,y:p.y,size:p.size,grow:p.grow,bloom:p.bloom,vr:'classic'})),
  rocks:[], frog:null, departed:[], eco:{lastSeen:Date.now()}};}
const Store={save(o){try{localStorage.setItem(SAVE_KEY,JSON.stringify(o));}catch(e){}},
             load(){try{
               const v3=JSON.parse(localStorage.getItem(SAVE_KEY)||'null'); if(v3) return v3;
               const v2=JSON.parse(localStorage.getItem(LEGACY_KEY)||'null'); if(v2) return migrateV2(v2);
               return null;
             }catch(e){return null;}}};

// ---------- koi varieties (show-accurate Nishikigoi) ----------
// patches ride the body: a..b = fraction head->tail; top/bot = [inner,outer] reach across each flank
//   (fraction of half-width). soft=1 -> leading edge feathers (sashi); trailing stays crisp (kiwa).
//   c: 'hi' (=accent/red), 'sumi' (black), 'shiro' (white) or a literal hex.
const V={
  kohaku:{base:'#f6efe1',accent:'#d8381b',metal:0,extraHi:1,patches:[          // white + stepped red (Sandan)
    {c:'hi',a:.04,b:.27,top:[0,.92],bot:[0,.50],soft:1},
    {c:'hi',a:.40,b:.60,top:[0,.85],bot:[0,.62],soft:1},
    {c:'hi',a:.71,b:.88,top:[0,.72],bot:[0,.30],soft:1}]},
  sanke:{base:'#f6efe1',accent:'#d8381b',sumi:'#1b1510',metal:0,extraHi:1,patches:[  // Kohaku hi + sumi above lateral line, clean head
    {c:'hi',a:.10,b:.30,top:[0,.90],bot:[0,.55],soft:1},
    {c:'hi',a:.47,b:.65,top:[0,.82],bot:[0,.55],soft:1},
    {c:'sumi',a:.31,b:.43,top:[0,.62],soft:0},
    {c:'sumi',a:.60,b:.72,bot:[0,.60],soft:0}]},
  showa:{base:'#171210',accent:'#cf3219',shiro:'#efe7d6',metal:0,menware:1,motoguro:1,head:{type:'blotch'},patches:[ // black base wraps; white+red over
    {c:'shiro',a:.05,b:.30,top:[0,.95],bot:[0,.95],soft:0},
    {c:'hi',a:.12,b:.42,top:[0,.85],bot:[0,.35],soft:1},
    {c:'shiro',a:.52,b:.78,top:[0,.95],bot:[0,.95],soft:0},
    {c:'hi',a:.64,b:.90,top:[0,.70],bot:[0,.30],soft:1}]},
  ogon:{base:'#e3a73f',accent:'#f6cf86',metal:1,solid:1,patches:[]},      // solid metallic gold (scale shimmer)
  platinum:{base:'#e9eef0',accent:'#cfe0e6',metal:1,solid:1,patches:[]},  // solid metallic white
  benigoi:{base:'#c5401d',accent:'#e0563a',metal:0,solid:1,patches:[]},   // solid red-orange (NOT flat -> shimmer)
  asagi:{base:'#7f96a8',accent:'#cf6a33',metal:0,net:1,cheeks:'#cf6a33',patches:[ // blue net back, red up the flanks only
    {c:'hi',a:.34,b:.97,bot:[.42,.95],soft:1},
    {c:'hi',a:.34,b:.97,top:[.42,.95],soft:1}]},
  tancho:{base:'#f4efe4',accent:'#d4291a',metal:0,head:{type:'dot'},patches:[]}, // white + single head sun
};
const STARTERS=['kohaku','showa','asagi','ogon','sanke','benigoi','platinum','tancho'];

// ---------- POND state (single source of truth) ----------
const Pond={koi:[],plants:[],food:[],ripples:[],petals:[],sparkles:[],sun:{x:0,y:0},econ:{serenity:0},unlocked:['kohaku','asagi','ogon'],
  rocks:[],frog:null,departed:[],seen:{},eco:{lastSeen:0},_t:0};   // seen{} = first-sighting timestamps (the Almanac remembers)

// capacity ledger (BRIEF v1.1 Phase A, human-ratified 2026-07-02): generous, bounded
// by worst-case frame budget + on-screen legibility. Departure (Phase B) is the release valve.
const CAPS={koi:18,plants:64,rocks:28,school:20,fireflies:10};   // plants/rocks raised (human, C.7): room to really compose

// blended growth (returning v0.1 work): koi grow slowly with TIME, faster when FED.
// Size stops at adult (age 1); age keeps accruing quietly beyond it, so ELDER is
// earned duration — derived from the one saved field, no new state. Never death.
const AGE_MAX=1.6, GROW_DAY=.01, GROW_FED=.02, PASSIVE_SEC=GROW_DAY/86400;
function stage(k){return k.age<.25?'fry':k.age<.6?'young':k.age<1.25?'adult':'elder';}
function eldF(k){return clamp((k.age-1.25)/.2,0,1);}   // 0..1 ramp into eldership (fins flow in gradually)
// feeding rank (C.4) — real koi ponds run a size-led pecking order: bigger, older fish
// dominate the food, with individual boldness as a secondary, PERSONALITY axis (partly
// genetic — so it's derived from the saved seed, stable for the life of the fish, never
// re-rolled). 60% size / 40% boldness. A fish that grows up climbs the order naturally.
function domin(k){const sz=clamp((elen(k)-90)/60,0,1);return clamp(sz*.6+(k.bold??.5)*.4,0,1);}

function makeKoi(variety,x,y,age,seed,parents){
  const v=V[variety]||V.kohaku, len=rand(96,150), sd=seed??(Math.random()*1e4|0);
  const k={variety, V:v, x:x??rand(W*.25,W*.75), y:y??rand(W?H*.25:200,H*.75||400), ang:rand(0,TAU),
    spd:rand(15,26)*(REDUCE?.5:1), len, wd:len*rand(.105,.125), depth:rand(0,1),
    phase:rand(0,TAU), finph:rand(0,TAU), wig:rand(.85,1.2), turn:0, excite:0, gulp:0, trail:[],
    age:age??rand(.35,1), hunger:rand(.2,.6), wellfed:0, wake:[], seed:sd, parents:parents??null};
  k.pattern=buildPattern(v,sd);                 // per-individual markings (no two koi alike)
  k.bold=(()=>{const x=Math.sin((sd+1)*12.9898)*43758.5453;return x-Math.floor(x);})();  // stable temperament from the seed (0=timid .. 1=bold); persists, never saved separately
  // pre-fill the trail straight behind the fish so it renders full-length from frame one
  // (otherwise a fish "grows" for its first seconds while the trail accumulates)
  const n=Math.ceil(elen(k)*1.25/2)+6;
  for(let i=0;i<n;i++)k.trail.push({x:k.x-Math.cos(k.ang)*i*2,y:k.y-Math.sin(k.ang)*i*2});
  return k;
}
// Every plant/rock carries a SAVED seed (like the koi): all cosmetic traits — blade
// counts, hue lean, shape jitter, driftwood form — derive from it deterministically,
// so each is an individual AND comes back exactly itself on every reload.
function makePad(x,y,size,vr,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  return {type:'pad',vr:vr||'classic',sd,x,y,size:size??(.2+rnd()*.3),rot:rnd()*TAU,grow:size?1:.2+rnd()*.4,bloom:0,
    hue:(rnd()-.5)*18,bp:rnd()*TAU,amp:2+rnd()*1.6,dx:0,dy:0,vx:0,vy:0,rv:(rnd()-.5)*.08};}
function makeLotus(x,y,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  return {type:'lotus',vr:'classic',sd,x,y,grow:0,bloom:0,hue:(rnd()-.5)*14,rot:rnd()*TAU,bp:rnd()*TAU,amp:1.6+rnd()*1.2,dx:0,dy:0,vx:0,vy:0,rv:(rnd()-.5)*.06};}
function makeReed(x,y,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  return {type:'reed',vr:'classic',sd,x,y,grow:0,bloom:0,n:5+(rnd()*4|0),heads:1+(rnd()*2.4|0),spread:3.8+rnd()*1.6,hue:(rnd()-.5)*14,bp:rnd()*TAU,rot:0,amp:1,dx:0,dy:0,vx:0,vy:0,rv:0};}
function makeIris(x,y,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  return {type:'iris',vr:'classic',sd,x,y,grow:0,bloom:0,n:3+(rnd()*1.6|0),pet:5+(rnd()*1.8|0),bsz:.85+rnd()*.35,hue:(rnd()-.5)*12,bp:rnd()*TAU,rot:0,amp:1,dx:0,dy:0,vx:0,vy:0,rv:0};}
function makeDuckweed(x,y,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  return {type:'duckweed',vr:'classic',sd,x,y,grow:.6,bloom:0,n:4+(rnd()*5|0),hue:(rnd()-.5)*16,bp:rnd()*TAU,rot:rnd()*TAU,amp:3+rnd()*1.5,dx:0,dy:0,vx:0,vy:0,rv:(rnd()-.5)*.12};}
function makeGrass(x,y,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  return {type:'grass',vr:'classic',sd,x,y,grow:0,bloom:0,n:6+(rnd()*5|0),spread:4.2+rnd()*1.8,hue:(rnd()-.5)*10,bp:rnd()*TAU,rot:0,amp:1,dx:0,dy:0,vx:0,vy:0,rv:0};}
// C.7 flora — sold FULLY MATURE (grow 1): instant beauty for composers
function makeHorsetail(x,y,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  return {type:'horsetail',vr:'classic',sd,x,y,grow:1,bloom:0,n:4+(rnd()*3|0),spread:5+rnd()*2,hue:(rnd()-.5)*12,bp:rnd()*TAU,rot:0,amp:1,dx:0,dy:0,vx:0,vy:0,rv:0};}
function makeHyacinth(x,y,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  return {type:'hyacinth',vr:'classic',sd,x,y,size:.34+rnd()*.14,grow:1,bloom:1,hue:(rnd()-.5)*14,rot:rnd()*TAU,bp:rnd()*TAU,amp:2+rnd()*1.4,dx:0,dy:0,vx:0,vy:0,rv:(rnd()-.5)*.07};}
const PLANT_MAKE={pad:makePad,lotus:makeLotus,reed:makeReed,iris:makeIris,duckweed:makeDuckweed,grass:makeGrass,horsetail:makeHorsetail,hyacinth:makeHyacinth};
const BELOW_TYPES={grass:1};                       // BELOW-plane flora renders under the koi
// hardscape: heavy, mossing, persistent (decor AND habitat — Principle 3)
function makeRock(form,x,y,sd){sd=sd??(Math.random()*1e4|0);const rnd=srand(sd);
  // the lantern (and the spout) are BUILT things — one consistent size; nature varies
  const size=(form==='lantern'||form==='spout')?1:.75+rnd()*.5;
  return {form,sd,x,y,size,rot:(form==='lantern'||form==='spout')?0:rnd()*TAU,grow:0};}
function rockR(r){return (r.form==='boulder'?34:r.form==='slate'?30:r.form==='driftwood'?40:r.form==='lantern'?22:r.form==='spout'?24:r.form==='steps'?30:24)*r.size;}

// dev lifecycle harness (?dev=1): drives the WHOLE player journey on demand.
// Warps call the REAL idleReturn() path with the cap lifted — testing exercises
// production code, not a parallel fake. Invisible without the URL flag.
const DEV=typeof location!=='undefined'&&/[?&]dev=1/.test(location.search||'');

function seedDefault(){
  Pond.koi=[]; Pond.plants=[]; Pond.econ.serenity=6;
  STARTERS.slice(0,4).forEach(v=>Pond.koi.push(makeKoi(v)));
  Pond.plants.push(makePad(W*.22,H*.7), makePad(W*.78,H*.32), makePad(W*.6,H*.78));
}
function restore(s){
  Pond.econ.serenity=s.econ?.serenity||6;
  Pond.unlocked=s.unlocked&&s.unlocked.length?s.unlocked:['kohaku','asagi','ogon'];
  Pond.koi=(s.koi||[]).map(k=>makeKoi(k.variety,k.x*W,k.y*H,k.age,k.seed,k.parents||null));
  Pond.plants=(s.plants||[]).map(p=>{const mk=PLANT_MAKE[p.type]||makePad;
    const pl=p.type==='pad'?makePad(p.x*W,p.y*H,p.size,p.vr,p.sd):mk(p.x*W,p.y*H,p.sd);
    Object.assign(pl,{grow:p.grow??pl.grow,bloom:p.bloom||0,vr:p.vr||'classic'});
    if(p.size!=null)pl.size=p.size;return pl;});
  Pond.rocks=(s.rocks||[]).map(r=>Object.assign(makeRock(r.form,r.x*W,r.y*H,r.sd),{size:r.size||1,rot:r.rot||0,grow:r.grow||0}));
  Pond.frog=s.frog||null; Pond.departed=s.departed||[]; Pond.seen=s.seen||{};
  Pond.eco=s.eco||{lastSeen:Date.now()};
  if(!Pond.koi.length) seedDefault();
}
function persist(){
  Store.save({v:3, econ:Pond.econ, unlocked:Pond.unlocked,
    koi:Pond.koi.map(k=>({variety:k.variety,age:k.age,x:k.x/W,y:k.y/H,seed:k.seed,parents:k.parents||null})),
    plants:Pond.plants.map(p=>({type:p.type,x:p.x/W,y:p.y/H,size:p.size,grow:p.grow,bloom:p.bloom,vr:p.vr||'classic',sd:p.sd})),
    rocks:Pond.rocks.map(r=>({form:r.form,x:r.x/W,y:r.y/H,size:r.size,rot:r.rot,grow:r.grow,sd:r.sd})),
    frog:Pond.frog, departed:Pond.departed, seen:Pond.seen,
    eco:{lastSeen:Date.now()}});
}

// ---------- ecology (hidden — legible through life, never meters) ----------
// Pure derivations from what exists. Phase C registers visitors against these;
// the scores + the roll hook ship now so fauna plugs into a working system.
const Eco={
  shelter(){let s=0;for(const r of Pond.rocks)s+=1;
    for(const p of Pond.plants)if((p.grow??0)>.75)s+=(p.type==='pad'?.5:.75);return s;},
  bloom(){let b=0;for(const p of Pond.plants)if((p.bloom||0)>.5)b+=1;return b;},
  life(){return thriving();},
  calm(){return clamp((Pond._t-(Pond.lastStir||0))/120,0,1);},
  visitors:[]                    // Phase C: [{key, when(eco)->bool, arrive()}]
};
function rollVisitors(){for(const v of Eco.visitors){try{if(v.when(Eco))v.arrive();}catch(e){}}}

// ---------- idle return (away-progress is a gift, never an obligation) ----------
function idleReturn(uncap){
  const now=Date.now(), last=Pond.eco.lastSeen||now;
  const hrs=clamp((now-last)/3.6e6,0,uncap?1e6:72);       // gift capped at 3 days' worth (dev warps lift the cap)
  if(hrs<.05){Pond.eco.lastSeen=now;return;}
  const dAge=(hrs/24)*GROW_DAY;                           // capped passive growth while away
  for(const k of Pond.koi)k.age=Math.min(AGE_MAX,k.age+dAge*rand(.8,1.2));
  for(const p of Pond.plants){p.grow=Math.min(1,(p.grow??0)+hrs*.01);
    if((p.type==='lotus'||p.type==='iris')&&p.grow>.9)p.bloom=Math.min(1,(p.bloom||0)+hrs*.02);
    if(p.type==='pad'&&p.vr!=='cluster'&&p.grow>.85)p.bloom=Math.min(1,(p.bloom||0)+hrs*.012);}  // water-lily on old pads
  for(const r of Pond.rocks)r.grow=Math.min(1,r.grow+hrs*.008);                                  // moss creeps while away
  Pond.econ.serenity+=Math.min(hrs*2,uncap?1e9:60);       // gentle trickle, capped (dev warps honest to elapsed)
  Pond.eco.lastSeen=now; rollVisitors();                  // returning can mean finding a visitor already here
}

// =================================================================
// PHASE C — THE THREE PLANES COME ALIVE (fauna + the day)
// Visitors are EARNED, never bought (Principle 2): they derive from the hidden
// ecology and are never saved — they re-derive on load. The one exception is the
// frog's RESIDENCY (the pond's mayor persists; his position derives). Hard law:
// no predation, ever — attraction and coexistence, not a food chain.
// =================================================================
const Fauna={school:[],frog:null,frogRt:null,dragonfly:null,fireflies:[],_roll:0,_m:{}};
const VISIT={shelter:6,frogPads:3,bloom:3};   // quick-unlock thresholds (human rider: first visitors within the first good session or two)
function maturePads(){let n=0;for(const p of Pond.plants)if(p.type==='pad'&&(p.grow??0)>.8)n++;return n;}
function firstSeen(key,gift){if(!Pond.seen[key]){Pond.seen[key]=Date.now();Pond.econ.serenity+=gift;persist();}}
function momentT(key,gift,cool){const now=Pond._t;if((Fauna._m[key]||-1e9)+cool>now)return;Fauna._m[key]=now;Pond.econ.serenity+=gift;}   // presence quietly rewarded — zero UI

// ---- the school (BELOW): one boids flock of minnows; darts from koi — prey grammar, zero predation ----
function spawnSchool(){const n=Math.min(15+(Math.random()*6|0),CAPS.school);Fauna.school=[];
  const cx=rand(W*.3,W*.7),cy=rand(H*.3,H*.7);
  for(let i=0;i<n;i++)Fauna.school.push({x:cx+rand(-40,40),y:cy+rand(-40,40),vx:rand(-20,20),vy:rand(-20,20),ph:rand(0,TAU)});
  firstSeen('school',3);}
function updateSchool(dt){
  const sh=Eco.shelter(), active=sh>=VISIT.shelter||(Pond.seen.school&&sh>=VISIT.shelter-2);  // earned trust lingers (hysteresis)
  if(!active){Fauna.school.length=0;return;}
  if(!Fauna.school.length){if(Math.random()<dt*.2)spawnSchool();return;}     // arrives on its own once earned
  const S=Fauna.school,vlim=REDUCE?26:46,coh=REDUCE?1.5:1;                    // reduced-motion: tighter, slower
  for(const fsh of S){let ax=0,ay=0,cx=0,cy=0,n=0,sx=0,sy=0;
    for(const o of S){if(o===fsh)continue;const dx=o.x-fsh.x,dy=o.y-fsh.y,d2=dx*dx+dy*dy;
      if(d2<8100){cx+=o.x;cy+=o.y;ax+=o.vx;ay+=o.vy;n++;if(d2<196){sx-=dx;sy-=dy;}}}
    if(n){fsh.vx+=((cx/n-fsh.x)*.9*coh+(ax/n-fsh.vx)*.7)*dt;fsh.vy+=((cy/n-fsh.y)*.9*coh+(ay/n-fsh.vy)*.7)*dt;}
    fsh.vx+=sx*3*dt;fsh.vy+=sy*3*dt;
    for(const k of Pond.koi){const dx=fsh.x-k.x,dy=fsh.y-k.y,d2=dx*dx+dy*dy;  // dart away — never eaten
      if(d2<12100){const d=Math.sqrt(d2)||1;fsh.vx+=dx/d*180*dt;fsh.vy+=dy/d*180*dt;}}
    const m=90;if(fsh.x<m)fsh.vx+=60*dt;if(fsh.x>W-m)fsh.vx-=60*dt;if(fsh.y<m)fsh.vy+=60*dt;if(fsh.y>H-m)fsh.vy-=60*dt;
    const v=Math.hypot(fsh.vx,fsh.vy)||1,vmax=vlim*(1+.4*Math.sin(Pond._t*3+fsh.ph));
    if(v>vmax){fsh.vx*=vmax/v;fsh.vy*=vmax/v;}
    fsh.x+=fsh.vx*dt;fsh.y+=fsh.vy*dt;}
  if(Math.random()<dt*.02)momentT('flash',3,45);}                             // the school flashes a sunbeam
function drawSchool(c){if(!Fauna.school.length)return;
  const col=skin==='metal'?'rgba(150,160,175,.5)':skin==='ink'?'rgba(190,186,172,.35)':'rgba(168,178,150,.55)';
  c.save();c.fillStyle=col;
  for(const f of Fauna.school){const a=Math.atan2(f.vy,f.vx),fl=Math.sin(Pond._t*8+f.ph)*.8,ca=Math.cos(a),sa=Math.sin(a);
    c.beginPath();c.ellipse(f.x,f.y,4.5,1.7,a,0,TAU);c.fill();
    c.beginPath();c.moveTo(f.x-ca*4.5,f.y-sa*4.5);
    c.lineTo(f.x-ca*8-sa*fl*2,f.y-sa*8+ca*fl*2);c.lineTo(f.x-ca*8+sa*fl*2,f.y-sa*8-ca*fl*2);c.closePath();c.fill();
    if(Math.random()<.003){c.globalAlpha=.5;c.drawImage(softSprite,f.x-5,f.y-5,10,10);c.globalAlpha=1;c.fillStyle=col;}}
  c.restore();}

// ---- the frog (ON): a RESIDENT — sits on a pad, throat-bob; occasionally plops and glides below ----
function updateFrog(dt){
  if(!Pond.frog){Fauna.frogRt=null;return;}
  const F=Fauna.frogRt||(Fauna.frogRt={mode:'sit',t:0,pad:null,x:0,y:0,from:null,to:null,next:20+Math.random()*40,dur:0});
  const pads=Pond.plants.filter(p=>p.type==='pad'&&(p.grow??0)>.8);
  if(!pads.length){F.pad=null;return;}                                        // pond rearranged — the mayor waits unseen
  if(!F.pad||!pads.includes(F.pad)){F.pad=pads[(Math.random()*pads.length)|0];F.mode='sit';}
  F.t+=dt;
  if(F.mode==='sit'){F.x=(F.pad.rx??F.pad.x);F.y=(F.pad.ry??F.pad.y)-4;
    if(!REDUCE&&F.t>F.next&&pads.length>1){                                   // plop! (reduced-motion: he just sits)
      F.mode='swim';F.t=0;F.next=20+Math.random()*40;F.from={x:F.x,y:F.y};
      let dest=F.pad;while(dest===F.pad)dest=pads[(Math.random()*pads.length)|0];F.pad=dest;
      F.to={x:dest.rx??dest.x,y:dest.ry??dest.y};F.dur=2+Math.random()*2;
      Pond.ripples.push({x:F.x,y:F.y,r:3,max:70,age:0,life:1.6,s:1.2});momentT('plop',2,30);}}
  else{const u=Math.min(1,F.t/F.dur);
    F.x=lerp(F.from.x,F.to.x,u)+Math.sin(u*Math.PI*2)*8;F.y=lerp(F.from.y,F.to.y,u);
    if(u>=1){F.mode='sit';F.t=0;Pond.ripples.push({x:F.x,y:F.y,r:2,max:50,age:0,life:1.2,s:1});}}}
function drawFrogBelow(c){const F=Fauna.frogRt;if(!F||F.mode!=='swim')return; // submerged silhouette gliding between pads
  c.fillStyle='rgba(10,25,18,.30)';const a=Math.atan2(F.to.y-F.from.y,F.to.x-F.from.x);
  c.beginPath();c.ellipse(F.x,F.y,9,5,a,0,TAU);c.fill();}
function drawFrog(c){const F=Fauna.frogRt;if(!F||!F.pad||F.mode!=='sit')return;
  const RL=ROLES(),bob=1+.06*Math.sin(Pond._t*2.2);
  c.save();c.translate(F.x,F.y);
  c.fillStyle=shade(RL.moss,.9);c.beginPath();c.ellipse(0,0,7,5.2*bob,0,0,TAU);c.fill();
  c.fillStyle=shade(RL.moss,1.15);c.beginPath();c.ellipse(0,1.6,4.6,3*bob,0,0,TAU);c.fill();   // throat bob
  for(const sd of[-1,1]){c.fillStyle=shade(RL.moss,.72);c.beginPath();c.arc(3.4*sd,-3.6,1.9,0,TAU);c.fill();
    c.fillStyle='rgba(15,12,8,.9)';c.beginPath();c.arc(3.4*sd,-3.6,.9,0,TAU);c.fill();}
  c.restore();}

// ---- the dragonfly (ABOVE): visits in bright hours when bloom is high; casts a LIVE shadow ----
function updateDragonfly(dt){const D=Fauna.dragonfly;if(!D)return;
  D.t+=dt;D.life-=dt;
  if(D.life<=0){Fauna.dragonfly=null;return;}
  const perches=Pond.plants.filter(p=>p.type==='reed'||p.type==='horsetail').concat(Pond.rocks.filter(r=>r.form==='driftwood'));
  if(REDUCE&&perches.length){const p=perches[0];D.x=p.x;D.y=p.y-(p.type==='reed'?46:10);D.mode='perch';return;}
  if(D.mode==='perch'){if(D.t>4){D.mode='fly';D.t=0;D.tx=null;}return;}
  if(D.tx==null||D.t>1.2){D.t=0;D.landing=0;D.tx=rand(W*.15,W*.85);D.ty=rand(H*.15,H*.6);
    if(perches.length&&Math.random()<.18){const p=perches[(Math.random()*perches.length)|0];
      D.tx=p.x;D.ty=p.y-(p.type==='reed'?46:10);D.landing=1;}}
  const r=Math.min(1,dt*3.2);D.x+=(D.tx-D.x)*r;D.y+=(D.ty-D.y)*r;
  if(D.landing&&Math.hypot(D.tx-D.x,D.ty-D.y)<4){D.mode='perch';D.t=0;momentT('dfly',2,25);}
  if(!D.landing&&Math.random()<dt*.12){                                       // wingtip dip — a REAL ring in the ripple system
    Pond.ripples.push({x:D.x,y:D.y+12,r:2,max:46,age:0,life:1.2,s:1});
    Pond.sparkles.push({x:D.x,y:D.y+12,age:0,life:.5,mag:.8});momentT('dip',2,20);}}
function drawDragonfly(c){const D=Fauna.dragonfly;if(!D)return;
  c.save();
  c.fillStyle=`rgba(8,18,14,${.16*SHDIM})`;c.beginPath();c.ellipse(D.x+7,D.y+16,8,3,0,0,TAU);c.fill();  // its shadow on the water (day-aware)
  c.translate(D.x,D.y);c.rotate(Math.atan2((D.ty??D.y)-D.y,(D.tx??D.x+1)-D.x));
  const w=Math.sin(Pond._t*40)*(D.mode==='perch'?.12:1);
  c.strokeStyle='rgba(70,110,120,.9)';c.lineWidth=1.8;c.beginPath();c.moveTo(-7,0);c.lineTo(6,0);c.stroke();
  c.fillStyle='rgba(60,90,100,.95)';c.beginPath();c.arc(6.5,0,1.7,0,TAU);c.fill();
  c.fillStyle=`rgba(190,220,225,${.32+.2*Math.abs(w)})`;
  for(const sd of[-1,1]){c.beginPath();c.ellipse(-1,sd*(3+2.5*Math.abs(w)),7,2.2,sd*.5*w,0,TAU);c.fill();
    c.beginPath();c.ellipse(2,sd*(2.6+2*Math.abs(w)),5.5,1.8,sd*.4*w,0,TAU);c.fill();}
  c.restore();}

// ---- fireflies at dusk (human-approved — the studio's games waving at each other) ----
function updateFireflies(dt){const m=dayMix(),duskish=(m.dusk+m.night)>.4;
  const grown=Pond.plants.filter(p=>(p.grow??0)>.8).length>=5;
  const want=(duskish&&grown&&Eco.calm()>.3)?Math.min(10,CAPS.fireflies):0;
  const F=Fauna.fireflies;
  if(!want){F.length=0;return;}
  while(F.length<want){const anchors=Pond.plants.filter(p=>p.type==='reed'||p.type==='horsetail').concat(Pond.rocks.filter(r=>r.form==='lantern'));
    const a=anchors.length?anchors[(Math.random()*anchors.length)|0]:{x:rand(W*.2,W*.8),y:rand(H*.3,H*.7)};
    F.push({x:a.x+rand(-60,60),y:a.y+rand(-55,5),ph:rand(0,TAU),sp:rand(.3,.8)});
    if(F.length===1)firstSeen('firefly',2);}
  const sw=REDUCE?.4:1;                                                        // reduced-motion: they drift slower
  for(const fl of F){fl.x+=Math.sin(Pond._t*fl.sp+fl.ph)*12*sw*dt;fl.y+=Math.cos(Pond._t*fl.sp*.8+fl.ph)*9*sw*dt;
    fl.x=clamp(fl.x,30,W-30);fl.y=clamp(fl.y,36,H-40);}}
function drawFireflies(c){const F=Fauna.fireflies;if(!F.length)return;
  c.save();c.globalCompositeOperation='screen';
  for(const f of F){const tw=.5+.5*Math.sin(Pond._t*2.2+f.ph*3);if(tw<.25)continue;
    c.globalAlpha=.8*tw;c.fillStyle='rgba(255,232,150,1)';c.beginPath();c.arc(f.x,f.y,1.6,0,TAU);c.fill();
    c.globalAlpha=.5*tw;c.drawImage(softSprite,f.x-7,f.y-7,14,14);
    c.globalAlpha=.14*tw;c.drawImage(softSprite,f.x-5,f.y+9,10,10);}          // faint reflection on the water
  c.globalAlpha=1;c.restore();}

// ---- arrivals: the pond earns its visitors (rolled every ~5s live; also on idle return) ----
function rollFauna(dt){Fauna._roll+=dt;if(Fauna._roll<5)return;Fauna._roll=0;
  if(!Pond.frog&&maturePads()>=VISIT.frogPads&&Eco.calm()>.3&&Math.random()<.25){
    Pond.frog={resident:true,since:Date.now()};firstSeen('frog',5);persist();}
  const m=dayMix(),bright=(m.dusk+m.night+m.dawn)<.35;
  if(!Fauna.dragonfly&&bright&&Eco.bloom()>=VISIT.bloom&&Math.random()<.2){
    Fauna.dragonfly={x:-30,y:rand(H*.2,H*.5),tx:null,ty:null,t:9,life:25+Math.random()*35,mode:'fly',landing:0};
    firstSeen('dragonfly',3);}}
Eco.visitors.push({key:'frog',when:()=>!Pond.frog&&maturePads()>=VISIT.frogPads,   // returning can mean finding the mayor moved in
  arrive:()=>{Pond.frog={resident:true,since:Date.now()};if(!Pond.seen.frog)Pond.seen.frog=Date.now();}});

// ---------- geometry (shared by all skins) ----------
function elen(k){return k.len*lerp(.52,1,Math.min(1,k.age));}   // size stops at adult; age keeps counting toward elder
function ewd(k){return k.wd*lerp(.6,.95,Math.min(1,k.age));}

      for(let i=0;i<pet;i++){const a=i/pet*TAU+ring*.4;c.save();c.rotate(a);
        const g=c.createLinearGradient(0,0,0,-rr);g.addColorStop(0,pTop);g.addColorStop(1,hexA(pBot,.95));
        c.fillStyle=g;c.beginPath();c.moveTo(0,0);c.quadraticCurveTo(rr*.34,-rr*.6,0,-rr);c.quadraticCurveTo(-rr*.34,-rr*.6,0,0);c.fill();c.restore();}}

// buoyant floating: idle bob (spring), slow rotation, rides passing waves
function floatPlant(p,dt){const t=Pond._t;
  const tx=Math.sin(t*.55+p.bp)*p.amp, ty=Math.cos(t*.42+p.bp*1.3)*p.amp*.7;   // gentle bob rest target
  for(const r of Pond.ripples){ if(r.s<=1) continue;                            // strong ripples lift/push
    const ddx=p.x-r.x, ddy=p.y-r.y, d=Math.hypot(ddx,ddy)||1;
    if(Math.abs(r.r-d)<14 && r.r<r.max*.92){ const f=(1-r.age/r.life)*18*dt/d; p.vx+=ddx*f; p.vy+=ddy*f; p.rv+=(Math.random()-.5)*.5*dt; } }
  const k=11, dmp=Math.pow(.1,dt);                                              // buoyant spring toward bob target
  p.vx+=(tx-p.dx)*k*dt; p.vy+=(ty-p.dy)*k*dt; p.vx*=dmp; p.vy*=dmp;
  p.dx+=p.vx*dt; p.dy+=p.vy*dt;
  p.rv=clamp(p.rv+Math.sin(t*.2+p.bp)*.03*dt,-.09,.09); p.rv*=Math.pow(.55,dt); p.rot+=p.rv*dt;
  p.rx=p.x+p.dx; p.ry=p.y+p.dy; p.rrot=p.rot;
}
// ---------- dream-pond drawing (Phase B) — one draw per entity, colored via ROLES() ----------
// water-lily cup on a mature pad (distinct from lotus: flat, small, sits at the pad edge)
function drawLily(c,p,R,ry){const b=p.bloom||0;if(b<=0)return;const RL=ROLES();
  c.save();c.translate((p.rx??p.x)+R*.55,(p.ry??p.y)-ry*.4);

    const g=c.createLinearGradient(0,0,0,-r);g.addColorStop(0,RL.bloom.top);g.addColorStop(1,hexA(RL.bloom.bot,.9));
    c.fillStyle=g;c.beginPath();c.moveTo(0,0);c.quadraticCurveTo(r*.4,-r*.55,0,-r);c.quadraticCurveTo(-r*.4,-r*.55,0,0);c.fill();c.restore();}
  c.fillStyle=RL.bloom.center;c.beginPath();c.arc(0,0,r*.3,0,TAU);c.fill();c.restore();}
// pad with variety: classic / copper-edged / small clustering species (+ lily when mature)
function drawPadV(c,p,tint,opts){

// reeds/cattails — the pond's first vertical element; gentle sway; perch-to-be
function drawReed(c,p){const RL=ROLES(),g=p.grow??0,h=(34+64*g),sw=REDUCE?.3:1,t=Pond._t,SP=p.spread||4.5,hm=1+(p.hue||0)*.008;

      c.strokeStyle=shade(RL.foliage[0],1.2);c.lineWidth=1.4;c.beginPath();c.moveTo(bx+lean,-hh-3);c.lineTo(bx+lean,-hh-9);c.stroke();}}

// water iris — emergent accent bloom (feeds the bloom score)
function drawIris(c,p){const RL=ROLES(),g=p.grow??0,h=20+34*g,sw=REDUCE?.3:1,t=Pond._t,hm=1+(p.hue||0)*.008;

// duckweed — drifting micro-pad clusters; koi nibble them (the pond feeds itself a little)

// submerged grass — BELOW plane: darker, softer, parallax sway under the koi

// horsetail — vertical SEGMENTED stems with node rings + a dark strobilus tip; the
// pond's most architectural plant (emergent, sways, perch-worthy)
function drawHorsetail(c,p){const RL=ROLES(),g=p.grow??1,h=40+56*g,sw=REDUCE?.3:1,t=Pond._t,hm=1+(p.hue||0)*.008;
  drawShadow(c,p.rx??p.x,p.ry??p.y,14,5.5,0,.5);
  c.save();c.translate(p.rx??p.x,p.ry??p.y);c.lineCap='round';
  for(let i=0;i<p.n;i++){const bx=(i-(p.n-1)/2)*p.spread,ph=p.bp+i*1.1,lean=Math.sin(t*.4+ph)*3*sw;
    const hh=h*(.72+.28*Math.sin(ph*2.3)),c1=bx+lean*.5,y1=-hh*.55,c2x=bx+lean;

// water hyacinth — a floating rosette of glossy leaves around a bulbous float,

function drawHyacinth(c,p){const RL=ROLES(),g=p.grow??1,R=10+(p.size??.4)*42*g,hm=1+(p.hue||0)*.008;

  c.fillStyle=shade(RL.foliage[2],hm*1.06);c.beginPath();c.ellipse(0,0,R*.32,R*.28,0,0,TAU);c.fill();   // the buoyant float
  if(p.bloom>0){const BA=RL.bloomAlt||RL.bloom;
    for(let i=0;i<3;i++){const a=i/3*TAU+.6;c.fillStyle=i?BA.top:BA.bot;
      c.beginPath();c.ellipse(Math.cos(a)*R*.15,Math.sin(a)*R*.15-R*.08,R*.15,R*.11,a,0,TAU);c.fill();}
    c.fillStyle=RL.bloom.center;c.beginPath();c.arc(0,-R*.08,R*.06+.8,0,TAU);c.fill();}

function drawPlant(c,p,pal,opts){switch(p.type){

// hardscape — heavy forms that moss over grow (metal: oxidizing ore, via roles)
function drawRockVec(c,r){const RL=ROLES(),R=rockR(r),rnd=srand(r.sd||0);   // seeded: every rock is its own individual
  c.save();c.translate(r.x,r.y);
  // (waterline shadow moved OUT of the bake — drawRock draws the shape-matched soft one live)
  if(r.form==='lantern'){const s=r.size*1.25;                                                // stone toro — squat, grounded; kasa OVERHANGS the light box
    c.fillStyle=RL.stone[1];c.beginPath();c.ellipse(0,2*s,11*s,4.5*s,0,0,TAU);c.fill();      // base stone
    c.fillStyle=RL.stone[2];c.fillRect(-4.5*s,-9*s,9*s,11*s);                                // short, thick post
    c.fillStyle=RL.stone[1];c.fillRect(-8*s,-12*s,16*s,3.4*s);                               // chudai (platform)
    c.fillStyle=RL.stone[0];c.fillRect(-7*s,-22*s,14*s,10*s);                                // hibukuro (light box)
    c.fillStyle='rgba(8,10,8,.72)';c.fillRect(-3.6*s,-20.4*s,7.2*s,7*s);                     // window (glows at dusk)
    c.fillStyle=RL.stone[1];c.beginPath();c.moveTo(-13*s,-22*s);                             // kasa — broad swept cap, wider than the box
    c.quadraticCurveTo(0,-31*s,13*s,-22*s);c.quadraticCurveTo(0,-25.5*s,-13*s,-22*s);c.closePath();c.fill();
    c.fillStyle=RL.stone[0];c.beginPath();c.arc(0,-27.5*s,2.1*s,0,TAU);c.fill();             // hoju (finial)
  }else if(r.form==='driftwood'){c.rotate(r.rot);
    // weathered wood, three SEEDED forms: 0 = log with a broken branch stub · 1 = bowed slim log · 2 = forked snag
    const vt=(r.sd||0)%3,L=R,Wd=R*(vt===1?.15+rnd()*.05:.2+rnd()*.08),bw=(rnd()-.5)*Wd*(vt===1?2.4:.8);
    const g=c.createLinearGradient(0,-Wd,0,Wd);g.addColorStop(0,RL.wood[0]);g.addColorStop(.5,RL.wood[1]);g.addColorStop(1,RL.wood[2]);
    c.fillStyle=g;c.beginPath();

      c.moveTo(-L,-Wd*.6);c.quadraticCurveTo(-L*.3,-Wd*1.05+bw,L*.28,-Wd*.7);
      c.lineTo(L*.96,-Wd*1.7);c.lineTo(L*1.02,-Wd*1.1);c.lineTo(L*.44,-Wd*.1);

      c.quadraticCurveTo(-L*.35,Wd*1.02+bw,-L,Wd*.52);c.closePath();c.fill();
    }else{

      c.quadraticCurveTo(L*1.08,bw*.4,L*.98,Wd*.32);c.lineTo(L*.45,Wd*.74);
      c.quadraticCurveTo(-L*.3,Wd*1.06+bw,-L,Wd*.52);c.closePath();c.fill();
    }
    if(vt===0){const sx=-L*(.05+rnd()*.35),sa=-.65+(rnd()-.5)*.5;                 // broken branch stub (seeded placement/angle)
      c.save();c.translate(sx,-Wd*.85);c.rotate(sa);
      const bg2=c.createLinearGradient(0,0,0,-R*.32);bg2.addColorStop(0,RL.wood[1]);bg2.addColorStop(1,RL.wood[2]);
      c.fillStyle=bg2;c.beginPath();c.moveTo(-Wd*.32,0);c.lineTo(-Wd*.16,-R*.3);c.lineTo(Wd*.14,-R*.32);c.lineTo(Wd*.3,0);c.closePath();c.fill();
      c.fillStyle=shade(RL.wood[0],1.25);c.beginPath();c.ellipse(0,-R*.3,Wd*.16,Wd*.09,0,0,TAU);c.fill();c.restore();}

    c.strokeStyle=hexA(RL.wood[2],.7);c.lineWidth=1;                              // end-grain rings
    for(let i=1;i<=2;i++){c.beginPath();c.ellipse(-L*.97,-Wd*.04,Wd*.26*i/3,Wd*.55*i/3,0,0,TAU);c.stroke();}
    c.strokeStyle=hexA(RL.wood[2],.5);c.lineWidth=1.1;                            // bark grain follows the bow
    for(let i=-1;i<=1;i++){c.beginPath();c.moveTo(-L*.82,i*Wd*.36);c.quadraticCurveTo(0,i*Wd*.55+bw*.6,L*(vt===2?.4:.75),i*Wd*.26);c.stroke();}
    c.fillStyle=hexA(RL.wood[2],.85);                                             // knots — seeded count + placement
    for(let i=0,nk=vt===1?2:1;i<nk;i++){c.beginPath();c.ellipse(L*(-.3+rnd()*.7),bw*.5+(rnd()-.5)*Wd*.6,2.6,1.8,rnd()*2,0,TAU);c.fill();}

    c.beginPath();c.moveTo(-L*.9,-Wd*.62);c.quadraticCurveTo(-L*.1,-Wd*1.02+bw,L*.5,-Wd*.68);c.stroke();
  }else if(r.form==='slate'){c.rotate(r.rot);

    for(let l=0;l<NL;l++){jx.push((rnd()-.5)*4);jy.push((rnd()-.5)*2.4);jr.push((rnd()-.5)*.14);}
    for(let l=NL-1;l>=0;l--){const s2=1-l*.13,ox=l*2.2+jx[l],oy=-l*3.4+jy[l];
      c.save();c.rotate(jr[l]);

    c.fillStyle=g;c.beginPath();P.forEach((p2,i)=>{const x=p2[0]*R,y=p2[1]*R*.8;i?c.lineTo(x,y):c.moveTo(x,y);});c.closePath();c.fill();

    c.strokeStyle='rgba(0,0,0,.3)';c.lineWidth=1.1;                               // cracks — seeded start/kink/reach
    const cx0=-R*(.05+rnd()*.3);

  }else if(r.form==='spout'){

    const s2=r.size,bam=RL.wood;
    c.fillStyle=RL.stone[1];c.beginPath();c.ellipse(0,12*s2,13*s2,5*s2,0,0,TAU);c.fill();          // basin
    c.fillStyle=shade(RL.stone[0],1.05);c.beginPath();c.ellipse(0,11*s2,9*s2,3.4*s2,0,0,TAU);c.fill();
    c.fillStyle='rgba(130,185,195,.32)';c.beginPath();c.ellipse(0,11*s2,7*s2,2.5*s2,0,0,TAU);c.fill(); // held water
    const g4=c.createLinearGradient(-2.6*s2,0,2.6*s2,0);

    for(const ny of[-15,-5,5]){c.beginPath();c.moveTo(-2.6*s2,ny*s2);c.lineTo(2.6*s2,ny*s2);c.stroke();}  // culm nodes
    c.strokeStyle='rgba(255,255,255,.14)';c.beginPath();c.moveTo(-1.6*s2,-21*s2);c.lineTo(-1.6*s2,9*s2);c.stroke(); // wet sheen
  }else if(r.form==='steps'){c.rotate(r.rot);
    // stepping stones — three worn flats in a short seeded arc, an invitation across the water
    for(let i=0;i<3;i++){const a2=(i-1)*.45+(rnd()-.5)*.24,d=R*.62*(i-1)+(rnd()-.5)*R*.12;
      const sy=(rnd()-.5)*R*.3,rr2=R*(.28+rnd()*.09),tn2=.95+rnd()*.14;
      c.save();c.translate(d,sy);c.rotate(a2);
      c.fillStyle=shade(RL.stone[2],tn2);c.beginPath();c.ellipse(1,1.6,rr2,rr2*.72,0,0,TAU);c.fill();     // riser side
      c.fillStyle=shade(RL.stone[1],tn2);c.beginPath();c.ellipse(0,0,rr2,rr2*.72,0,0,TAU);c.fill();
      c.fillStyle=shade(RL.stone[0],tn2);c.beginPath();c.ellipse(-rr2*.08,-rr2*.12,rr2*.8,rr2*.52,0,0,TAU);c.fill(); // worn top
      c.strokeStyle='rgba(255,255,255,.12)';c.lineWidth=1;c.beginPath();c.ellipse(0,0,rr2,rr2*.72,0,0,TAU);c.stroke();

  if(r.grow>0.05&&r.form!=='spout'){c.globalAlpha=.36*r.grow;c.fillStyle=RL.moss;            // moss creeps with age — hugging the FORM (bamboo stays clean)

    if(r.form==='driftwood'){const L=R,Wd=R*.24;                  // moss lies ALONG the grain, inside the wood silhouette
      for(let i=0;i<3;i++){const mx=(rn()-.5)*L*1.1,my=(rn()-.5)*Wd*.7;

    c.globalAlpha=1;}
  c.restore();}

// shishi-odoshi cycle — PURE function of time+seed (stateless, fps-independent):
// the arm slowly rises as it "fills", tips once per period (~12-16s), returns.
function spoutPhase(r){const T=(12+((r.sd||0)%5))*(REDUCE?1.7:1),tt=((Pond._t+(r.sd||0))%T)/T;
  const pulse=(tt>.78&&tt<.97)?Math.sin((tt-.78)/.19*Math.PI):0;
  return {a:-.2+.06*Math.min(1,tt/.78)+.95*pulse*pulse,pulse,cyc:Math.floor((Pond._t+(r.sd||0))/T)};}
function updateSpout(r){const sp=spoutPhase(r);                       // sim side: the SPILL (once per cycle)
  if(sp.pulse>.8&&r._tipC!==sp.cyc){r._tipC=sp.cyc;
    const mx=r.x+Math.cos(sp.a)*16*r.size,my=r.y-14*r.size+Math.sin(sp.a)*16*r.size;
    Pond.ripples.push({x:mx,y:Math.max(my,r.y+6*r.size),r:2,max:46,age:0,life:1.2,s:1});
    Pond.sparkles.push({x:mx,y:my,age:0,life:.4,mag:.7});Pond.sparkles.push({x:mx+2,y:my+4,age:0,life:.35,mag:.55});}}
function drawSpoutArm(c,r){const RL=ROLES(),s2=r.size,sp=spoutPhase(r),bam=RL.wood;
  c.save();c.translate(r.x,r.y-14*s2);c.rotate(sp.a);
  const g5=c.createLinearGradient(0,-2*s2,0,2*s2);
  g5.addColorStop(0,shade(bam[0],1.35));g5.addColorStop(.5,shade(bam[1],1.2));g5.addColorStop(1,bam[2]);
  c.fillStyle=g5;c.fillRect(-6*s2,-2*s2,22*s2,4*s2);                  // the tipping tube
  c.strokeStyle=hexA(bam[2],.85);c.lineWidth=1;
  c.beginPath();c.moveTo(4*s2,-2*s2);c.lineTo(4*s2,2*s2);c.stroke();  // node ring
  c.fillStyle='rgba(10,14,12,.75)';c.beginPath();c.ellipse(16*s2,0,1.6*s2,2*s2,0,0,TAU);c.fill();   // open mouth
  if(sp.pulse>.5){c.strokeStyle='rgba(190,225,230,.5)';c.lineWidth=1.2;   // the pour
    c.beginPath();c.moveTo(16*s2,2*s2);c.lineTo(17.5*s2,9*s2);c.stroke();}
  c.restore();}
// ---------- static-art sprites: per-entity slots + a bake budget (perf) ----------
// Gradient-heavy QUASI-STATIC art (pads, lotus, hardscape) bakes into a small offscreen
// canvas owned by the ENTITY, and re-bakes IN PLACE only when its look-key changes
// (skin / growth / bloom buckets). No shared cache map -> no growth, no clear-storms,
// no canvas/GPU-texture churn: each entity allocates one canvas for its lifetime.
// A per-frame BAKE BUDGET smooths re-bakes: while a pond full of growing plants crosses
// buckets, at most a couple re-bake per frame and the rest draw one-bucket-stale art —
// invisible to the eye, and it kills the re-bake hitches that read as jank.
const SPR=1.5;let _bakeBudget=2;
function entitySprite(ent,key,half,draw){
  if(ent._sprKey===key&&ent._spr)return ent._spr;
  if(ent._spr&&_bakeBudget<=0)return ent._spr;             // stale-but-smooth; its turn comes next frames
  const px=Math.ceil(half*2*SPR);let s=ent._spr;
  if(!s||s.width!==px){s=document.createElement('canvas');s.width=s.height=px;ent._spr=s;}
  const g=s.getContext('2d');g.setTransform(1,0,0,1,0,0);g.clearRect(0,0,px,px);
  g.save();g.scale(SPR,SPR);g.translate(half,half);draw(g);g.restore();
  ent._sprKey=key;_bakeBudget--;
  return s;}
const bkt=(v,q)=>Math.round((v||0)*q);
// bake() draws the entity at the origin, rotation 0; the sprite rotates at draw time.
function cachedPlant(c,p,keyExtra,bake){
  const half=p.type==='lotus'?76:70;
  {let R=18+(p.size??.4)*46*(p.grow??1);if(!isFinite(R)||R<2)R=18;      // soft day-aware shadow, live under the sprite
   const rx=p.type==='lotus'?R+20:p.vr==='cluster'?R*1.3:R*1.06;
   drawShadow(c,p.rx??p.x,p.ry??p.y,rx,rx*.68,p.rrot??p.rot,p.type==='lotus'?.4:.45);}
  const key=`${skin}|${p.vr||''}|${bkt(p.grow,24)}|${bkt(p.bloom,24)}|${keyExtra||''}`;
  const s=entitySprite(p,key,half,g=>bake(g,{...p,x:0,y:0,rx:0,ry:0,rot:0,rrot:0}));
  c.save();c.translate(p.rx??p.x,p.ry??p.y);c.rotate(p.rrot??p.rot);
  c.drawImage(s,-half,-half,half*2,half*2);c.restore();}
function drawRock(c,r){                                  // rocks are static except slow moss — ideal sprites
  const R=rockR(r);                                      // shape-matched soft shadow, live (day-aware via SHDIM)
  let rx=R*.98,ry=R*.48,ro=0,sa=.55;
  if(r.form==='driftwood'){rx=R*.95;ry=R*.2;ro=r.rot;sa=.5;}     // a log shades a tight sliver hugging its own axis
  else if(r.form==='slate'){rx=R*.92;ry=R*.42;ro=r.rot;sa=.5;}   // flat plates sit low — tight, thin
  else if(r.form==='lantern'){rx=R*.72;ry=R*.34;sa=.5;}          // only the base touches the water
  else if(r.form==='spout'){rx=R*.6;ry=R*.3;sa=.5;}              // basin footprint only
  else if(r.form==='steps'){rx=R*1.08;ry=R*.46;ro=r.rot;sa=.45;} // a low flat run
  drawShadow(c,r.x,r.y,rx,ry,ro,sa);
  const half=r.form==='driftwood'?58:(r.form==='lantern'||r.form==='spout')?62:52;
  const key=`${skin}|${bkt(r.grow,10)}`;
  const s=entitySprite(r,key,half,g=>drawRockVec(g,{...r,x:0,y:0}));
  c.drawImage(s,r.x-half,r.y-half,half*2,half*2);
  if(r.form==='spout')drawSpoutArm(c,r);}                        // the arm moves — drawn live over the baked stand

const SKINS={};
// entity/skin contract v2: an entity drawn once against ROLES() reads correctly in
// every skin (bespoke handlers still win). rain renders the Natural pond into its
// buffer, so its entities inherit Natural's roles by construction.
function ROLES(){const S=SKINS[skin];return (S&&S.roles)||SKINS.natural.roles;}

// ---- NATURAL (the canonical, reference-accurate core) ----
SKINS.natural={
  // canonical palette roles — the reference every skin re-voices

         stone:['#8d867a','#645e52','#3c382f'],moss:'#4a6b3f',

         bloom:{top:'#f6dfe8',bot:'#e98fb0',center:'#f3d27a'},bloomAlt:{top:'#c3b8ec',bot:'#7f6fc4'},glow:'#f0cf86'},
  water(c,t){const g=c.createRadialGradient(W*.5,H*.42,Math.min(W,H)*.1,W*.5,H*.5,Math.max(W,H)*.8);
    g.addColorStop(0,'#3c7d68');g.addColorStop(.55,'#235448');g.addColorStop(1,'#0f2a23');

    caustics(c,W,H,t*1.3,'rgba(220,200,120,.06)','screen');
    caustics(c,W,H,t*.7+11,'rgba(120,180,210,.05)','screen');
    c.globalCompositeOperation='screen';
    // direct sunbeam pooling on the surface, slowly wandering
    const sbR=Math.max(W,H)*.34, sbA=.05+.035*Math.sin(t*.6);
    const bm=c.createRadialGradient(Pond.sun.x,Pond.sun.y,0,Pond.sun.x,Pond.sun.y,sbR);
    bm.addColorStop(0,`rgba(228,240,205,${sbA})`);bm.addColorStop(.6,`rgba(200,225,180,${sbA*.4})`);bm.addColorStop(1,'transparent');
    c.fillStyle=bm;c.beginPath();c.arc(Pond.sun.x,Pond.sun.y,sbR,0,TAU);c.fill();
    // whole-surface shimmer breathing slowly
    c.globalAlpha=.04+.03*Math.sin(t*.4);
    const sg=c.createRadialGradient(W*.4,H*.35,0,W*.5,H*.5,Math.max(W,H)*.7);
    sg.addColorStop(0,'rgba(200,230,210,1)');sg.addColorStop(1,'rgba(200,230,210,0)');
    c.fillStyle=sg;c.fillRect(0,0,W,H);c.globalAlpha=1;
    // soft surface ripple lines
    c.strokeStyle='rgba(180,220,200,.05)';c.lineWidth=1;
    for(let i=0;i<5;i++){const yy=((t*8+i*70)%(H+80))-40;c.beginPath();for(let x=0;x<=W;x+=24)c.lineTo(x,yy+Math.sin(x*.02+t+i)*5);c.stroke();}
    c.globalCompositeOperation='source-over';
    drawWakes(c);},
  koi(c,k,sp,dim){const v=k.V,bp=bodyPath2(k,sp);
    // floor shadow (depth realism) — two offset fills, no per-koi blur filter (was blur(3px) per fish)
    c.save();const sa=(.16+.16*k.depth)*SHDIM;c.fillStyle='#08160f';
    c.translate(5+k.depth*8,7+k.depth*9);c.globalAlpha=sa*.62;c.fill(bp);
    c.translate(2.5,2.5);c.globalAlpha=sa*.38;c.fill(bp);c.restore();
    // fins under body
    c.fillStyle=hexA(v.metal? v.accent:'#e9e2d2',.22*dim);tailFin(c,k,sp);c.fill();pecFins(c,k,sp);
    // body base
    if(v.metal){const g=c.createLinearGradient(k.x-ewd(k)*2,k.y-ewd(k)*2,k.x+ewd(k)*2,k.y+ewd(k)*2);

    if(v.motoguro){const pp=sampleSpineN(sp,.26),w=ewd(k)*widthAt(.26);for(const s of[1,-1]){c.fillStyle=hexA('#15110d',.78*dim);c.beginPath();c.ellipse(pp.x+pp.nx*w*s,pp.y+pp.ny*w*s,w*.5,w*.32,k.ang,0,TAU);c.fill();}}

    sg.addColorStop(0,'rgba(255,255,255,.16)');sg.addColorStop(.4,'rgba(255,255,255,.05)');sg.addColorStop(1,'rgba(0,0,0,.08)');

    for(const s of[1,-1]){c.beginPath();c.arc(hd2.x+hd2.nx*w2*.55*s,hd2.y+hd2.ny*w2*.55*s,1.6+ewd(k)*.06,0,TAU);c.fill();}},
  plant(c,p){if(p.type==='pad'||p.type==='lotus')cachedPlant(c,p,'n',(g,q)=>drawPlant(g,q,null));

       for(let i=0;i<n;i++){const ph=i*2.399963;

};

// ---- LIQUID METAL ----
// Principle: metal is a FINISH, not a palette. Each element keeps its real koi-pond hue
// but is cast in its ORGANIC metal — read from specular behaviour (blown highlights on a
// dark mirror), full-frame: substrate, light, ripples, pads, koi.
// map a koi's variety to its organic metal {base,accent,sumi,shiro,rim, cool?}
function koiMetal(v){
  if(v===V.platinum) return {cool:1,base:'#dfe7ec',accent:'#aebcc6',sumi:'#5b6770',shiro:'#f2f6f8',rim:'#ffffff'}; // cool silver — the focal accent
  if(v===V.ogon)     return {base:'#e7b85a',accent:'#f6d98a',sumi:'#7a5320',shiro:'#f6e6b0',rim:'#fff0c4'};        // molten brass / gold
  if(v===V.benigoi)  return {base:'#c66a3a',accent:'#e89a5e',sumi:'#6e2e16',shiro:'#f0b07a',rim:'#ffd8a8'};        // copper-red
  const n=v.base.replace('#',''),lum=(parseInt(n.substr(0,2),16)+parseInt(n.substr(2,2),16)+parseInt(n.substr(4,2),16))/3;
  if(lum<90)         return {base:'#33271a',accent:'#c87a44',sumi:'#1a130c',shiro:'#caa86a',rim:'#ffe0a8'};        // dark-based (Showa) -> dark bronze
  return {base:'#e9ddc6',accent:'#c87a44',sumi:'#5a4632',shiro:'#f3ead6',rim:'#ffe9c4'};                           // copper-and-silver (Kohaku/Sanke/Tancho/Asagi)
}
// the temperature split (v0.5): warm bronze MIDS, but the speculars (a reflected dusk sky) are COOL
// silver-blue — cool-on-warm is the single biggest "real metal" cue. Bodies warm, highlights cool.
const METAL_COOL='#dce8ff';
// a flowing chrome reflection ribbon (v0.6): a bright COOL band whose edges undulate and travel,
// like liquid mercury catching a moving environment. Cheap: one wavy filled path, screen-blended.
function chromeRibbon(c,yc,thick,t,seed,a){const step=Math.max(16,W/90|0);
  // perf: gradients are position-fixed paints — cache one per (thick,alpha) config and
  // slide it under the ribbon with a translate; the path is built in ribbon-local space

// FIX (founding-era latent bug): the trail recorded a point EVERY frame with no distance
// gate, capped at ~36 points — at koi swim speed that is ~15-25px of trail for a ~100px
// body, so the rear of every koi collapsed to a point (fish always rendered boxy-short).
// Elder fins scale with the INTENDED length, which made the collapse read as broken fins.
// Points are now distance-gated (2px) and the cap covers the full body length.
// (B.2.4) commit-or-replace: the previous gate dragged trail[0] WITH the head every
// frame, so the 2px spacing never tripped — the trail starved at 1 point (stiff
// straight-fallback fish) and any frame spike committed a ~2px trail (collapsed box).
// Now the head is exact every frame, and a point COMMITS only once it is 2px behind.
function trailPush(k){const tr=k.trail;
  if(tr.length>1&&((tr[0].x-tr[1].x)**2+(tr[0].y-tr[1].y)**2)<4)tr.shift();
  tr.unshift({x:k.x,y:k.y});

    if(!lw||((tlx-lw.x)**2+(tly-lw.y)**2)>30)k.wake.unshift({x:tlx,y:tly,age:0});

  let bf=null,bd=1e9,af=null,ad=1e9;

    if(d<rr){const a=Math.atan2(dy,dx);let da=((a-k.ang+Math.PI*3)%TAU)-Math.PI;desired+=da*(1-d/rr)*1.6;}}

    else if(p.type==='duckweed'){const d2=(p.x-k.x)**2+(p.y-k.y)**2;                          // ambient nibble: the pond feeds itself a little

  // frenzy surge: up to ~2.5x toward the splash, braking in the last stretch so the
  // crowd gathers AT the food instead of overshooting through it. Dominant fish press
  // HARDER (they reach the food first and take the first bites)
  // brake into the food: a CONTINUOUS ease from ~46px down to a crawl at the pellet, so a
  // fish SETTLES onto it instead of torpedoing through. (Was stepped .22/.6/1 — on mobile's
  // big dt a fish crossed a step every frame and its speed jumped 4.5x frame-to-frame:
  // visible vibration right at the food. A smooth curve is fps-independent.)

  // ~1 rad/s at a ~10px/s crawl = a 10px pirouette, fish writhing in circles at the food,

  // shove is ASYMMETRIC by rank: the subordinate yields, the dominant holds its spot
  // (a dominant fish pushes smaller ones aside; nobody is trapped — everyone still eats).
  // All neighbor shoves are GATHERED into one nudge and capped to ~30px/s: on mobile's
  // big dt (~.1s) the old per-neighbor position shoves stacked into multi-pixel
  // teleports that reversed every frame — fish visibly vibrating ("glitching") in the
  // crowd. Desktop's small dt never showed it. Capped drift is identical at any fps.
  if(bf&&bd<70*70){let jx=0,jy=0;
    for(const o of Pond.koi){if(o===k||o.departing)continue;

  // eating is VISIBLE: the pellet is claimed, drawn into the working mouth, and gulped —
  // the final slurp pops a small ring other koi rush to (fish follow fish at a feeding).
  // handling time: a fish finishes its gulp AND a short chew (wellfed fresh off 4)
  // before claiming the NEXT pellet, so one quick fish can't hoover the whole throw —
  // the crowd shares, like a real pond.
  // a dominant fish can snatch a barely-touched pellet from a lesser one (it takes the
  // first bite) — only at the very start of the bite, and handling time still forces gaps
  // so the timid always get their turn on the next pellet (the pond stays kind, no starving)

  // a bigger fish reaches the pellet from farther — its bulk advantage, not agility
  // (the anti-spin wmax deliberately makes big fish LESS nimble, true to real koi;
  // dominance shows through reach + priority instead of out-maneuvering)
  const eatR=14+ewd(k)*.5;

  else if(bf&&bd<52*52&&Math.random()<dt*1.6)k.gulp=Math.max(k.gulp||0,.3);   // gasping at the surface in the crowd
  // while a pellet is in sight the frenzy HOLDS (a working floor) — real koi don't lose
  // interest mid-rush; the moment the water is empty, calm returns within a couple seconds

function thriving(){let f=0;for(const k of Pond.koi)f+=k.wellfed>0?1:.3;f/=Math.max(1,Pond.koi.length);

function feed(x,y){const n=6+(Math.random()*4|0);

    Pond.food.push({x:x+Math.cos(a)*d,y:y+Math.sin(a)*d,r:rand(2.2,3.2),life:rand(18,24),hue:rand(-12,12),bob:rand(0,TAU)});}

  for(const k of Pond.koi){if(k.departing)continue;

let skin='natural';

// ribbons + wakes) are soft glows and the bulk of raster cost — paint them at WS
// scale into a persistent buffer and upscale. On software-rasterizing machines
// (human measured 11 fps live) this is the difference between slideshow and smooth.
let wbuf=null,wctx=null,WS=.5;

// ---- day cycle (Phase C, LIVE): a slow, real-time ambient drift on the local clock ----
// warm day -> amber dusk -> cool-dark night -> pale dawn, with long unhurried ~1.5h
// blends — felt, not watched. Per-skin ruling: natural + rain follow the full cycle
// (rain inherits through its buffer); metal takes the same grade (the mirror reflects
// the sky it is under — director tunes speculars later); INK KEEPS ITS ETERNAL DUSK.
// QA: the codex card forces a phase (session-only); ?hour=N overrides the clock (dev).
const DayQA={force:null};   // null(auto = real clock) | 'dawn' | 'day' | 'dusk' | 'night'
const DEVHOUR=(()=>{try{const m=(location.search||'').match(/[?&]hour=([\d.]+)/);return m?+m[1]:null;}catch(e){return null;}})();
function dayMix(){let h;

  else if(DEVHOUR!=null)h=DEVHOUR;

  const dawn=(h>=4.5&&h<8.5)?ramp(h,4.5,6)*(1-ramp(h,7,8.5)):0;

    g.addColorStop(0,`rgba(255,160,80,${.13*m.dusk})`);g.addColorStop(1,'transparent');c.fillStyle=g;c.fillRect(0,0,W,H);}

  if(m.dawn>.02){c.globalCompositeOperation='multiply';c.fillStyle=`rgba(224,212,224,${.5*m.dawn})`;c.fillRect(0,0,W,H);
    c.globalCompositeOperation='screen';c.fillStyle=`rgba(255,214,214,${.07*m.dawn})`;c.fillRect(0,0,W,H);}

function render(t){
  _bakeBudget=2;                                           // sprite re-bakes allowed this frame (smoothness > freshness)
  // shadow strength follows the light: full under the day sun, softer through dusk/dawn,
  // faint at night (moon, not sun). Ink keeps a fixed stylized weight (eternal dusk).
  {const m=dayMix();SHDIM=skin==='ink'?.85:clamp(1-.62*m.night-.26*m.dusk-.16*m.dawn,.3,1);}
  // hard-reset canvas state each frame so no blend/blur/alpha can leak between skins or frames
  ctx.filter='none';ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.shadowBlur=0;ctx.shadowColor='transparent';
  const S=SKINS[skin];ctx.save();
  try{
    if(S.full){S.render(ctx,t);if(!S.selfTint)dayTint(ctx);}
    else{
      wctx.setTransform(WS,0,0,WS,0,0);S.water(wctx,t);            // soft water at reduced res
      ctx.imageSmoothingEnabled=true;ctx.drawImage(wbuf,0,0,W,H);  // upscale — glow doesn't mind
      const PL=S.plant||SKINS.natural.plant;
      for(const p of Pond.plants)if(BELOW_TYPES[p.type])PL(ctx,p);   // BELOW plane (submerged grass)
      drawSchool(ctx);drawFrogBelow(ctx);                            // BELOW life: the school, the frog's glide
      for(const r of Pond.rocks)drawRock(ctx,r);                     // hardscape sits in the water, under the fish
      const ks=Pond.koi.slice().sort((a,b)=>b.depth-a.depth);
      for(const k of ks){const sp=spine(k,18);S.koi(ctx,k,sp,lerp(.6,1,1-k.depth));}
      drawGulps(ctx);                                                // feeding mouths, over any skin's koi
      for(const p of Pond.plants)if(!BELOW_TYPES[p.type])PL(ctx,p);  // ON plane (floating + emergent flora)
      drawFrog(ctx);                                                 // the mayor sits ON his pad
      drawFX(ctx);(S.overlay||(()=>{}))(ctx,t);drawSparkles(ctx);
      drawDragonfly(ctx);drawFireflies(ctx);dayTint(ctx);}           // ABOVE plane, then the day's grade
  }catch(e){if(!render._warned){console.warn('skin render error:',e);render._warned=1;}}
  ctx.restore();
  // belt & suspenders: leave state clean for the next frame no matter what a skin did
  ctx.filter='none';ctx.globalCompositeOperation='source-over';ctx.globalAlpha=1;ctx.shadowBlur=0;
}

const P={x:-999,y:-999,px:0,py:0};let lastMove=0, drag=null, sel=null, placing=null;
function plantAt(x,y){for(let i=Pond.plants.length-1;i>=0;i--){const p=Pond.plants[i];
  const R=(p.type==='lotus'?46:p.type==='pad'?18+p.size*46*p.grow:p.type==='duckweed'?18:p.type==='grass'?26:p.type==='hyacinth'?30:30)+10;
  if((x-p.x)**2+(y-p.y)**2<R*R)return p;}return null;}
function rockAt(x,y){for(let i=Pond.rocks.length-1;i>=0;i--){const r=Pond.rocks[i];
  const R=rockR(r)+8;if((x-r.x)**2+(y-r.y)**2<R*R)return r;}return null;}
function koiAt(x,y){let best=null,bd=1e9;for(const k of Pond.koi){if(k.departing)continue;
  const d=(x-k.x)**2+(y-k.y)**2,r=Math.max(20,elen(k)*.45);if(d<r*r&&d<bd){bd=d;best=k;}}return best;}
function move(x,y){P.px=P.x;P.py=P.y;P.x=x;P.y=y;
  if(drag){drag.tx=clamp(x,40,W-40);drag.ty=clamp(y,40,H-40);cv.style.cursor='grabbing';showUI();return;}
  const now=performance.now();
  if(now-lastMove>34){const dx=x-P.px,dy=y-P.py;if(dx*dx+dy*dy>9)Pond.ripples.push({x,y,r:2,max:90,age:0,life:1.5,s:1});lastMove=now;}
  cv.style.cursor=placing?'copy':(plantAt(x,y)||rockAt(x,y))?'grab':'crosshair';showUI();}
cv.addEventListener('pointermove',e=>move(e.clientX,e.clientY));
cv.addEventListener('pointerdown',e=>{const x=e.clientX,y=e.clientY;
  if(placing){placeAt(x,y);return;}                                          // composition belongs to the player
  const kh=koiAt(x,y);
  if(kh){showCard(kh);showUI();return;}                                      // click a koi -> its card; click water -> feed
  const rh=rockAt(x,y);
  if(rh){drag={rock:rh,tx:clamp(x,40,W-40),ty:clamp(y,40,H-40)};cv.style.cursor='grabbing';showUI();return;}
  const hit=plantAt(x,y);
  if(hit){const i=Pond.plants.indexOf(hit);if(i>=0){Pond.plants.splice(i,1);Pond.plants.push(hit);}  // lift to top
    drag={plant:hit,tx:clamp(x,40,W-40),ty:clamp(y,40,H-40)};cv.style.cursor='grabbing';showUI();}
  else{hideCard();feed(x,y);}});
addEventListener('pointerup',()=>{if(drag){persist();drag=null;cv.style.cursor='crosshair';}});
cv.addEventListener('pointerleave',()=>{P.x=-999;P.y=-999;});
const ser=document.getElementById('serN');
const skinsBar=document.getElementById('skins'),tendBar=document.getElementById('tend'),hint=document.getElementById('hint');
let uiTimer=null;

  if(trayMode||placing||drag||(typeof kcard!=='undefined'&&!kcard.classList.contains('hide'))){uiTimer=setTimeout(tryHideUI,1500);return;}
  [skinsBar,tendBar].forEach(e=>e.classList.add('hide'));hint.style.opacity='0';}
function showUI(){[skinsBar,tendBar].forEach(e=>e.classList.remove('hide'));hint.style.opacity='1';clearTimeout(uiTimer);

const cKoi=document.getElementById('cKoi'),bKoi=document.getElementById('buyKoi');
const openPlant=document.getElementById('openPlant'),openPlace=document.getElementById('openPlace'),trayEl=document.getElementById('tray');
function koiCost(){return 5+Pond.koi.length*4;}
const CATALOG={                                            // placeholder prices, gentle curve — real numbers in Phase D rebalance
 plant:[{t:'pad',vr:'classic',label:'pad',cost:6},{t:'pad',vr:'copper',label:'copper pad',cost:9},{t:'pad',vr:'cluster',label:'pad cluster',cost:10},
        {t:'lotus',label:'lotus',cost:8},{t:'reed',label:'reeds',cost:10},{t:'iris',label:'iris',cost:12},
        {t:'duckweed',label:'duckweed',cost:5},{t:'grass',label:'water grass',cost:8},
        {t:'horsetail',label:'horsetail',cost:11},{t:'hyacinth',label:'water hyacinth',cost:14}],
 place:[{t:'stone',label:'river stone',cost:15},{t:'boulder',label:'boulder',cost:22},{t:'slate',label:'slate',cost:15},

let trayMode=null;
function buildTray(){trayEl.innerHTML='';if(!trayMode)return;
  CATALOG[trayMode].forEach((it,i)=>{const b=document.createElement('button');b.className='chip';
    b.innerHTML=`${it.label} <span class="c">${it.cost}</span>`;b.dataset.i=i;
    b.addEventListener('click',()=>armChip(it,b));trayEl.appendChild(b);});
  const cap=document.createElement('span');cap.className='traycap';cap.id='traycap';trayEl.appendChild(cap);   // quiet capacity readout
  refreshTray();}
function refreshTray(){const s=Pond.econ.serenity;
  const used=trayMode==='plant'?Pond.plants.length:Pond.rocks.length;
  const max=trayMode==='plant'?CAPS.plants:CAPS.rocks;
  trayEl.querySelectorAll('.chip').forEach(b=>{const it=CATALOG[trayMode][+b.dataset.i];
    b.disabled=s<it.cost||used>=max;});
  const capEl=document.getElementById('traycap');if(capEl)capEl.textContent=`${used} of ${max} placed`;}
function armChip(it,b){if(placing&&placing.it===it){placing=null;trayEl.querySelectorAll('.chip').forEach(q=>q.classList.remove('arm'));return;}
  placing={kind:trayMode,it};trayEl.querySelectorAll('.chip').forEach(q=>q.classList.remove('arm'));b.classList.add('arm');
  hint.textContent='tap the water to place it · tap the chip again to cancel';hint.style.opacity='1';}
function placeAt(x,y){const it=placing.it,kind=placing.kind;placing=null;
  trayEl.querySelectorAll('.chip').forEach(q=>q.classList.remove('arm'));hint.textContent='drag to stir · click to feed · tend & grow';
  const capped=kind==='plant'?Pond.plants.length>=CAPS.plants:Pond.rocks.length>=CAPS.rocks;
  if(Pond.econ.serenity<it.cost||capped)return;
  Pond.econ.serenity-=it.cost;x=clamp(x,50,W-50);y=clamp(y,50,H-50);
  if(kind==='plant')Pond.plants.push(it.t==='pad'?makePad(x,y,undefined,it.vr):PLANT_MAKE[it.t](x,y));
  else Pond.rocks.push(makeRock(it.t,x,y));
  Pond.ripples.push({x,y,r:3,max:kind==='place'?100:60,age:0,life:1.8,s:kind==='place'?1.5:1});persist();showUI();}
function toggleTray(mode){if(trayMode===mode){trayMode=null;placing=null;trayEl.classList.add('hide');}
  else{trayMode=mode;placing=null;trayEl.classList.remove('hide');buildTray();}
  openPlant.classList.toggle('open',trayMode==='plant');openPlace.classList.toggle('open',trayMode==='place');showUI();}
openPlant.addEventListener('click',()=>toggleTray('plant'));
openPlace.addEventListener('click',()=>toggleTray('place'));
const _ui={s:-1,kc:-1,kd:null};
function syncShop(){ // perf: runs every tick — only touch the DOM when a value actually changed
  const s=Math.floor(Pond.econ.serenity),kc=koiCost(),kd=s<kc||Pond.koi.length>=CAPS.koi;
  if(s!==_ui.s){_ui.s=s;ser.textContent=s;
    if(trayMode&&!trayEl.classList.contains('hide'))refreshTray();codexTick();}
  if(kc!==_ui.kc){_ui.kc=kc;cKoi.textContent=kc;}
  if(kd!==_ui.kd){_ui.kd=kd;bKoi.disabled=kd;}}                    // ledger: quiet cap, no error state
bKoi.addEventListener('click',()=>{if(Pond.econ.serenity<koiCost()||Pond.koi.length>=CAPS.koi)return;Pond.econ.serenity-=koiCost();
  const pool=(Pond.unlocked&&Pond.unlocked.length)?Pond.unlocked:STARTERS;const v=pool[(Math.random()*pool.length)|0];const k=makeKoi(v,rand(W*.3,W*.7),rand(H*.3,H*.7),.3);Pond.koi.push(k);
  Pond.ripples.push({x:k.x,y:k.y,r:3,max:140,age:0,life:2.4,s:1.6});persist();showUI();});

const kcard=document.getElementById('koicard'),kcName=document.getElementById('kcName'),kcJp=document.getElementById('kcJp'),
      kcStage=document.getElementById('kcStage'),kcLin=document.getElementById('kcLin'),
      kcSwim=document.getElementById('kcSwim'),kcX=document.getElementById('kcX');
function showCard(k){sel=k;kcSwim.classList.remove('confirm');kcSwim.textContent='let it swim on';
  const e=KOIDEX.find(d=>d.id===k.variety)||{name:k.variety,jp:''};

  kcStage.textContent=stage(k)+(stage(k)==='elder'?' · long-finned':'');

kcX.addEventListener('click',hideCard);
kcSwim.addEventListener('click',()=>{if(!sel)return;
  if(!kcSwim.classList.contains('confirm')){kcSwim.classList.add('confirm');kcSwim.textContent="it won't return — let it swim on?";return;}
  const k=sel;hideCard();
  const ex=[[-90,k.y],[W+90,k.y],[k.x,-90],[k.x,H+90]]
    .sort((a,b)=>((a[0]-k.x)**2+(a[1]-k.y)**2)-((b[0]-k.x)**2+(b[1]-k.y)**2))[0];
  k.departing=1;k.exit={x:ex[0],y:ex[1]};});                       // the Almanac will remember it (step() records on exit)

// ---- dev lifecycle harness (?dev=1) — warps run the REAL idleReturn path, cap lifted ----
function devWarp(days){Pond.eco.lastSeen=Date.now()-days*864e5;idleReturn(true);persist();}
let devFps=null;
if(DEV){const dtr=document.getElementById('devtray');dtr.style.display='flex';
  devFps=document.createElement('span');devFps.className='chip';devFps.textContent='v3.6 · … fps';dtr.appendChild(devFps);
  const acts=[['+1d',()=>devWarp(1)],['+7d',()=>devWarp(7)],['+30d',()=>devWarp(30)],
    ['+200❀',()=>{Pond.econ.serenity+=200;}],
    ['mature flora',()=>{for(const p of Pond.plants){p.grow=1;if(p.type==='lotus'||p.type==='iris'||p.type==='pad')p.bloom=1;}for(const r of Pond.rocks)r.grow=1;persist();}],
    ['age koi +.3',()=>{for(const k of Pond.koi)k.age=Math.min(AGE_MAX,k.age+.3);persist();}]];
  for(const [l,fn] of acts){const b=document.createElement('button');b.className='chip';b.textContent=l;
    b.addEventListener('click',()=>{fn();showUI();});dtr.appendChild(b);}}

 {id:'kohaku',name:'Kohaku',jp:'紅白',cost:0,desc:'White body, stepped red (hi). The original koi.'},

const codexEl=document.getElementById('codex'),cxList=document.getElementById('cxList'),codexBtn=document.getElementById('codexBtn');
function cxOwned(e){return e.cost===0||(Pond.unlocked||[]).includes(e.id);}
function buildCodex(){cxList.innerHTML='';
  { // Pond QA — time (temporary QA surface, human-requested; remove/gate before any wider push)
    const qa=document.createElement('div');qa.className='cx';
    qa.innerHTML=`<div class="info"><div class="nm">Pond QA <span class="jp">time</span></div>
      <div class="ds">day-cycle preview (Phase C grade, session-only) · time warps run the real return path.</div>
      <div class="act" id="qaTime"></div><div class="act" id="qaWarp"></div></div>`;
    cxList.appendChild(qa);

    for(const ph of ['auto','dawn','day','dusk','night']){const b=document.createElement('button');b.className='ul';
      b.style.marginRight='5px';b.textContent=ph;
      if((DayQA.force||'auto')===ph)b.style.outline='2px solid rgba(240,207,134,.8)';

    cxList.appendChild(row);

      const sp=staticSpine(cw*.5,ch*.5,84,18,5);SKINS.natural.koi(cc,k,sp,1);}catch(err){console.warn('codex',e.id,err);}

    if(Pond.econ.serenity<cost)return;Pond.econ.serenity-=cost;(Pond.unlocked||(Pond.unlocked=[])).push(id);persist();syncShop();buildCodex();}));

// LOOP + BOOT
// =================================================================
let last=performance.now(),frame=1000/40,saveT=0,_fpsN=0,_fpsT=0;
let DPR_CAP=2;     // quality-first: full retina by default; the adaptive shed steps DOWN only if needed
let _shed=0;try{_shed=Math.min(2,+localStorage.getItem('koipond_q')||0);}catch(e){}
if(_shed){DPR_CAP=_shed===1?1.5:1;WS=_shed===1?.45:.4;}   // slow machines remember their level — no slow first 10s on return
function resize(){DPR=Math.min(devicePixelRatio||1,DPR_CAP);W=innerWidth;H=innerHeight;cv.width=W*DPR;cv.height=H*DPR;ctx.setTransform(DPR,0,0,DPR,0,0);buildBuffers();buildWaterBuf();}
addEventListener('resize',resize);
// adaptive quality: sample rolling ~5s windows; if the machine can't hold a livable rate,
// shed pixels stepwise (2 -> 1.5 -> 1, water buffer down) — never up, max twice, remembered
// in localStorage so a slow device skips the slow first seconds on its next visit.
let _adN=0,_adT=0;
function tick(now){requestAnimationFrame(tick);if(document.hidden){last=now;return;}if(now-last<frame)return;
  let dt=(now-last)/1000;last=now;if(dt>.1)dt=.1;
  step(dt);render(now/1000);syncShop();
  _adN++;_adT+=dt;
  if(_adT>=5){const f=_adN/_adT;_adN=0;_adT=0;
    if(f<22&&_shed<2){_shed++;DPR_CAP=_shed===1?1.5:1;WS=_shed===1?.45:.4;resize();
      try{localStorage.setItem('koipond_q',String(_shed));}catch(e){}}}
  if(devFps){_fpsN++;_fpsT+=dt;if(_fpsT>=1){devFps.textContent='v3.6 · '+(_fpsN/_fpsT).toFixed(0)+' fps';_fpsN=0;_fpsT=0;}}
  saveT+=dt;if(saveT>5){saveT=0;persist();}}
addEventListener('beforeunload',persist);

resize();const saved=Store.load();
if(saved&&saved.koi&&saved.koi.length){restore(saved);idleReturn();}   // away-progress applied on return (capped gift)
else{seedDefault();Pond.eco.lastSeen=Date.now();}
requestAnimationFrame(tick);
