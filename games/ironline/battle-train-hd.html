<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>IRONLINE — Battle Train of the Rail Oceans</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=VT323&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{background:#15110d;color:#efe3cc;font-family:'VT323',monospace;display:flex;justify-content:center}
#app{width:100%;max-width:480px;height:100dvh;display:flex;flex-direction:column;background:#15110d;position:relative}
#topbar{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 10px 6px}
#topbar .brand{font-family:'Press Start 2P',monospace;font-size:13px;color:#e0a33a;letter-spacing:1px;text-shadow:1px 1px 0 #6e3a18;white-space:nowrap}
.statbar{flex:1;display:grid;grid-template-columns:repeat(4,1fr);gap:5px}
.st{background:#241c14;border:2px solid #3a2e22;padding:4px 2px;text-align:center}
.st b{font-family:'Press Start 2P',monospace;font-size:10px;display:block;color:#efe3cc;margin-bottom:3px}
.st span{font-size:13px;color:#a8957a;text-transform:uppercase;letter-spacing:1px}
.st.warn b{color:#e07b2a}
.frame{flex:0 0 auto;border:3px solid #2a221b;border-left:0;border-right:0;background:#0e0b08;padding:3px 0}
.cvwrap{position:relative;line-height:0}
canvas{width:100%;display:block;image-rendering:pixelated;background:#d9a05e}
#region{position:absolute;top:26px;left:0;right:0;text-align:center;font-family:'Press Start 2P',monospace;font-size:11px;color:#f4e3bc;letter-spacing:2px;text-shadow:1px 1px 0 #4a1e0e,0 0 6px rgba(0,0,0,0.6);opacity:0;transition:opacity 0.8s ease;pointer-events:none}
#ticker{flex:0 0 auto;font-size:18px;line-height:1.2;color:#cdb894;padding:7px 12px;background:#1d1814;border-bottom:2px solid #3a2e22;min-height:34px;display:flex;align-items:center}
#content{flex:1 1 auto;overflow-y:auto;min-height:0;padding:10px 12px;scrollbar-width:thin;scrollbar-color:#6b4a2e #1a1410;overflow-x:hidden}
#content::-webkit-scrollbar{width:9px}
#content::-webkit-scrollbar-track{background:#1a1410;border-left:2px solid #2a221b}
#content::-webkit-scrollbar-thumb{background:#6b4a2e;border:1px solid #8a5a1a;border-radius:0}
#content::-webkit-scrollbar-thumb:hover{background:#8a5a1a}
#content::-webkit-scrollbar-thumb:active{background:#e0a33a}
.view{animation:fade 0.2s ease}
@keyframes fade{from{opacity:0}to{opacity:1}}
#nextdepot{font-size:16px;color:#8a7a64;text-align:center;margin-bottom:8px;min-height:18px}
#nextdepot .rbhd{font-size:14px;letter-spacing:1px;color:#e0a33a;margin-bottom:6px;text-align:center}
#nextdepot .rbkm{font-size:14px;color:#8a7a64;text-align:center;margin:3px 0 4px}
.routecard{display:flex;align-items:center;gap:8px;width:100%;min-height:46px;margin-bottom:6px;background:#241c14;border:2px solid #57432f;border-bottom-width:4px;color:#cdb894;font:inherit;font-size:17px;padding:4px 10px;text-align:left;cursor:pointer}
.routecard:active{border-bottom-width:2px;transform:translateY(1px)}
.routecard .rg{font-size:19px;color:#c98f4a;width:22px;text-align:center;flex:0 0 auto}
.routecard .rn{color:#efe3cc;flex:0 0 auto;max-width:46%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.routecard .rt{min-width:0}
.routecard .rt{flex:1;text-align:right;font-size:14px;color:#8a7a64}
.routecard.sel{border-color:#e0a33a;background:#2c2014;box-shadow:0 0 0 1px #8a5a1a inset}
.routecard.sel .rg{color:#f2c560}
.routecard.sel .rt{color:#cdb894}
#chips{position:absolute;inset:0;z-index:12;display:none;pointer-events:none}
#chips .chip{position:absolute;transform:translateX(-50%);pointer-events:auto;font:inherit;font-size:14px;letter-spacing:1px;color:#efe3cc;background:rgba(28,20,12,0.88);border:2px solid #8a5a1a;border-bottom-width:3px;padding:3px 9px;white-space:nowrap;text-transform:uppercase}
#chips .chip:active{transform:translateX(-50%) translateY(1px)}
#chips .chip .cg{color:#f2c560;margin-right:4px}
#chips .chip.sign{background:rgba(34,24,14,0.92);border-color:#5f4d38;border-top-color:#8a5a1a;box-shadow:0 3px 8px rgba(0,0,0,0.45)}
#chips .chip.sign::after{content:'';position:absolute;left:50%;top:100%;transform:translateX(-50%);border:5px solid transparent;border-top-color:#8a5a1a}
#chips .chip.sign.nost::after{display:none}
#chips .chip.plat{border-color:#6b4a2e}
#depot{display:none;position:absolute;z-index:40;left:0;right:0;bottom:0;top:auto;max-height:62dvh;overflow-y:auto;background:rgba(18,14,10,0.97);border-top:3px solid #8a5a1a;padding:10px 12px 12px;box-shadow:0 -8px 26px rgba(0,0,0,0.55);scrollbar-width:thin;scrollbar-color:#6b4a2e #1a1410}
#depot.show{display:block;animation:sheetup 0.22s ease}
@keyframes sheetup{from{transform:translateY(26px);opacity:0.3}to{transform:none;opacity:1}}
#depot .dstep{position:sticky;top:0;float:right;z-index:2;width:36px;height:32px;margin:-2px -2px 0 10px;background:#241c14;border:2px solid #57432f;color:#a8957a;font-size:17px;line-height:1}
#app.land #depot{left:auto;right:0;top:0;bottom:0;width:min(400px,44%);max-height:none;border:0;border-left:3px solid #8a5a1a;background:rgba(14,10,7,0.93);box-shadow:-8px 0 26px rgba(0,0,0,0.5);padding-top:52px}
#app.land #depot.show{animation:sheetin 0.22s ease}
@keyframes sheetin{from{transform:translateX(26px);opacity:0.3}to{transform:none;opacity:1}}
#depot h3{font-family:'Press Start 2P',monospace;font-size:12px;color:#e0a33a;text-align:center;letter-spacing:1px;margin-bottom:4px}
#depot .flav{font-size:15px;color:#a8957a;text-align:center;margin-bottom:9px;line-height:1.3}
#depot .opt{width:100%;min-height:42px;margin-bottom:6px;font-size:17px;background:#2c241c;color:#efe3cc;border:2px solid #5f4d38;border-bottom-width:4px;text-align:left;padding:6px 12px;display:flex;justify-content:space-between;align-items:center;gap:10px}
#depot .opt:active{border-bottom-width:2px;transform:translateY(1px)}
#depot .opt:disabled{opacity:0.4;transform:none}
#depot .opt .od{font-size:14px;color:#a8957a;font-family:'VT323',monospace}
#depot .leave{width:100%;min-height:40px;font-size:16px;background:none;color:#a8957a;border:2px solid #4a3a2c;margin-top:4px}
#depot .flav .pers{color:#e0a33a;letter-spacing:1px}
#depot .mkthd{font-size:13px;letter-spacing:1px;color:#e0a33a;background:#241c14;border:2px solid #5f4d38;padding:4px 8px;margin:8px 0 5px;text-align:center}
#depot .mrow{display:flex;align-items:center;gap:7px;padding:4px 8px;background:#1d1814;border:2px solid #3a2e22;margin-bottom:4px;font-size:16px}
#depot .mrow .gn{flex:1;color:#cdb894;text-align:left}
#depot .mrow .gp{color:#8a7a64;white-space:nowrap}
#depot .mrow .gp.lo{color:#9fc25f}
#depot .mrow .gp.hi{color:#e0a33a}
#depot .tbtn{font:inherit;font-size:15px;min-height:34px;padding:3px 10px;background:#2c241c;border:2px solid #5f4d38;border-bottom-width:3px;color:#efe3cc}
#depot .tbtn:disabled{opacity:0.35}
#depot .tbtn.hot{border-color:#8a5a1a;color:#f2c560}
#travelstatus{font-size:16px;color:#a8957a;text-align:center;line-height:1.5}
#travelstatus b{color:#cdb894;font-weight:400}
button{font-family:'VT323',monospace;cursor:pointer;border:none}
#actionbar{flex:0 0 auto;padding:6px 10px 8px}
#go{width:100%;min-height:50px;font-size:22px;background:#e0a33a;color:#2a1c08;border:3px solid #8a5a1a;border-bottom-width:5px;letter-spacing:1px;text-transform:uppercase}
#go:active{border-bottom-width:3px;transform:translateY(2px)}
#go:disabled{background:#5a4632;color:#8a7a64;border-color:#3a2e22;transform:none}
#go.docked{background:#3a2e22;color:#e0a33a;border-color:#5f4d38}
#tabs{flex:0 0 auto;display:flex;border-top:3px solid #2a221b;background:#0e0b08}
.tab{flex:1;min-height:50px;font-size:17px;background:#15110d;color:#8a7a64;border:none;border-right:1px solid #2a221b;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;letter-spacing:1px}
.tab:last-child{border-right:none}
.tab .ti{font-size:13px;opacity:0.7}
.tab.active{background:#241c14;color:#e0a33a}
.tab.active .ti{opacity:1}
.tab.alert{color:#e07b2a}
#cars{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
#crewlist{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:8px}
.crewsum{grid-column:1/-1;background:#1c1812;border:2px solid #4a3a2c;border-left:4px solid #e6cf86;padding:10px 12px}
.cshd{font-size:18px;color:#efe3cc;display:flex;align-items:center}
.cseff{font-size:15px;color:#e6cf86;margin-top:4px}
.csnote{font-size:13px;color:#8a7a64;margin-top:5px}
.benchhd{grid-column:1/-1;font-size:14px;color:#d8c038;letter-spacing:.5px;text-transform:uppercase;margin:2px 0 -2px;display:flex;align-items:center}
.herochip{grid-column:1/-1;display:flex;justify-content:space-between;align-items:center;gap:8px;background:#241d12;border:2px solid #6a5a22;border-left:4px solid #d8c038;color:#efe3cc;padding:9px 12px;text-align:left;cursor:pointer;font:inherit}
.herochip .hn{font-size:16px;color:#f0d878;font-weight:600}
.herochip .hb{font-size:13px;color:#b9a874}
.herochip.sel{background:#3a2f12;border-color:#ffe06a;box-shadow:0 0 0 2px rgba(255,210,62,.35) inset}
.herochip.war{border-left-color:#b03028}
.herochip.story{border-left-color:#8a5a1a}
.herochip.story .hn{color:#f2c560}
.herochip.war .hn{color:#f0a878}
.herochip.rare{border-color:#b8901e;border-left-color:#ffd23e;background:#322611}
.herochip.rare .hn{color:#ffe06a}
.herochip.rare.sel{border-color:#ffe06a;box-shadow:0 0 0 2px rgba(255,210,62,.5) inset}
.card.herocar{border-color:#6a5a22;border-left:4px solid #d8c038}
.card.rarecar{border-color:#b8901e;border-left:4px solid #ffd23e}
.up.alt{background:#2c2412;border-color:#6a5a22;color:#e6cf86}
.up.alt:hover{background:#3a2f16}
.card{background:#241c14;border:2px solid #4a3a2c;padding:10px;position:relative}
.card::before,.card::after{content:"";position:absolute;width:4px;height:4px;background:#5f4d38;top:4px}
.card::before{left:4px}.card::after{right:4px}
.card.empty{background:#1a1410;border-style:dashed;border-color:#3a2e22}
.hd{display:flex;justify-content:space-between;align-items:baseline}
.hd .nm{font-size:19px;color:#efe3cc}
.hd .lv{font-family:'Press Start 2P',monospace;font-size:8px;color:#e0a33a}
.sub{font-size:16px;color:#a8957a;margin-top:3px;min-height:18px}
.up{width:100%;min-height:40px;margin-top:8px;font-size:17px;background:#3a2e22;color:#efe3cc;border:2px solid #5f4d38;border-bottom-width:4px}
.up:active{border-bottom-width:2px;transform:translateY(1px)}
.up:disabled{opacity:0.4;transform:none}
.wsel{display:flex;gap:5px;margin-top:7px}
.wcyc{flex:1;min-height:32px;font-size:13px;background:#2a2620;color:#cdb894;border:2px solid #4a3a2c;border-bottom-width:3px;padding:2px 4px;line-height:1.1}
.wcyc:active{border-bottom-width:2px;transform:translateY(1px)}
#app.land .wcyc{font-size:12px}
.up.build{background:#2c3a26;border-color:#4a5f3c}
#slotbtn{grid-column:span 2;min-height:50px;font-size:19px;background:#241c14;color:#e0a33a;border:2px dashed #8a5a1a}
#slotbtn:disabled{opacity:0.4}
.trainfoot{display:flex;justify-content:space-between;align-items:center;margin-top:14px}
#savemsg{font-size:16px;color:#6e5f4c}
#reset{font-size:16px;background:none;color:#a85a4a;border:2px solid #5a3228;padding:8px 12px;min-height:40px}
.pip{display:inline-block;width:8px;height:8px;margin-right:4px}
#maplist .regstrip{font-size:15px;letter-spacing:1px;color:#e0a33a;text-align:center;padding:8px 6px;background:#241c14;border:2px solid #8a5a1a;margin-bottom:8px}
#maplist .navmap{display:block;width:100%;background:#1d1814;border:2px solid #3a2e22}
#maplist .navmap .mapsel{cursor:pointer}
#maplist .maplegend{font-size:14px;color:#8a7a64;text-align:center;margin-top:8px}
#maplist .chartstrip{display:flex;align-items:center;justify-content:center;gap:4px;font-size:12.5px;letter-spacing:0.5px;color:#8a7658;background:#262016;border:2px solid #4a3a28;padding:5px 4px;margin-bottom:6px;filter:sepia(0.15)}
#maplist .chartstrip .cs{white-space:nowrap}
#maplist .chartstrip .cs b{color:#cdb894;margin-left:3px;font-weight:400}
#maplist .chartstrip .cs.here{color:#f2c560}
#maplist .chartstrip i{color:#4a3a28;font-style:normal}
#maplist .routestrip{font-size:15px;color:#a8957a;text-align:center;padding:5px 6px;margin-bottom:8px;background:#1d1814;border:2px solid #3a2e22}
#maplist .routestrip b{color:#f2c560;font-weight:400}
#loglist .ln{font-size:17px;color:#a8957a;padding:5px 2px;border-bottom:1px solid #241c14;line-height:1.3}
#loglist .ln:first-child{color:#cdb894}
/* ===================== LANDSCAPE / DESKTOP SKIN ===================== */
#dispmenu{position:absolute;z-index:50;display:flex;flex-direction:column;gap:6px}
#dm,#dmpop button{font-family:'VT323',monospace;font-size:13px;padding:6px 10px;background:#3a2e22;color:#e0a33a;border:2px solid #8a5a1a;letter-spacing:1px;white-space:nowrap;line-height:1;cursor:pointer}
#dm{align-self:flex-end}
#dmpop{display:none;flex-direction:column;gap:6px}
#dispmenu.open #dmpop{display:flex}
#dmpop button{width:100%;min-width:104px;text-align:center}
#app:not(.land) #dispmenu{top:9px;right:10px;align-items:flex-end}
#app:not(.land) #topbar{padding-right:48px}
#app.land{max-width:none;display:block;position:relative;overflow:hidden}
#app.land .frame{position:absolute;inset:0;border:0;padding:0;z-index:0}
#app.land .cvwrap{width:100%;height:100%}
#app.land canvas{width:100%;height:100%;border:0;object-fit:contain;background:#0e0b08}
#app.land #region{display:none}
#app.land #topbar{position:absolute;top:0;left:0;right:0;z-index:5;padding:8px 12px;background:linear-gradient(rgba(8,6,4,0.6),rgba(8,6,4,0));pointer-events:none}
#app.land #topbar .brand{display:none}
#app.land .statbar{display:flex;gap:6px;width:100%}
#app.land .statbar .st{background:rgba(18,14,10,0.72);min-width:60px;pointer-events:auto;padding:3px 2px}
#app.land .statbar .st:nth-child(2){margin-right:auto}
#app.land #dispmenu{left:14px;bottom:54px;top:auto;right:auto;align-items:flex-start;flex-direction:column-reverse}
#app.land #dm{align-self:flex-start}
/* ----- immersive mode: strip all chrome, keep the display menu to get back out ----- */
#app.immersive #topbar,#app.immersive #ticker,#app.immersive #content,#app.immersive #actionbar,#app.immersive #tabs,#app.immersive #region{display:none}
#app.immersive:not(.land){justify-content:center}
#app.immersive #dispmenu{top:10px;right:10px;left:auto;bottom:auto;align-items:flex-end;flex-direction:column}
#app.immersive #dm{opacity:0.5;background:rgba(20,16,12,0.66);align-self:flex-end}
#app.immersive #dm:active{opacity:1}
/* top-center route header (travel info + biome, all in one place) */
#app.land #content{position:absolute;top:8px;left:50%;right:auto;transform:translateX(-50%);bottom:auto;width:auto;max-width:54%;z-index:6;max-height:none;overflow:visible;padding:3px 16px 4px;text-align:center;background:rgba(8,6,4,0.46);border:0;border-radius:0 0 6px 6px}
#app.land #nextdepot{margin:0;font-size:17px;color:#cdb894}
#app.land .routecard{min-height:32px;font-size:14px;padding:2px 8px;margin-bottom:4px}
#app.land .routecard .rt br{display:none}
#app.land .routecard .rt .rfuel{margin-left:8px}
#app.land #nextdepot .rbhd{font-size:12px;margin-bottom:4px}
#app.land #nextdepot .rbkm{font-size:12px;margin:1px 0 2px}
#app.land #travelstatus{font-size:14px;color:#9fd8d8;letter-spacing:1px}
#app.land #ticker{position:absolute;top:150px;bottom:auto;left:50%;transform:translateX(-50%);z-index:5;max-width:74%;background:rgba(8,6,4,0.78);border:0;border-radius:4px;padding:4px 16px;min-height:0;justify-content:center;text-align:center;font-size:17px}
/* heavy views / depot: slide-up tray from the bottom (overrides the top header) */
#app.land.vopen #content{top:auto;left:0;right:0;transform:none;bottom:48px;width:auto;max-width:none;max-height:62%;overflow-y:auto;background:rgba(12,9,6,0.96);border:0;border-top:3px solid #2a221b;border-radius:0;padding:12px 168px 12px 16px;text-align:left}
#app.land.vopen #ticker{opacity:0}
#app.land #cars{grid-template-columns:repeat(4,minmax(0,1fr))}
#app.land #crewlist{grid-template-columns:repeat(3,minmax(0,1fr))}
#app.land #slotbtn{grid-column:span 4}
#app.land #actionbar{position:absolute;right:14px;bottom:54px;z-index:8;padding:0;width:auto}
#app.land #go{width:auto;min-width:128px;padding:0 16px;min-height:42px;font-size:18px}
#app.land #tabs{position:absolute;left:0;right:0;bottom:0;z-index:7;border-top:3px solid #2a221b;background:rgba(8,6,4,0.92)}
#app.land .tab{min-height:46px;font-size:14px}
@media (max-width:560px){#app.land #content{max-width:64%}#app.land #go{min-width:106px;font-size:16px}#app.land #dispmenu{bottom:52px}#app.land.vopen #content{padding-right:136px}}
/* ----- Phase 2: filmstrip management tray (landscape) ----- */
#app.land #cars{display:flex;gap:8px;overflow-x:auto;overflow-y:hidden;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:#6b4a2e #1a1410}
#app.land #cars .card{flex:0 0 134px;width:134px}
#app.land #slotbtn{flex:0 0 134px;width:134px;grid-column:auto;min-height:auto}
#app.land #maplist{overflow-x:auto;padding-bottom:6px;scrollbar-width:thin;scrollbar-color:#6b4a2e #1a1410}
#app.land #maplist .navmap{min-width:520px;max-height:46vh;margin:0 auto}
#app.land #loglist{column-count:2;column-gap:18px}
#app.land #cars::-webkit-scrollbar,#app.land #maplist::-webkit-scrollbar{height:8px}
#app.land #cars::-webkit-scrollbar-thumb,#app.land #maplist::-webkit-scrollbar-thumb{background:#6b4a2e;border:1px solid #8a5a1a}
#app.land #cars::-webkit-scrollbar-track,#app.land #maplist::-webkit-scrollbar-track{background:#1a1410}
/* ===== desktop windowed (portrait skin on a big screen): bigger scene, vertically centered, framed — kills the dead gap ===== */
@media (min-width:760px){
  body{align-items:center;background:radial-gradient(135% 130% at 50% 36%,#1c150e 0%,#0b0806 72%)}
  #app:not(.land){max-width:min(94vw,860px);height:auto;max-height:100dvh;border:1px solid #2a221b;box-shadow:0 14px 50px rgba(0,0,0,0.55)}
}
@media (min-width:760px) and (max-height:780px){
  #app:not(.land){max-width:min(94vw,680px)}
}</style>
</head>
<body>
<div id="app">
<div id="topbar">
<div class="brand">IRONLINE</div>
<div class="statbar">
<div class="st"><b id="s-scrap">120</b><span>scrap</span></div>
<div class="st"><b id="s-food">20</b><span>food</span></div>
<div class="st"><b id="s-fuel">30</b><span>fuel</span></div>
<div class="st" id="hullbox"><b id="s-hull">90/90</b><span>hull</span></div>
</div>
</div>
<div id="dispmenu">
<button id="dm" title="Display options">⚙</button>
<div id="dmpop">
<button id="lt" title="Toggle mobile / desktop layout">⛶ Desktop</button>
<button id="fs" title="Toggle fullscreen">⛶ Full</button>
<button id="im" title="Immersive mode (hide all UI)">◹ Immerse</button>
</div>
</div>
<div class="frame"><div class="cvwrap"><div id="chips"></div><canvas id="cv" width="640" height="360" aria-label="Side view of your armored battle train rolling through a ruined desert wasteland on a multi-lane rail ocean"></canvas><div id="region"></div></div></div>
<div id="ticker">The wastes are quiet. Upgrade your rig, then depart.</div>
<div id="content">
<div class="view" id="v-travel">
<div id="nextdepot"></div>

// POLICY: a rig is sacred. Unknown/higher versions pass through untouched and load reads known fields
// defensively — we never wipe. Only a genuinely unparseable blob falls back to a fresh boot.
const SAVE_V=7;
function migrate(d){
 if(!d||typeof d!=='object')return null;
 if(!d.v){                                  // v1: the unversioned live-shipped shape -> v2 (normalize, no behavior change)
  d.fuel=d.fuel!=null?d.fuel:30;
  d.heroes=Array.isArray(d.heroes)?d.heroes:[];
  d.slots=Array.isArray(d.slots)?d.slots:[];
  d.slots.forEach(s=>{if(s&&s.type=='gun'){if(!s.wpn)s.wpn='cannon';if(!s.port)s.port='auto'}});
  d.dist=d.dist||0;d.discount=!!d.discount;d.layout=d.layout||'';d.layoutManual=!!d.layoutManual;
  d.engineSkin=d.engineSkin||null;d.fortressUnlocked=!!d.fortressUnlocked;d.origin=d.origin?1:0;
  d.v=2;
 }
 if(d.v==2){                                // v2 -> v3: THE SPINE — place the veteran ON the node graph (one region per 5 crossings)
  const j=d.journeys||0,reg=Math.min(3,Math.floor(j/5));
  d.nav={seed:1+Math.floor((j*7919+Math.round(d.dist||0)*131+Math.round(d.scrap||0)*17)%99999),reg,col:0,row:0};
  d.visited=[reg+':0:0'];
  if(reg>0)d.origin=0;                      // a veteran deep in the wastes wakes at their region's entry, not the Railhead
  d.v=3;
 }
 if(d.v==3){                                // v3 -> v4: the station economy — empty holds, empty seats, a clean ledger
  d.cargo={};d.pax=[];d.contracts=[];
  d.v=4;
 }
 if(d.v==4){                                // v4 -> v5: factions — a clean name with the Dispatchers and the Caravaneers
  d.rep={disp:0,carav:0,tr:0};
  d.v=5;
 }
 if(d.v==5){                                // v5 -> v6: THE LINEBREAKER — the line starts unbroken
  d.linebroken=0;
  d.v=6;
 }
 if(d.v==6){                                // v6 -> v7: THE OCEAN — bow fitting, tank integrity, wound & prize ledgers. The caboose converts 1:1 into the Rearguard.
  d.prow={lvl:1,fit:'ram'};d.leak=null;d.crippled=[];d.prizes=[];d.fam={};d.farlight=0;
  if(Array.isArray(d.slots))d.slots.forEach(s=>{if(s&&s.type=='gun'&&s.plvl==null)s.plvl=s.lvl});
  d.v=7;
 }
 // future steps append here, in order: if(d.v==7){ ... d.v=8 }
 return d;
}

S.sel=0;S.navT=null;
S.cargo=(d.cargo&&typeof d.cargo=='object')?d.cargo:{};S.pax=Array.isArray(d.pax)?d.pax:[];S.contracts=Array.isArray(d.contracts)?d.contracts:[];S.rep=(d.rep&&typeof d.rep=='object')?{disp:d.rep.disp|0,carav:d.rep.carav|0,tr:d.rep.tr|0}:{disp:0,carav:0,tr:0};S.linebroken=!!d.linebroken;

S.crippled=Array.isArray(d.crippled)?d.crippled:[];S.prizes=Array.isArray(d.prizes)?d.prizes:[];S.fam=(d.fam&&typeof d.fam=='object')?d.fam:{};S.farlight=d.farlight|0;
if(d.origin&&S.nav.reg==0&&S.nav.col==0){S.origin=true;S.stationX=STATION_HOME;S.stop={ph:'docked',t:0,vis:true};S.lampK=1} // saved while docked at the origin — wake up there
else{S.origin=false;S.stop=null;S.stationX=null;S.lampK=1}S.place=null;                          // ...otherwise the load is authoritative: mid-journey, no stop (staged places are session-only)
return true}
}catch(e){}

}

/* ---- THE SPINE: the node-graph journey (BRIEF v1.2 wave 1) ----
   The rail ocean is 4 REGIONS, each a seeded node graph: columns of stops, 1-2 forward edges per node,
   a GATE (warlord boss) at each region's far end. S.nav = where the rig IS; S.navT = the leg in flight.
   Difficulty comes from position (eff() = reg*6+col), not crossings — the world is dangerous, not the calendar. */
const REGIONS=[
 {name:'THE RUST FLATS',biome:0,cols:6,anchors:['THE RAILHEAD','THE JUNCTION','GALLOWS GATE']},
 {name:'THE DEAD CITY',biome:1,cols:6,anchors:['ASHGATE','OLD EXCHANGE','CATHEDRAL GATE']},
 {name:'THE BONE REEF',biome:2,cols:6,anchors:['MARROW LANDING','THE RIBYARD','PALE GATE']},
 {name:'THE CINDER SEAM',biome:3,cols:7,anchors:['EMBERFALL','SLAGSIDE','THE TERMINUS']}];
const navVK=(reg,col,row)=>reg+':'+col+':'+row;
function navRows(reg,col){const R=REGIONS[reg];if(col<=0||col>=R.cols-1)return 1;return 2+(hash(S.nav.seed+reg*1000+col*37+5)<0.5?0:1)}
function nodeType(reg,col,row){const R=REGIONS[reg];if(row===9)return 'D';if(col<=0)return 'S';if(col>=R.cols-1)return 'G';
 const r=hash(S.nav.seed+reg*1000+col*37+row*7+9);return r<0.42?'S':r<0.67?'E':r<0.87?'H':'B'}
function nodeEdges(reg,col,row){const R=REGIONS[reg];
 if(row===9)return[{reg,col:Math.min(R.cols-1,5),row:0}];               // a far node's only line runs BACK to the spine — dead-ends always return
 if(col>=R.cols-1)return reg>=REGIONS.length-1?(S.linebroken?[{reg:0,col:0,row:0}]:[]):[{reg:reg+1,col:0,row:0}]; // the Terminus ends the line — until the line is broken open, then it loops home
 const nr=navRows(reg,col+1),a=Math.min(nr-1,row),out=[{reg,col:col+1,row:a}];
 const h=hash(S.nav.seed+reg*1000+col*37+row*7+3);
 if(nr>1&&h<0.7){const b=(a+(h<0.35?1:nr-1))%nr;if(b!==a)out.push({reg,col:col+1,row:b})} // ~70% of multi-lane columns fork — the choice is the point
 if(col==3&&row==0)out.push({reg,col:4,row:9});                        // the DEEP BRANCH: off the lit spine, into dark water (two-oil country)

function offerObj(type,idx){
if(type=='repair'){const c=Math.round(18+idx*6);return{label:'Repair bay',desc:'−'+c+' scrap · full hull',can:()=>S.scrap>=c&&S.hull<maxHull(),act:()=>{S.scrap-=c;S.hull=maxHull();log('Hull fully welded at the depot.')}}}
if(type=='food'){const c=Math.round(22+idx*7),g=Math.round(16+idx*5);return{label:'Provisioner',desc:'−'+c+' scrap · +'+g+' food',can:()=>S.scrap>=c,act:()=>{S.scrap-=c;S.food+=g;log('Loaded '+g+' food from the provisioner.')}}}
if(type=='fuel'){const c=Math.round(14+idx*5),g=Math.round(12+idx*4);return{home:'fuel',label:'Fuel depot',desc:'−'+c+' scrap · +'+g+' fuel',can:()=>S.scrap>=c,act:()=>{S.scrap-=c;S.fuel+=g;log('Topped off '+g+' fuel at the depot.')}}}
if(type=='recruit'){const c=Math.round(70+idx*22);return{home:'outpost',label:'Wandering specialist',desc:'\u2212'+c+' scrap · recruit a wanderer',can:()=>S.scrap>=c,act:()=>{S.scrap-=c;recruitHero('wander')}}}
if(type=='scrap'){const c=Math.round(12+idx*4),g=Math.round(40+idx*14);return{label:'Scrap broker',desc:'−'+c+' food · +'+g+' scrap',can:()=>S.food>=c,act:()=>{S.food-=c;S.scrap+=g;log('Sold rations for '+g+' scrap.')}}}
if(type=='scavenge'){return{label:'Pick the wreck-stacks',desc:'free · gamble',can:()=>true,act:()=>{const r=Math.random();if(r<0.5){const g=Math.round(35+idx*13);S.scrap+=g;log('Scavenging paid off — +'+g+' scrap.')}else if(r<0.8){const g=Math.round(12+idx*5);S.food+=g;log('Found a food cache — +'+g+' food.')}else log('The stacks were already picked clean. Nothing here.')}}}
if(type=='cache'){const g=Math.round(24+idx*10);return{label:'Supply cache',desc:'free · +'+g+' scrap',can:()=>true,act:()=>{S.scrap+=g;log('Cracked a supply cache — +'+g+' scrap.')}}}
if(type=='patch'){const c=Math.round(20+idx*5);return{label:'Patch the breached tank',desc:'\u2212'+c+' scrap \u00b7 the leak stops',can:()=>!!S.leak&&S.scrap>=c,act:()=>{S.scrap-=c;S.leak=null;log('The yard crew sweats the tank seams tight. The leak is DONE weeping.')}}}
if(type=='uncripple'){const c=Math.round(45+idx*12);return{label:'Repair a crippled car',desc:'\u2212'+c+' scrap \u00b7 back in the line',can:()=>S.crippled.length>0&&S.scrap>=c,act:()=>{const i=S.crippled.shift();if(S.slots[i])delete S.slots[i].crip;S.scrap-=c;log('The yard raises the charred car and makes it a CAR again. She rejoins the line.')}}}

return{label:'Black-market fixer',desc:'free · next upgrade ½ price',can:()=>!S.discount,act:()=>{S.discount=true;log('A fixer marks down your next upgrade to half price.')}}}
function depotOffers(idx,pers){ // personalities pin their trade first (YARD repairs, OUTPOST recruits, CHAPEL blesses); the rest rolls from the pool
const pool=['repair','food','scrap','fuel','recruit','scavenge','cache','discount'],pick=[],used={};
if(pers&&pers.includes('yard')){used.repair=1;used.patch=1;used.uncripple=1;pick.push('repair');if(S.leak)pick.push('patch');if(S.crippled&&S.crippled.length)pick.push('uncripple')}
if(pers&&pers.includes('outpost')){used.recruit=1;used.guard=1;pick.push('recruit');pick.push('guard')}
if(pers&&pers.includes('chapel')){used.blessing=1;pick.push('blessing')}
let k=0;while(pick.length<3&&k<20){const t=pool[Math.floor(hash(idx*13+k*7+9)*pool.length)];if(!used[t]){used[t]=1;pick.push(t)}k++}
if(!pick.includes('scavenge')&&!pick.includes('cache'))pick[pick.length-1]='scavenge';
return pick.map(t=>offerObj(t,idx))}

if(S.ptrainAt>0&&S.jt>=S.ptrainAt&&!S.ptrain){if(S.ptrainElite){const guns=Math.min(3,2+Math.floor(eff()/14)),wp=['cannon','rocket','mortar'],cars=[];for(let g=0;g<guns;g++)cars.push({wpn:wp[g%3]});const m=Math.round((42+eff()*15)*(1+guns*0.25));const brd=S.ptrainBoard&&eff()>=6;S.ptrain={kind:'raider',elite:true,boarder:brd,board:0,bLog:0,cars,guns,wnd:10+guns*3,x:-96,state:'in',t:0,gave:false,atkT:1.2,muzzle:0,hp:m,max:m,dead:false};S.ptrainBoard=false;log(brd?'A BOARDER WAGON of '+CLANS[S.nav.reg].nm+' surges alongside \u2014 grapples ready. Your troops to the rails!':'A heavy raider convoy of '+CLANS[S.nav.reg].nm+' thunders onto the parallel rail \u2014 ELITE WARBAND, guns bristling.')}else if(S.ptrainKind=='ghost'){S.ptrain={kind:'ghost',x:-64,state:'in',t:0,gave:false,atkT:99,muzzle:0,hp:999,max:999,dead:false};log('A pale train runs the far rail without a sound. The old-timers call it the GHOST HAULER.')}else{const m=Math.round(30+eff()*10);S.ptrain={kind:S.ptrainKind,x:-64,state:'in',t:0,gave:false,atkT:1.0,muzzle:0,hp:m,max:m,dead:false};log(S.ptrainKind=='trader'?'A survivor train eases onto the parallel rail — they signal peace.':'A raider train of '+CLANS[S.nav.reg].nm+' swings onto the parallel rail, guns up!')}S.ptrainAt=-1}
}
const pt=S.ptrain;
if(pt){pt.t+=dt;if(pt.muzzle>0)pt.muzzle-=dt;
if(pt.state=='in'){pt.x+=128*dt;if(pt.x>=150){pt.x=150;pt.state='pace';pt.t=0}}
else if(pt.state=='pace'){pt.x+=Math.sin(S.T*1.5)*5*dt;
if(pt.kind=='trader'){if(!pt.gave&&pt.t>0.9){pt.gave=true;S.booms.push({x:pt.x+18,y:132,t:0.1});if(Math.random()<0.22+(S.rep?S.rep.carav*0.012:0)){log('A wanderer rides the trader car across to your rig...');recruitHero('wander')}else{const sc=Math.round(20+eff()*12),fd=4+Math.floor(Math.random()*4);S.scrap+=sc;S.food+=fd;log('The traders toss across supplies — +'+sc+' scrap, +'+fd+' food. They wave and pull ahead.')}}if(pt.t>2.6)pt.state='out'}
else if(pt.kind=='ghost'){if(pt.t>2.4){pt.state='out';if(cargoUsed()<cargoCap()){S.cargo.relic=(S.cargo.relic||0)+1;log('The GHOST HAULER fades ahead of you. A relic rests on your rear coupling, rimed with frost.');if(Math.random()<0.35)grantHero('lanternkeeper','A figure steps off the pale train as it fades \u2014 lantern first, then the rest of them.')}else log('The GHOST HAULER fades into the haze. Your holds were full; whatever it left returns to the dark.')}}
else{const dps=gunVs(pt.elite?'armored':'light')*markMult('ptrain')+troops()*1.5;pt.hp-=dps*dt*0.85;if(dps>0&&S.flash<0.3)S.flash=0.3;
if(pt.boarder){pt.board=Math.max(0,Math.min(1,pt.board+dt*(0.085+eff()*0.003)-dt*(troops()*0.011+rgGarrison()*0.004))); // the boarding meter: their grapples vs your manpower
 if(pt.board>0.5&&!pt.bLog){pt.bLog=1;log('Grapples bite the hull \u2014 REPEL BOARDERS! (troops hold the meter down)')}
 if(pt.board>=1){const steal=Math.round(base()*0.4);S.scrap=Math.max(0,S.scrap-steal);hurt(8+eff());pt.dead=false;pt.state='out';S.flash=1.4;log('BOARDED! They cut a hold open and swing away with '+steal+' scrap.');cards();save()}}
pt.atkT-=dt;if(pt.atkT<=0){pt.atkT=pt.elite?(pt.boarder?1.6:1.1):1.4;pt.muzzle=0.18;const dmg=Math.round((pt.elite?Math.max(2,Math.round((6+eff()*1.5-troops()*0.4)*(1+(pt.guns||0)*0.2)*(pt.boarder?0.5:1))):Math.max(1,Math.round(4+eff()-troops()*0.4)))*(1-prowMit('frontal')));hurt(dmg);if(pt.elite&&Math.random()<0.06)springLeak();S.flash=1.0;S.booms.push({x:165,y:126,t:0.08});if(S.hull<=0)theOverrun(pt.elite?'blockade':'swarm')}
if(S.ptrain&&pt.hp<=0){if(pt.elite){const r=Math.round(base()*1.6*crewBuffs().scrapMult);S.scrap+=r;for(let i=0;i<8;i++)S.booms.push({x:pt.x+i*8,y:96+(i%3)*6,t:0.04+i*0.05});log('ELITE WARBAND WRECKED! You strip the convoy for '+r+' scrap as it derails in flames.');if(Math.random()<(pt.boarder?0.75:0.5))recruitHero('war');else{const b=Math.round(25+eff()*7);S.scrap+=b;log('You salvage another '+b+' scrap from the burning cars.')}}else{const r=Math.round(base()*0.8);S.scrap+=r;for(let i=0;i<5;i++)S.booms.push({x:pt.x+i*9,y:98+(i%2)*6,t:0.05+i*0.05});log('Raider train wrecked! You strip it for '+r+' scrap as it derails.')}pt.dead=true;pt.state='out'}
else if(S.ptrain&&pt.t>(pt.elite?(pt.wnd||16):3.6)&&pt.state=='pace'){pt.state='out';if(pt.elite){S.ptFled=true;
 log(pt.boarder?'The boarder wagon cuts its grapples and swings away \u2014 your rails HELD, but they keep their hides. No loot from a fight that got away.':'The warband opens the throttle and pulls ahead \u2014 they GOT AWAY. Their loot rides with them.');
 {const dmg=Math.max(1,Math.round((4+eff())*0.6*(1-prowMit('frontal'))));S.hull=Math.max(1,S.hull-dmg);S.flash=1.1;pt.muzzle=0.18;S.booms.push({x:165,y:126,t:0.08}); // the parting shot is an INSULT, never a kill (the fight is over — law: overrun only on defeat)
  log('A parting shot cracks off the plate as they go \u2014 hull takes '+dmg+'. An insult, not a wound.')}
 if(pt.hp<pt.max*0.35){const g=Math.round(base()*0.7*crewBuffs().scrapMult);S.scrap+=g;S.booms.push({x:pt.x+30,y:110,t:0.3}); // fled BLEEDING: they shed a burning car — the hunt half-paid
  log('They fled bleeding \u2014 a burning car uncouples and keels off the rail. You strip it at speed for +'+g+' scrap.')}}
 else log('The raider train breaks off and falls behind.')}}}
else if(pt.state=='out'){pt.x+=(pt.dead?70:165)*dt;if(pt.x>384)S.ptrain=null}}
if(S.crate){S.crate.x-=80*dt;if(S.crate.x<-16)S.crate=null}
if(S.inspT>0)S.inspT-=dt;
if(S.noodleT>0)S.noodleT-=dt;
if(S.mark=='boss'&&(!S.boss||S.boss.dead))S.mark=null;
if(S.mark=='ptrain'&&(!S.ptrain||S.ptrain.dead||S.ptrain.state=='out'))S.mark=null;
if(S.mode=='run'&&!S.boss&&S.jt>=S.dur)finish();
}
S.saveT+=dt;
if(S.saveT>15&&(S.mode=='idle'||(S.mode=='depot'&&S.stop&&S.stop.ph=='docked'))){S.saveT=0;save()} // the linger autosaves too — a rig at rest is never lost
draw();upd();
requestAnimationFrame(tick);
}
(async function(){
const loaded=await load();
if(loaded){log('Save recovered. Your rig idles where you left it — '+S.journeys+' crossings logged.');
if(S.origin)log('The Dispatcher nods from the platform: "Still here, engineer. The line’s yours whenever you want it."');}
else{S.origin=true;S.stationX=STATION_HOME;S.stop={ph:'docked',t:0,vis:true};S.lampK=1; // BEGIN-AT-ORIGIN: a fresh game starts docked & at rest
S.nav={seed:1+Math.floor(Math.random()*99999),reg:0,col:0,row:0};S.visited=['0:0:0'];S.sel=0;S.navT=null; // a fresh line is drawn for a fresh rig
log('THE RAILHEAD — last lit outpost on the line. The Dispatcher leans on the rail: "Rig’s watered and the way west is clear. Roll out whenever you’re ready, engineer."');}
if(S.origin&&S.stop&&S.stop.ph=='docked')openDepot('THE RAILHEAD'); // home is a FULL station — market, board, services, all of it
if(!S.layoutManual)autoLayout();
applyLayout();
applyImmersive();
cards();showView('travel');
requestAnimationFrame(tick);
})();
</script>
